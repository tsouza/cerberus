name: config-docs

# Gates docs/configuration.md against the single source of truth in
# internal/config (the CERBERUS_* env-key metadata + the live viper loader
# defaults). docs/configuration.md is CODE-GENERATED by cmd/config-docs; this
# job regenerates it and fails on any drift, so the committed doc can never
# disagree with the config the binary actually loads.
#
# Runs on EVERY PR and on push to main so it CAN be a required status check
# (branch protection) and therefore a release gate too: a release publishes
# only after its PR merges with every required check green (merge-when-green),
# so a required check is automatically a release gate. It is intentionally NOT
# short-circuited on docs-only PRs: a hand-edit to docs/configuration.md is
# exactly the drift this gate exists to reject.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: config-docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  config-docs:
    name: config-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # The coverage test fails first (and with a clearer message) if a new
      # CERBERUS_* env var was added with no EnvDoc metadata: the doc gate
      # below would also catch it, but TestEnvDocsCoverAllKeys points straight
      # at the missing key.
      - name: config-docs coverage test
        run: go test ./internal/config/ -run 'TestEnvDocs|TestDocDefaults'

      # Regenerate in place, then fail on any diff. Mirrors chart-ci.yml's
      # helm-docs-drift step (generate -> git diff --exit-code).
      - name: Regenerate docs/configuration.md
        run: go run ./cmd/config-docs -out docs/configuration.md

      - name: Fail on configuration.md drift
        run: |
          git diff --exit-code -- docs/configuration.md \
            || { echo "::error::docs/configuration.md is stale - run 'just gen-config-docs' and commit the result"; exit 1; }
