name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # `check` is the test + build job. Linting moved to the `lint` job
  # below so lint failures and test failures are surfaced independently
  # and can run in parallel.
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: test + build
        run: |
          just test
          just build

  # `lint` consolidates ALL linting in one job:
  #   - Go (golangci-lint v2 = formatters + linters from .golangci.yml)
  #   - Commit messages (commitlint, PR-only)
  #   - Markdown (markdownlint-cli2)
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # commitlint needs full history

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: golangci-lint (Go + formatters)
        # v7+ is required for golangci-lint v2; v6 caps at v1.
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          # Honours .golangci.yml; runs across the whole module.
          args: ./...

      # go-arch-lint enforces the cerberus layering (parse → lower →
      # optimize → emit → execute) declared in .go-arch-lint.yml.
      # No first-party Action exists; install via `go install` so it
      # reuses setup-go's module cache.
      - name: install go-arch-lint
        run: go install github.com/fe3dback/go-arch-lint@v1.15.0

      - name: go-arch-lint
        run: go-arch-lint check

      - name: commitlint
        if: github.event_name == 'pull_request'
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !compatibility/prometheus/upstream/**
            !compatibility/tempo/upstream/**
            !compatibility/loki/upstream/**
            !**/node_modules/**

  # `forbid-skip` is the GA test-discipline gate. The maintainer's
  # NON-NEGOTIABLE rule is "no t.Skip in test files — fix the bug, do
  # not skip." Greps `*_test.go` for `t.Skip` / `t.Skipf` / `t.SkipNow`
  # via `git ls-files` (already excludes .gitignored paths) and fails
  # the build if any match.
  #
  # The second step rejects "not implemented" / `\bskipped\b` /
  # `\bdeferred\b` in test files and TXTAR fixtures. The rule is
  # intentionally broad: bare words count, not just phrase patterns.
  # Every usage is a discipline-erosion smell — implementable, or
  # rewritable to a neutral verb (dropped / excluded / rejected /
  # bypassed), or removable. A Go variable named `skipped`, a counter
  # `errors.New("not implemented")`, a comment saying "the deferred
  # routine" — all count.
  #
  # The maintainer's NON-NEGOTIABLE GA rule is "absolutely nothing is
  # skipped / not implemented / deferred." This gate enforces it.
  #
  # Vendored upstream snapshots under `compatibility/*/upstream/**`
  # are excluded — reference material outside cerberus's authorship
  # boundary (and pinned by their respective VERSION files). Runs in
  # parallel with `check` + `lint`; flip on as a required status check
  # via branch protection.
  forbid-skip:
    name: forbid-skip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # The new-should_skip-additions guard diffs against
          # origin/main, so we need both refs reachable.
          fetch-depth: 0
      - name: Reject t.Skip in test files
        run: |
          if git ls-files -z -- \
              '*_test.go' \
              ':!:compatibility/*/upstream/**' \
              | xargs -0 grep -nE 't\.Skip[fN]?\(' --; then
            echo "::error::t.Skip / t.Skipf / t.SkipNow found in test files — fix the bug, do not skip"
            exit 1
          fi
      - name: Reject "not implemented" / "skipped" / "deferred" in tests + fixtures
        run: |
          if git ls-files -z -- \
              '*_test.go' \
              '*.txtar' \
              ':!:compatibility/*/upstream/**' \
              | xargs -0 grep -niEH 'not implemented|\bskipped\b|\bdeferred\b' --; then
            echo "::error::discipline-erosion wording (\"not implemented\" / \"skipped\" / \"deferred\") found in test files or TXTAR fixtures — implement the feature, rewrite to a neutral verb (dropped / excluded / rejected / bypassed), or remove the comment"
            exit 1
          fi
      # Production code (non-test) must not advertise "not implemented".
      # The bare words "skipped" / "deferred" are *not* gated here
      # because Go has legitimate uses of both — `defer` statements
      # described in docstrings, runtime "X is skipped" behaviour
      # prose — that would all false-positive. "not implemented" has
      # no legitimate prod meaning: either implement the feature or
      # rewrite to a factual verb (rejected / unsupported / falls back).
      - name: Reject "not implemented" in production code
        run: |
          if git ls-files -z -- \
              'internal/**/*.go' \
              ':!:internal/**/*_test.go' \
              | xargs -0 grep -niEH 'not implemented' --; then
            echo "::error::\"not implemented\" found in production code — implement the feature or rewrite to a factual verb (rejected / unsupported / falls back)"
            exit 1
          fi
      # Reject soft-assertion patterns that look like real verification
      # but pass tautologically — a discipline pin against fake-pass
      # regressions.
      #
      # Patterns rejected:
      #   - assert.Contains(x, "")           — empty string matches anything
      #   - assert.ElementsMatch(x, []...{}) — empty slice trivially matches
      #   - defer recover()                  — silently swallows panics
      #   - defer func() { _ = recover() }   — explicit silent recover
      #
      # New additions must use the matching deep-assertion form: assert
      # actual content, assert specific panic, or remove the recover.
      - name: Reject soft-assertion / silent-recover patterns
        run: |
          if git ls-files -z -- \
              '*_test.go' \
              ':!:compatibility/*/upstream/**' \
              | xargs -0 grep -nEH 'assert\.Contains\([^,]+,\s*""\s*\)|assert\.ElementsMatch\([^,]+,\s*\[\][^)]*\{\s*\}\s*\)|defer recover\(\)|defer func\(\)\s*\{\s*_ = recover\(\)' --; then
            echo "::error::soft-assertion or silent-recover pattern found — replace assert.Contains(x, \"\") with the actual substring, replace assert.ElementsMatch(x, []T{}) with len(x) == 0, replace defer recover() with assert.Panics(t, func(){...}, \"reason\")"
            exit 1
          fi
      # Reject net-new `should_skip:` entries in compatibility overlays
      # that lack a tracking ref — a discipline pin against the
      # #429 / #537 anti-pattern (skips that masked real bugs and
      # lingered for weeks before someone wired the fix).
      #
      # Self-test: scripts/check-skip-additions.sh --self-test.
      - name: Guard new should_skip entries
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          scripts/check-skip-additions.sh --self-test
          scripts/check-skip-additions.sh
