name: ci

on:
  push:
    # `release/*.x` so the required check / lint / forbid-skip gates also run on
    # a maintenance-line hotfix push (release/1.4.x, …) — release.yml's
    # maintenance preflight reads these check-runs before publishing.
    branches: [main, 'release/*.x']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # `changes` computes whether the PR is docs-only. Docs-only PRs short-
  # circuit the heavy `check` (test + build) job — `lint` and
  # `forbid-skip` still run unconditionally because they are the gates
  # that catch broken markdown / discipline regressions in the docs
  # themselves. See `.github/workflows/compatibility.yml`,
  # `compose-smoke.yml`, and `chdb.yml` for the matching short-circuit
  # in the other PR-gate workflows.
  #
  # Only computed on `pull_request`. On `push` events (main + tags) the
  # output is the empty string, so the boolean check `!= 'true'` in
  # downstream `if:` clauses falls through and the heavy job runs — that
  # is the safe-by-default behaviour for force-pushes, tag pushes, and
  # any other event where the diff isn't a clean two-commit range.
  #
  # The filter convention: `code` matches "any changed file that is NOT
  # documentation". If `code == 'false'` we know every changed file was
  # a doc file → docs_only. If `code == 'true'` at least one non-doc
  # file changed → full suite.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.compute.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v7
        if: github.event_name == 'pull_request'

      - id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          # `every` makes the negation patterns subtractive: a file is
          # in `code` iff it matches `**` AND does NOT match any of the
          # `!`-prefixed doc patterns. Under the default `some`
          # quantifier, `**` matches everything and the negations never
          # fire — every PR would be flagged as code-touching.
          predicate-quantifier: 'every'
          # `code` matches "any changed file that is NOT documentation".
          # The `!`-prefixed patterns subtract docs files from the `**`
          # baseline. If `code == 'false'` after the filter runs, every
          # changed file was a doc file → docs_only short-circuit. If
          # `code == 'true'`, at least one non-doc file changed → full
          # suite.
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.markdown'
              - '!docs/**'
              - '!LICENSE*'
              - '!CHANGELOG.md'
              - '!.markdownlint*'
              - '!CLAUDE.md'
              - '!AGENTS.md'
              - '!README*'

      - id: compute
        # On non-PR events, leave docs_only as the empty string so the
        # downstream `!= 'true'` guard falls through and heavy jobs run.
        # This is the safe-by-default branch for tag pushes, force-
        # pushes, and any event where the diff isn't a clean two-commit
        # range.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ steps.filter.outputs.code }}" = "false" ]; then
              echo "docs_only=true" >> "$GITHUB_OUTPUT"
            else
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  # `check` is the test + build job. Linting moved to the `lint` job
  # below so lint failures and test failures are surfaced independently
  # and can run in parallel.
  check:
    name: check
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: test + build
        run: |
          just test
          just build

      # The test/oracle nested module quarantines cerberus's test-only
      # consumers of the AGPLv3 grafana/loki / grafana/tempo parsers out
      # of the root module graph (so they never reach the Apache-2.0
      # `cmd/cerberus` binary — see the agpl-clean job below). Its tests
      # still have to RUN, so exercise the module here from the check job
      # rather than silently dropping coverage. `just test` / root
      # `go test ./...` stop at the nested go.mod, so this is a separate
      # invocation.
      - name: test oracle module
        run: go test ./...
        working-directory: test/oracle

  # `lint` consolidates ALL linting in one job:
  #   - Go (golangci-lint v2 = formatters + linters from .golangci.yml)
  #   - Commit messages (commitlint, PR-only)
  #   - Markdown (markdownlint-cli2)
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # commitlint needs full history

      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: golangci-lint (Go + formatters)
        # v7+ is required for golangci-lint v2; v6 caps at v1.
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          # Honours .golangci.yml; runs across the whole module.
          args: ./...

      # go-arch-lint enforces the cerberus layering (parse → lower →
      # optimize → emit → execute) declared in .go-arch-lint.yml.
      # No first-party Action exists; install via `go install` so it
      # reuses setup-go's module cache.
      - name: install go-arch-lint
        run: go install github.com/fe3dback/go-arch-lint@v1.15.0

      - name: go-arch-lint
        run: go-arch-lint check

      # opt-feature-table drift gate. The structural feature table (id /
      # minVersion / stability) in docs/clickhouse-optimizations.md is
      # GENERATED from internal/chopt/registry.go by cmd/optdocs. Regenerate
      # and fail if the committed block differs from what the registry
      # produces, so a new registry feature can never go missing from the doc
      # (the ts_grid_changes / ts_grid_resets audit gap, made structurally
      # impossible). Same git-diff-exit-code pattern as chart-ci's
      # helm-docs-drift gate. Runs on every PR and on push to main, so as a
      # required status check it gates a release PR's merge-when-green too (a
      # release publishes only after the PR merges with every required check
      # green on a tree up to date with main).
      - name: opt-feature-table drift check
        run: |
          go generate ./internal/chopt/
          git diff --exit-code -- docs/clickhouse-optimizations.md \
            || { echo "::error::docs/clickhouse-optimizations.md is stale — run 'just gen-opt-docs' and commit the result"; exit 1; }

      # actionlint validates the workflow files themselves (expression
      # contexts, action inputs, shellcheck of run blocks). GitHub
      # rejects invalid workflow files SERVER-side as zero-job
      # "invalid workflow file" failure runs, which silently prevents
      # required pull_request checks from ever being scheduled — the
      # #749 secrets-in-step-if incident left a PR BLOCKED on four
      # required contexts that could never report. Version pinned in
      # lock-step with Justfile's ACTIONLINT_VERSION; no first-party
      # Action exists, `go install` reuses setup-go's module cache
      # (same pattern as go-arch-lint above).
      - name: install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: actionlint
        run: actionlint

      # commitlint runs over the PR's commit range. This used to be
      # wagoid/commitlint-github-action, but that action is Docker-based
      # and pulls its image from Docker Hub on every run — an anonymous
      # image-pull rate-limit flake failed the lint job (run
      # 27249869293). The npm path below installs @commitlint/cli from
      # the npm registry instead, removing the Docker Hub dependency,
      # and lints the same range the wagoid action used for
      # pull_request events: base.sha..head.sha, i.e. the commits
      # unique to the PR head. `fetch-depth: 0` on the checkout above
      # guarantees both SHAs exist locally.
      # Shared by commitlint (pull_request only) and the Playwright
      # typecheck below (every event) — set up unconditionally so both
      # consumers find a Node toolchain.
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: test/e2e/playwright/package-lock.json

      # The Playwright e2e specs run via Playwright's transpile-only
      # esbuild loader, which strips types and NEVER type-checks. A
      # latent TS error (e.g. a self-referential `as typeof x` cast that
      # collapsed an error-envelope to `never` in
      # iterate-time-ranges.spec.ts) therefore compiled green and the
      # required compose-smoke gate stayed green over it. This step
      # closes that hole: `tsc --noEmit` over the whole playwright
      # tsconfig, no browser, sub-second. Fast enough to live in the
      # lint job rather than gate behind the compose stack.
      - name: typecheck e2e Playwright specs
        working-directory: test/e2e/playwright
        run: |
          npm ci
          npx --no -- tsc --noEmit -p tsconfig.json

      - name: commitlint
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          npm install --no-save @commitlint/cli@19 @commitlint/config-conventional@19
          npx --no -- commitlint --config .commitlintrc.json \
            --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            **/*.md
            !compatibility/prometheus/upstream/**
            !compatibility/tempo/upstream/**
            !compatibility/loki/upstream/**
            !**/node_modules/**

      # doc-to-code reference integrity. Greps docs/**/*.md for inline
      # `(internal|cmd|test|deploy)/<path>.go[:line]` (+ dir) citations and
      # HARD-FAILS on a path that no longer exists or a line pin past EOF.
      # See .github/scripts/doc-refs.mjs + .github/scripts/README.md. The
      # `--test` guard pins the extraction regex + verdict logic so the
      # detectors can't silently rot into a no-op (same idiom as the
      # compose-smoke / dashboard matrix guards).
      - name: doc-refs self-test (regex + verdict guard)
        run: node --test .github/scripts/doc-refs.test.mjs

      - name: doc-to-code reference check
        run: node .github/scripts/doc-refs.mjs

  # `forbid-skip` is the GA test-discipline gate. The maintainer's
  # NON-NEGOTIABLE rule is "no t.Skip in test files — fix the bug, do
  # not skip." Greps `*_test.go` for `t.Skip` / `t.Skipf` / `t.SkipNow`
  # via `git ls-files` (already excludes .gitignored paths) and fails
  # the build if any match.
  #
  # The remaining steps enforce test-skipping BEHAVIOUR, not prose:
  # soft-assertion / silent-recover patterns, non-empty `should_skip:`
  # overlay entries, test escape-hatch primitives, and "not implemented"
  # in production code. A prior `wording-tests` scan that banned the
  # words "not implemented" / "skipped" / "deferred" in test files +
  # TXTAR fixtures was removed: it policed vocabulary rather than
  # behaviour and false-positived on honest descriptions of correct,
  # version-gated tests, without catching anything the behavioural scans
  # miss.
  #
  # Vendored upstream snapshots under `compatibility/*/upstream/**`
  # are excluded — reference material outside cerberus's authorship
  # boundary (and pinned by their respective VERSION files). Runs in
  # parallel with `check` + `lint`; flip on as a required status check
  # via branch protection.
  forbid-skip:
    name: forbid-skip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # The new-should_skip-additions guard diffs against
          # origin/main, so we need both refs reachable.
          fetch-depth: 0
      # The discipline scans below are implemented in
      # .github/scripts/forbid-skip.mjs (one $CHECK per scan) — see
      # `.github/scripts/README.md` for the convention. The regexes are
      # kept byte-identical to scripts/test-forbid-skip.sh (the self-test
      # step at the end of this job pins them).
      - name: Reject t.Skip in test files
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: t-skip
      # Production code (non-test) must not advertise "not implemented".
      # The bare words "skipped" / "deferred" are *not* gated here
      # because Go has legitimate uses of both — `defer` statements
      # described in docstrings, runtime "X is skipped" behaviour
      # prose — that would all false-positive. "not implemented" has
      # no legitimate prod meaning: either implement the feature or
      # rewrite to a factual verb (rejected / unsupported / falls back).
      - name: Reject "not implemented" in production code
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: not-implemented
      # Reject soft-assertion patterns that look like real verification
      # but pass tautologically — a discipline pin against fake-pass
      # regressions.
      #
      # Patterns rejected:
      #   - assert.Contains(x, "")           — empty string matches anything
      #   - assert.ElementsMatch(x, []...{}) — empty slice trivially matches
      #   - defer recover()                  — silently swallows panics
      #   - defer func() { _ = recover() }   — explicit silent recover
      #     (single-line AND multi-line; perl slurp catches both)
      #
      # New additions must use the matching deep-assertion form: assert
      # actual content, assert specific panic, or remove the recover.
      # Soft-assertion + multi-line silent-recover scan. The `[^{}]*`
      # clamp keeps the silent-recover match inside a single brace level
      # so it does not over-reach into surrounding bodies, while
      # `_\s*=\s*recover` discriminates a silent swallow from the
      # legitimate `r := recover(); if r == nil { t.Fatal(...) }`
      # assert-the-panic pattern. Both the grep ERE and the perl slurp
      # live in forbid-skip.mjs verbatim.
      - name: Reject soft-assertion / silent-recover patterns
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: soft-assert
      # Reject any non-empty `should_skip:` overlay entry. The harness
      # consumer code was removed, so an entry would be silently
      # ignored. `should_skip: []` is the only accepted form (kept
      # for schema documentation); any element under the key
      # re-introduces the anti-pattern. The rule is structural: every
      # failure must surface as a real bug to fix at the source.
      # Multi-line scan: detect `should_skip:` followed by a block child
      # (`- source:`) — i.e. a non-empty entry. The accepted empty form
      # `should_skip: []` does not match. Perl slurp lives in forbid-skip.mjs.
      - name: Reject should_skip overlay entries
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: should-skip
      # Regex self-test for the forbid-skip gate. Every pattern
      # documented in docs/forbid-skip.md has a canonical match-example
      # and a counter-example; this step asserts the regexes still
      # classify both correctly. When a future PR widens or normalises
      # the gate, update docs/forbid-skip.md AND
      # scripts/test-forbid-skip.sh in the same change.
      - name: Self-test forbid-skip regex set
        run: |
          scripts/test-forbid-skip.sh
      # Reject test-suite escape-hatch primitives. Each pattern below
      # is a documented anti-pattern that masks real bugs:
      #
      #   - `EXPECTED_EMPTY` / `EXPECTED_TOLERATED` / `isKnownTolerated*` /
      #     `tolerated404` — allow-list arrays consulted before failing.
      #   - `expect.soft(...)` — assertion that records a failure but
      #     lets the test "continue" (Playwright); easy to miss in CI
      #     summaries.
      #   - `should_skip` / `should_tolerate` in code — the YAML schema
      #     was removed; any occurrence here is a re-introduction.
      #   - `skipReason` / `SkipReason` — the loki driver's
      #     overlay-driven skip field, removed.
      #
      # If a real test surfaces noise, fix the noise at the source
      # (cerberus code, seed, dashboard, panel). Never silence it
      # with one of these.
      - name: Reject test escape-hatch patterns
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: escape-hatch
      # ClickHouse version-consistency gate. versions.yaml is the single
      # source of truth for the ClickHouse versions the deployment surface
      # depends on (min floor, quickstart image, chDB substrate); this check
      # asserts the docker-compose quickstart + compatibility image tags,
      # the preflight floor, and the substrate all match it, AND - the
      # critical one - that the quickstart is new enough to demo every
      # optimization it enables (floors derived from internal/chopt/registry.go,
      # which stays the SoT for per-feature floors). When a new optimization's
      # floor exceeds the quickstart, this fails until the quickstart and
      # versions.yaml are bumped - see docs/optimization-rules.md (Rule 1).
      - name: ClickHouse version-sync self-test
        run: node .github/scripts/clickhouse-version-sync.mjs --self-test
      - name: ClickHouse version-sync gate
        run: node .github/scripts/clickhouse-version-sync.mjs
      # Assert-from-source doc-count gate. Doc prose states integer counts
      # that DESCRIBE source structures ("N forbid-skip checks", "N-layer
      # test map"); those literals rot the moment the structure grows. This
      # step derives each count LIVE from the source (the forbid-skip CHECK
      # switch arms; the `### Layer N` headings in docs/test-strategy.md) and
      # fails on any doc that drifts from it. The `--self-test` run proves
      # each assertion still FAILS on a deliberate mismatch — see
      # .github/scripts/README.md.
      - name: Assert doc-stated counts match source
        run: |
          node .github/scripts/doc-counts.mjs --self-test
          node .github/scripts/doc-counts.mjs

  # `link-check` is the INTERNAL markdown link + anchor integrity gate. It
  # runs lychee in pure OFFLINE mode (`--offline --include-fragments`): no
  # network is touched, so it CANNOT flake on a slow/blocked host — every
  # check is a same-process filesystem + in-document anchor resolution. It
  # validates that every relative `[text](./other.md#anchor)` link points at a
  # file that exists AND, for `#fragment` links, that the target heading /
  # anchor exists in the target document. External `http(s)://` links are
  # NOT checked here — host availability is inherently flaky and must never
  # red a PR or abort a tag; that lives in the schedule-only
  # `link-check-external.yml` workflow instead.
  #
  # Runs on pull_request AND push-to-main so it is eligible as a required
  # status check (branch protection); as a required check it gates a release
  # PR's merge-when-green too (a release publishes only after the PR merges
  # with every required check green), making it a release gate too.
  #
  # Vendored upstream snapshots under `compatibility/*/upstream/**` are
  # excluded, mirroring the markdownlint + forbid-skip exclude set — they are
  # reference material outside cerberus's authorship boundary.
  link-check:
    name: link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # OFFLINE link + fragment check. `--root-dir` anchors absolute-style
      # `/foo` links at the repo root; `--include-fragments` turns on the
      # in-document `#anchor` existence check. `fail: true` makes a broken
      # link/anchor fail the job. No `GITHUB_TOKEN` and no network: this lane
      # is deterministic by construction.
      - name: lychee (offline internal links + anchors)
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --offline
            --include-fragments
            --root-dir "$GITHUB_WORKSPACE"
            --exclude-path compatibility/prometheus/upstream
            --exclude-path compatibility/tempo/upstream
            --exclude-path compatibility/loki/upstream
            --exclude-path node_modules
            "**/*.md"

  # `agpl-clean` is the provably-clean-build licence gate. Cerberus ships
  # under Apache-2.0. Its LogQL / TraceQL parsers are in-house clean-room
  # Apache reimplementations (internal/logql/lsyntax, internal/logql/logpattern,
  # internal/drain, internal/traceql/ast), and PromQL uses the upstream Apache
  # prometheus parser — so no AGPLv3 grafana/loki or grafana/tempo code reaches
  # the binary. The only grafana/tempo subtree the binary may link is the
  # Apache-licensed pkg/tempopb wire types. Test-only AGPL oracles + the
  # compatibility harnesses are quarantined in the test/oracle nested module
  # and never enter the binary graph.
  #
  # ENFORCING: the gate runs `go list -deps ./cmd/cerberus` and FAILS (exit 1)
  # if any AGPL package is reachable from the binary (grafana/loki/* or
  # grafana/tempo/* except pkg/tempopb). Logic lives in
  # .github/scripts/agpl-clean.mjs (node: builtins only). Add to branch
  # protection as a required status check.
  agpl-clean:
    name: agpl-clean
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: AGPL clean-build gate
        run: node .github/scripts/agpl-clean.mjs
