name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # `check` is the test + build job. Linting moved to the `lint` job
  # below so lint failures and test failures are surfaced independently
  # and can run in parallel.
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: test + build
        run: |
          just test
          just build

  # `lint` consolidates ALL linting in one job:
  #   - Go (golangci-lint v2 = formatters + linters from .golangci.yml)
  #   - Commit messages (commitlint, PR-only)
  #   - Markdown (markdownlint-cli2)
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # commitlint needs full history

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: golangci-lint (Go + formatters)
        # v7+ is required for golangci-lint v2; v6 caps at v1.
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          # Honours .golangci.yml; runs across the whole module.
          args: ./...

      # go-arch-lint enforces the cerberus layering (parse â†’ lower â†’
      # optimize â†’ emit â†’ execute) declared in .go-arch-lint.yml.
      # No first-party Action exists; install via `go install` so it
      # reuses setup-go's module cache.
      - name: install go-arch-lint
        run: go install github.com/fe3dback/go-arch-lint@v1.15.0

      - name: go-arch-lint
        run: go-arch-lint check

      - name: commitlint
        if: github.event_name == 'pull_request'
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !harness/prometheus-compliance/upstream/**
            !harness/tempo-compatibility/upstream/**
            !**/node_modules/**

  # `forbid-skip` is the GA test-discipline gate. The maintainer's
  # NON-NEGOTIABLE rule is "no t.Skip in test files â€” fix the bug, do
  # not skip." Greps `*_test.go` for `t.Skip` / `t.Skipf` / `t.SkipNow`
  # via `git ls-files` (already excludes vendor / .gitignored paths)
  # and fails the build if any match. Runs in parallel with `check` +
  # `lint`; flip on as a required status check via branch protection.
  forbid-skip:
    name: forbid-skip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Reject t.Skip in test files
        run: |
          if git ls-files -z -- '*_test.go' | xargs -0 grep -nE 't\.Skip[fN]?\(' --; then
            echo "::error::t.Skip / t.Skipf / t.SkipNow found in test files â€” fix the bug, do not skip"
            exit 1
          fi
