name: tempo-compatibility

# Status: PR 4 of docs/tempo-compliance-plan.md. The driver this
# workflow invokes runs both subcommands in sequence: seed (push OTLP
# into Tempo + INSERT into ClickHouse for cerberus + smoke
# /api/traces/<id>) then diff (TXTAR corpus through /api/search +
# /api/traces; markdown report under reports/).
#
# Triggers:
#   * workflow_dispatch  — manual runs from the GH UI.
#   * schedule           — nightly (offset from sibling harnesses to
#                          spread runner load).
#   * push to main       — informational only; promotion to a required
#                          PR check is PR 7 of the rollout.
#   * pull_request       — path-filtered to tempo files so PRs that
#                          touch the harness or traceql surface get
#                          early signal.
#
# Per ~/.claude/CI_STEPS.md, every step uses an official / well-known
# Action — no `curl | sh` installs. Actions used here:
#   * actions/checkout@v6        — stdlib.
#   * docker/setup-buildx-action@v4  — buildkit-backed `docker build`.
#   * actions/upload-artifact@v7 — report artifact upload.

on:
  pull_request:
    branches: [main]
    paths:
      - 'internal/api/tempo/**'
      - 'internal/traceql/**'
      - 'harness/tempo-compatibility/**'
      - '.github/workflows/tempo-compatibility.yml'
  workflow_dispatch:
  schedule:
    # Nightly at 04:23 UTC. Offset from compatibility.yml (04:11) and
    # the e2e dashboard run so concurrent runs don't fight for the
    # ubuntu-latest pool.
    - cron: '23 4 * * *'
  push:
    branches: [main]
    paths:
      - 'internal/api/tempo/**'
      - 'internal/traceql/**'
      - 'harness/tempo-compatibility/**'
      - '.github/workflows/tempo-compatibility.yml'

permissions:
  contents: read

concurrency:
  group: tempo-compatibility-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  tempo-compatibility:
    name: tempo/compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # Buildx gives the Compose build cache, multi-arch support, and a
      # consistent build backend. The harness uses local build contexts
      # (cerberus + driver), so no remote registry login is needed.
      - uses: docker/setup-buildx-action@v4

      - name: Run tempo-compatibility harness
        id: harness
        env:
          FAIL_ON_DIFF: "1"
        run: ./harness/tempo-compatibility/scripts/run-tempo-compatibility.sh

      - name: Upload report
        # `if: always()` so we capture whatever the driver wrote even
        # when the harness step failed. PR 4 wires up the differ which
        # writes diff.md under this directory; the seeder leaves it
        # empty.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tempo-compatibility-report
          path: harness/tempo-compatibility/reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Fail job if harness step failed
        if: always() && steps.harness.outcome == 'failure'
        run: |
          echo "::error title=tempo compatibility suite failed::harness step failed -- see logs and uploaded report"
          exit 1
