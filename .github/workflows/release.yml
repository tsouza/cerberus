name: release

on:
  push:
    tags:
      # App releases: `vX.Y.Z` (+ prerelease). Runs preflight + goreleaser
      # (binary/image/provenance) AND chart-release — which publishes the
      # chart ONLY if its Chart.yaml version changed, so an app-only tag never
      # republishes an unchanged chart.
      - 'v*.*.*'
      - 'v*.*.*-*'
      # Chart-only releases: `chart-vX.Y.Z` — the chart has its OWN SemVer
      # line, so a chart-only change (template fix, new toggle, values change)
      # ships without re-tagging the app. goreleaser is guarded off these tags
      # (see its `if:`); only preflight + chart-release run.
      - 'chart-v*.*.*'
      - 'chart-v*.*.*-*'

permissions:
  contents: write
  packages: write
  # SLSA provenance attestation needs `id-token` (Sigstore OIDC) +
  # `attestations` (writes the attestation record back to the repo).
  id-token: write
  attestations: write
  # The preflight gate reads the check-runs / statuses on the tagged commit.
  checks: read
  statuses: read

jobs:
  # Refuse to publish unless the tagged commit IS main's HEAD and EVERY check
  # on it is FULLY SETTLED GREEN — nothing still running, nothing red/cancelled,
  # on ANY lane. No flaky-lane exclusions, no scheduled-event heuristics: the
  # whole of main, complete and green, or the release aborts before goreleaser
  # publishes anything. The only checks excluded are this release run's own
  # jobs (they are necessarily in-progress here). See release-preflight.mjs.
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Pin the gate logic
        run: node .github/scripts/release-preflight.mjs --self-test
      - name: Verify main HEAD is fully complete + green on the tagged commit
        run: node .github/scripts/release-preflight.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SELF_JOBS: preflight,goreleaser,chart-release

  release:
    name: goreleaser
    needs: preflight
    # App-binary release only — skipped on chart-only `chart-v*` tags (those
    # publish just the chart via chart-release below).
    if: ${{ !startsWith(github.ref_name, 'chart-v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Whether THIS tag is the highest stable release (so it may move the
      # rolling `:latest` images). A stable BACKPORT (e.g. v1.2.1 cut after
      # v1.3.0) is NOT the highest -> `:latest` stays on v1.3.0. goreleaser
      # reads this via `.Env.RELEASE_IS_LATEST` in the `latest-*` skip_push.
      # Needs fetch-depth: 0 above so all tags are present.
      - name: Determine if this tag is the latest stable release
        run: |
          tag="${GITHUB_REF_NAME#v}"
          highest=$(git tag -l 'v*.*.*' | awk '!/-/' | sed 's/^v//' | sort -V | tail -1)
          if [ "$tag" = "$highest" ]; then
            echo "RELEASE_IS_LATEST=true" >> "$GITHUB_ENV"
          else
            echo "RELEASE_IS_LATEST=false" >> "$GITHUB_ENV"
          fi
          echo "tag=$tag highest_stable=$highest RELEASE_IS_LATEST set accordingly"

      - id: goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_IS_LATEST: ${{ env.RELEASE_IS_LATEST }}

      # SLSA build provenance for the release binaries. Lets downstream
      # consumers verify each artifact was built from this repo at this
      # commit via `gh attestation verify ...`. Sigstore signs the
      # attestation through the workflow's OIDC token.
      - name: Attest release binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*.tar.gz'

      # goreleaser created the release as a DRAFT (see .goreleaser.yml
      # release.draft) so it could attach the binary archives + checksums
      # while the release was still mutable. Flip it to published now, AFTER
      # the assets and provenance are in place: the repo's immutable-releases
      # policy then freezes the release WITH its assets. Publishing up-front
      # (e.g. `gh release create`) would lock it before goreleaser could
      # upload -- the 422 that broke v1.0.1. Idempotent: a no-op if already
      # published.
      - name: Publish the release (flip draft -> published)
        run: gh release edit "${{ github.ref_name }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish the Helm chart to GHCR as an OCI artifact, cosign-sign it keyless,
  # attest provenance, and (idempotently) push the Artifact Hub metadata. Gated
  # on the same preflight as the binary release. The chart is published ONLY
  # when its Chart.yaml `version:` differs from what's already in the registry —
  # an app-only `v*` tag must not republish an unchanged chart (chart-publish.mjs
  # version-gate). cosign + oras are installed via their official actions.
  chart-release:
    name: chart-release
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      CHART_DIR: deploy/helm/cerberus
      OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/cerberus/charts
      CHART_NAME: cerberus
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: v3.21.1

      # cosign-installer publishes NO moving v4 major tag (only v3 floats);
      # pin the exact latest v4 patch or the job fails with "unable to resolve
      # action sigstore/cosign-installer@v4".
      - uses: sigstore/cosign-installer@v4.1.2

      - uses: oras-project/setup-oras@v2

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: gate
        name: Chart version gate (skip if unchanged)
        run: node .github/scripts/chart-publish.mjs version-gate

      - name: helm package
        if: steps.gate.outputs.publish == 'true'
        run: helm package "$CHART_DIR" --destination "$RUNNER_TEMP"

      - id: push
        name: helm push + capture digest
        if: steps.gate.outputs.publish == 'true'
        run: node .github/scripts/chart-publish.mjs push
        env:
          CHART_TGZ: ${{ runner.temp }}/cerberus-${{ steps.gate.outputs.version }}.tgz

      - name: cosign sign (keyless)
        if: steps.gate.outputs.publish == 'true'
        run: cosign sign --yes "${{ steps.push.outputs.ref }}"

      - name: Attest chart provenance
        if: steps.gate.outputs.publish == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/cerberus/charts/cerberus
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Push Artifact Hub metadata
        if: steps.gate.outputs.publish == 'true'
        run: node .github/scripts/chart-publish.mjs ah-metadata
