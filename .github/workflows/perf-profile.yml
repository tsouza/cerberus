name: perf-profile

# Corpus-wide perf fan-out profiler (perf-assessment Component B).
#
# The Phase-1 perf audit found that every perf bug cerberus shipped was
# COMPUTE FAN-OUT: a normal-sized table scan whose INTERMEDIATE row set
# exploded (a CROSS / ARRAY JOIN, a range-window cross product, a
# recursive-CTE closure), blowing up peak memory. The reactive guards
# under test/perf/ each pin ONE construct a human already caught; a
# fan-out in an unregistered construct slips through.
#
# This lane closes that gap with corpus-wide BREADTH. It walks EVERY
# executable TXTAR fixture under test/spec/** (those declaring
# `seed:` + `expected_rows:` + `sql:`) and, per fixture, profiles the
# fan-out signal in-process via chDB:
#
#   - EXPLAIN PLAN actions=1     — CROSS JOIN / ARRAY JOIN / recursive-CTE
#                                  operator detection.
#   - per-subquery-level count() — peak intermediate cardinality vs the
#                                  leaf scan row count (fan_factor).
#   - chDB native bytes_read     — peak-memory proxy (chDB's embedded
#                                  engine exposes neither query_log nor
#                                  peak_memory_usage).
#
# It emits one JSON record per fixture, uploads the array as an artifact,
# and renders the highest-fan_factor fixtures into the job step summary.
#
# Informational on push/nightly, but ALSO a parity lane on the
# publish-on-merge release flow: it runs on EVERY pull_request so it can be a
# required status check, short-circuiting to a green no-op on a non-release PR
# and profiling the corpus only on a `release/*` PR (so a release PR's green
# status includes the fan-out profile). The deterministic per-construct
# ASSERTION pins (the `perf-guards` job in chdb.yml) stay the always-on gating
# lane; this one stays breadth-coverage. Mirrors chart-ci.yml's no-op pattern.
#
# Triggers: pull_request + push-to-main + nightly + manual dispatch.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # nightly at 05:00 UTC (after the chdb lane's 04:00 cron)
    - cron: '0 5 * * *'

permissions:
  contents: read

concurrency:
  group: perf-profile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  profile:
    name: profile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # RUN_HEAVY gates the real work: true on push / schedule / dispatch, and on
    # a release PR (head branch release/*). On a regular PR every heavy step is
    # skipped and the job reports green without work — so `profile` can be a
    # required check that gates release PRs but never blocks ordinary PRs.
    env:
      RUN_HEAVY: ${{ github.event_name != 'pull_request' || startsWith(github.head_ref, 'release/') }}
    steps:
      - uses: actions/checkout@v7

      - if: env.RUN_HEAVY == 'true'
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - if: env.RUN_HEAVY == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install libchdb.so
        if: env.RUN_HEAVY == 'true'
        run: just chdb-install

      - name: Profile corpus fan-out
        if: env.RUN_HEAVY == 'true'
        run: |
          go run -tags chdb ./cmd/perf-profile \
            -spec test/spec \
            -out perf-profile.json \
            -md "$GITHUB_STEP_SUMMARY" \
            -top 40

      - name: No-op (non-release PR)
        if: env.RUN_HEAVY != 'true'
        run: echo "perf-profile is a green no-op on non-release PRs (real run on push/nightly/dispatch + release/* PRs)."

      - name: Upload profile artifact
        if: always() && env.RUN_HEAVY == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: perf-profile
          path: perf-profile.json
          if-no-files-found: warn
          retention-days: 30
