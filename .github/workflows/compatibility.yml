name: compatibility

# Unified compatibility CI for all three heads (PromQL / LogQL / TraceQL).
#
# Each head has its own job; the job-level `name:` is `compatibility/<head>`
# so the per-job status check shows up in PR status / branch protection as
# that string. The harness directories live under `compatibility/<head>/`
# (parallel to `internal/`), and each job's path filter is scoped to the
# inputs that can plausibly shift parity for that head — a refactor inside
# `internal/promql/` does not need to rerun the LogQL or TraceQL stacks.
#
# Per ~/.claude/CI_STEPS.md, every step uses an official / well-known
# Action — no `curl | sh` installs. Actions used here:
#   * actions/checkout@v6           — stdlib.
#   * actions/setup-go@v6           — `go run ./cmd/seed` + driver builds.
#   * docker/setup-buildx-action@v4 — buildkit-backed compose build.
#   * docker/login-action@v3        — authed Docker Hub pulls (rate limits).
#   * taiki-e/install-action@v2     — installs `just`.
#   * actions/upload-artifact@v7    — per-head report upload.
#
# Each job ALSO:
#   - appends the head's compat percent / passed-over-total to
#     $GITHUB_STEP_SUMMARY so the workflow summary page surfaces the
#     three scores side by side without the reader having to download
#     the artifact;
#   - on `push: main` only (NOT pull_request / cron / workflow_dispatch),
#     commits the head's `compat-score.json` to the `compat-scores`
#     orphan branch at `badges/<head>.json`. That branch is the
#     long-lived "shields.io endpoint badge" source — README badges hit
#     a stable raw URL under it. The orphan branch is intentionally NOT
#     covered by branch-protection rules (covering it would create an
#     infinite check-rerun loop). First-run bootstrap creates the
#     orphan branch in-place via `git checkout --orphan compat-scores`.

on:
  # PR trigger has no `paths:` filter so the three head checks always
  # appear in the rollup. This is intentional for the
  # required-status-checks promotion: path-skipped checks would leave
  # the rollup missing entries and block merges.
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'internal/promql/**'
      - 'internal/logql/**'
      - 'internal/traceql/**'
      - 'internal/api/prom/**'
      - 'internal/api/loki/**'
      - 'internal/api/tempo/**'
      - 'internal/chsql/**'
      - 'internal/optimizer/**'
      - 'internal/chplan/**'
      - 'compatibility/**'
      - '.github/workflows/compatibility.yml'
  schedule:
    # Nightly cron entries are offset to spread runner load across the
    # three heads + the e2e dashboard run on the ubuntu-latest pool:
    #   prometheus  04:11 UTC
    #   tempo       04:23 UTC
    #   loki        04:37 UTC
    - cron: '11 4 * * *'
    - cron: '23 4 * * *'
    - cron: '37 4 * * *'
  workflow_dispatch:

permissions:
  # `contents: write` is required for the "Publish score to compat-scores
  # branch" step (push: main only) — it commits per-head `compat-score.json`
  # files to the `compat-scores` orphan branch so shields.io can read them
  # via a stable raw URL. The orphan branch lives in the same repo, so a
  # repo-scoped GITHUB_TOKEN with write access is enough; no PAT needed.
  # Other event types (pull_request, schedule, workflow_dispatch) never
  # reach the publish step (it is gated by `if: github.event_name == 'push'
  # && github.ref == 'refs/heads/main'`), so they effectively run as
  # read-only despite the elevated grant.
  contents: write

concurrency:
  group: compatibility-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # See `.github/workflows/ci.yml` for the rationale + filter convention.
  # On `pull_request` we compute whether every changed file is a doc
  # file; if so, the per-head compatibility jobs short-circuit. On every
  # other event we fall through to the full suite.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.compute.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request'

      - id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          # See ci.yml for why `every` is required (the `**` baseline
          # plus negation patterns would otherwise always be true).
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.markdown'
              - '!docs/**'
              - '!LICENSE*'
              - '!CHANGELOG.md'
              - '!.markdownlint*'
              - '!CLAUDE.md'
              - '!AGENTS.md'
              - '!README*'

      - id: compute
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ steps.filter.outputs.code }}" = "false" ]; then
              echo "docs_only=true" >> "$GITHUB_OUTPUT"
            else
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  # `gate` is the cheap-first tripwire. The compatibility harnesses are
  # the most expensive PR lane (~8-10 min each, three Docker differential
  # heads), so we DON'T want to burn that runner time when a trivial
  # discipline-grep or a compile break would have failed the PR anyway.
  # `gate` runs the same fast checks ci.yml's `forbid-skip` job runs
  # (pure `git grep`, seconds) plus a `go build ./...` compile sanity
  # check (~1-2 min with the module cache), and every expensive job below
  # `needs: gate`. On a cheap-breakage PR the heavy heads are SKIPPED —
  # which branch protection treats as satisfied, but that is safe because
  # ci.yml's own `forbid-skip` / `check` go RED and block the merge. The
  # gate only saves runner minutes; it never creates a merge hole. See
  # the PR that introduced this for the full truth table.
  #
  # Docs-only short-circuit is preserved: `gate` itself is cheap enough
  # to always run, and the heavy heads keep their own
  # `needs.changes.outputs.docs_only != 'true'` guard, so a docs-only PR
  # still skips them.
  gate:
    name: gate
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # The discipline scans diff against origin/main, so we need
          # both refs reachable (mirrors ci.yml's forbid-skip checkout).
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      # The six discipline scans (pure `git grep` / `perl`, no Go
      # toolchain) — byte-identical to ci.yml's `forbid-skip` job. These
      # run first because they are the cheapest and the most common
      # cause of a red PR.
      - name: Reject t.Skip in test files
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: t-skip
      - name: Reject "not implemented" / "skipped" / "deferred" in tests + fixtures
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: wording-tests
      - name: Reject "not implemented" in production code
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: not-implemented
      - name: Reject soft-assertion / silent-recover patterns
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: soft-assert
      - name: Reject should_skip overlay entries
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: should-skip
      - name: Reject test escape-hatch patterns
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: escape-hatch

      # Compile sanity check. Far cheaper than `go test -race` (ci.yml's
      # `check`), but catches a non-building tree before the Docker heads
      # spin up — every head builds cerberus anyway.
      - name: go build (compile sanity)
        run: go build ./...

  prometheus:
    name: compatibility/prometheus
    needs: [changes, gate]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # NOTE: job-level `continue-on-error: true` was REMOVED here on
    # purpose. Previously it combined with `if: always()` on Summarise
    # / Upload to make every job-level failure (e.g. CH container
    # unhealthy -> `docker compose up` aborts) report a green workflow
    # conclusion. 20+ consecutive main pushes ran red-at-job /
    # green-at-workflow before this was caught.
    #
    # The new contract: the workflow conclusion MUST track the job
    # conclusion. Summary + artifact upload still run on failure
    # (`if: always()` on those steps), but the explicit
    # "Fail job if compatibility step failed" step at the end
    # re-raises a non-zero exit when the harness step diverged or
    # crashed, so the workflow badge / GH Project status correctly
    # turns red.
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      # Authenticated Docker Hub pulls get a far higher rate limit than
      # anonymous pulls from shared runner IPs — two image-pull flakes
      # in one night hit this workflow (run 27241748868). Skips
      # silently when the secrets are absent (forks). Mirroring the
      # upstream images to GHCR is the stronger long-term fix.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN_SET == 'true' }}
        env:
          DOCKERHUB_TOKEN_SET: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run compatibility harness
        id: compat
        # IMPORTANT: do NOT add `continue-on-error: true` here.
        # We rely on this step's outcome to drive the workflow's
        # red/green state. `id: compat` lets later steps inspect
        # `steps.compat.outcome` without masking the failure.
        env:
          # The tester binary needs Go 1.21+; we already have it from setup-go.
          # The seed window anchors at 2026-05-11T00:00:00Z (see
          # compatibility/prometheus/cmd/seed/main.go).
          TESTER_END_TIME: "2026-05-11T01:00:00Z"
          TESTER_RANGE: "3600"
        run: ./compatibility/prometheus/scripts/run-compatibility.sh

      - name: Summarise report
        if: always()
        run: |
          # Compatibility-tester results encode "no error" as an empty
          # string, not JSON null — the JSON shape is `"diff": ""` and
          # `"unexpectedFailure": ""` for a passing query. The earlier
          # `== null` checks counted passes as failures and vice versa.
          # `// ""` normalises both null + empty to "" so the partition
          # is consistent.
          if [ -f compatibility/prometheus/report.json ]; then
            jq '{
              total: ([.results[]?] | length),
              passed: ([.results[]? | select((.unexpectedFailure // "") == "" and (.diff // "") == "")] | length),
              diffs: ([.results[]? | select((.diff // "") != "")] | length),
              unexpected_failures: ([.results[]? | select((.unexpectedFailure // "") != "")] | length)
            }' compatibility/prometheus/report.json
          else
            echo "no report produced (harness step likely failed before tester ran)"
          fi

      - name: Append score to step summary
        # Mirrors the loki / tempo jobs: emits a one-row markdown table
        # row to $GITHUB_STEP_SUMMARY so the workflow's summary page shows
        # the at-a-glance parity score next to the per-job log link. The
        # three jobs format identically (head / passed-over-total /
        # percent) via compat-step-summary.mjs so the rendered summary is
        # readable when all three rows land together.
        if: always()
        run: node .github/scripts/compat-step-summary.mjs
        env:
          HEAD: prometheus
          SCORE: compatibility/prometheus/compat-score.json

      - name: Parity-regression ratchet
        # GATE: this is what makes compatibility/prometheus a real
        # source-of-truth check rather than an informational badge. PR
        # #503 (task #68) downgraded per-case diffs to report-only so the
        # harness exits 0 even on a numeric regression; this step restores
        # the gate by failing the job when the run's compat-score.json
        # drops below the committed per-head floor in
        # compatibility/parity-baseline.json. It compares integers
        # (passed/total), not floats, so it can't flake (see the script
        # header). Runs only when the harness itself succeeded — a harness
        # infra failure is re-raised by the "Fail job" step below, and the
        # ratchet shouldn't double-report a missing score in that path.
        if: steps.compat.outcome == 'success'
        run: node .github/scripts/compat-ratchet.mjs
        env:
          HEAD: prometheus
          SCORE: compatibility/prometheus/compat-score.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compatibility-prometheus-report
          # Glob picks up both the upstream tester's report.json AND the
          # shields.io endpoint-badge compat-score.json the prom scorer
          # emits next to it. `if-no-files-found: warn` keeps the upload
          # step green when the harness crashed before producing either
          # file (the explicit "Fail job" step still re-raises the
          # underlying failure).
          path: |
            compatibility/prometheus/report.json
            compatibility/prometheus/compat-score.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish score to compat-scores branch
        # Only push: main triggers the publish; pull_request / schedule /
        # workflow_dispatch all short-circuit at the `if:` gate. The
        # compat-scores branch
        # is an orphan branch in the same repo that holds shields.io
        # endpoint-badge JSON at badges/<head>.json — README badges hit
        # the raw URL https://raw.githubusercontent.com/tsouza/cerberus/
        # compat-scores/badges/<head>.json.
        #
        # First-run bootstrap: if origin/compat-scores doesn't exist yet,
        # we create it as an --orphan branch with just the badges/ tree.
        # Subsequent runs fast-forward over the previous tip.
        #
        # Concurrency: the three head jobs (prometheus / loki / tempo)
        # may finish near-simultaneously and race to push to the same
        # branch. We retry on "non-fast-forward" rejections by
        # re-fetching the latest tip, re-applying our update, and
        # pushing again — capped at MAX_ATTEMPTS to avoid an infinite
        # loop if the remote is fundamentally unreachable.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          HEAD: prometheus
          SRC: compatibility/prometheus/compat-score.json
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f "$SRC" ]; then
            echo "no score file at $SRC; nothing to publish"
            exit 0
          fi
          git config user.name "cerberus-compat-bot"
          git config user.email "cerberus-compat-bot@users.noreply.github.com"
          # Stash a shields-compatible subset of the score file before we
          # switch branches: the rich score file (passed / total / percent)
          # is great for the artifact + step-summary, but shields.io's
          # endpoint-badge schema is strict and rejects unknown keys with
          # an "invalid properties: passed, total, percent" SVG title.
          # Strip to the four schema-spec keys here so the orphan-branch
          # JSON renders cleanly.
          tmp=$(mktemp)
          jq '{schemaVersion, label, message, color}' "$SRC" > "$tmp"

          MAX_ATTEMPTS=5
          attempt=1
          while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
            echo "==> publish attempt $attempt / $MAX_ATTEMPTS"
            git fetch origin compat-scores 2>/dev/null || true
            if git rev-parse --verify origin/compat-scores >/dev/null 2>&1; then
              git checkout -B compat-scores origin/compat-scores
            else
              # Orphan-bootstrap on first run: detach, clear the index +
              # working tree, then commit the badges/ directory as the
              # branch's initial state.
              git checkout --orphan compat-scores
              git rm -rf . 2>/dev/null || true
              git clean -fdx
            fi
            mkdir -p badges
            cp "$tmp" "badges/${HEAD}.json"
            git add badges/
            if git diff --staged --quiet; then
              echo "score unchanged; no commit needed"
              exit 0
            fi
            git commit -m "compat-scores: update ${HEAD} score"
            if git push origin compat-scores; then
              echo "==> published ${HEAD} score on attempt $attempt"
              exit 0
            fi
            echo "==> push rejected (likely concurrent update); retrying"
            # Reset our local branch state so the next iteration starts
            # from a clean tree before re-fetching.
            git reset --hard
            attempt=$((attempt + 1))
            sleep $((attempt * 2))
          done
          echo "::error title=compat-scores publish failed::could not push ${HEAD} score after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Fail job if compatibility step failed
        # Last step in the job. Re-raises the harness step's failure
        # AFTER the summary and artifact have been emitted, so the
        # workflow conclusion mirrors the harness outcome instead of
        # being masked by `if: always()` housekeeping above.
        if: always() && steps.compat.outcome == 'failure'
        run: |
          echo "::error title=compatibility/prometheus suite failed::compatibility harness (steps.compat) exited non-zero — see the 'Run compatibility harness' step log and the uploaded compatibility-prometheus-report artifact"
          exit 1

  prometheus-forced-route:
    # Phase-2 FLIP proof job for the sharded-pushdown solver. It runs the
    # SAME prometheus differential harness as `compatibility/prometheus`,
    # but starts cerberus with CERBERUS_EVAL_ROUTE=sharded so EVERY
    # eligible plan is forced onto route B (the solver re-anchors K deep
    # copies onto disjoint anchor sub-grids and composes them). Ineligible
    # plans (instant / now64 / un-sliceable / grid-mismatch) still fail
    # toward the byte-identical route A via the Planner. With FAIL_ON_DIFF=1
    # the run hard-fails on ANY per-case diff or unexpected failure vs
    # reference Prometheus, so a green result is the corpus-wide proof that
    # route B == reference — far stronger than the 3 chDB-lane fixtures.
    #
    # This is intentionally a NORMAL CI job, not a branch-protection-required
    # check: its green status on the flip PR is the proof, and keeping it
    # off the required-checks list avoids gating every unrelated PR on the
    # full forced-route corpus run.
    name: compatibility/prometheus-forced-route
    needs: [changes, gate]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN_SET == 'true' }}
        env:
          DOCKERHUB_TOKEN_SET: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run forced-route compatibility harness
        id: compat
        # CERBERUS_EVAL_ROUTE=sharded is interpolated into the cerberus
        # container's environment by docker-compose.yml; FAIL_ON_DIFF=1
        # makes run-compatibility.sh re-raise ANY parity diff. Same seed
        # window + tester knobs as the standard prometheus job so the only
        # variable under test is the routing mode.
        env:
          TESTER_END_TIME: "2026-05-11T01:00:00Z"
          TESTER_RANGE: "3600"
          CERBERUS_EVAL_ROUTE: "sharded"
          FAIL_ON_DIFF: "1"
        run: ./compatibility/prometheus/scripts/run-compatibility.sh

      - name: Summarise report
        if: always()
        run: |
          if [ -f compatibility/prometheus/report.json ]; then
            jq '{
              total: ([.results[]?] | length),
              passed: ([.results[]? | select((.unexpectedFailure // "") == "" and (.diff // "") == "")] | length),
              diffs: ([.results[]? | select((.diff // "") != "")] | length),
              unexpected_failures: ([.results[]? | select((.unexpectedFailure // "") != "")] | length)
            }' compatibility/prometheus/report.json
          else
            echo "no report produced (harness step likely failed before tester ran)"
          fi

      - name: Append score to step summary
        if: always()
        run: |
          set -euo pipefail
          score="compatibility/prometheus/compat-score.json"
          if [ -f "$score" ]; then
            percent=$(jq -r .percent "$score")
            passed=$(jq -r .passed "$score")
            total=$(jq -r .total "$score")
            {
              echo "### compatibility/prometheus-forced-route (CERBERUS_EVAL_ROUTE=sharded)"
              echo ""
              echo "| head | passed/total | percent |"
              echo "|------|--------------|---------|"
              echo "| prometheus (route B) | ${passed}/${total} | ${percent}% |"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "no compat-score.json produced (harness step likely failed before scorer ran)"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compatibility-prometheus-forced-route-report
          path: |
            compatibility/prometheus/report.json
            compatibility/prometheus/compat-score.json
          if-no-files-found: warn
          retention-days: 30

      - name: Fail job if forced-route compatibility step failed
        # Re-raises the harness failure after summary + artifact upload.
        # Under FAIL_ON_DIFF=1 the harness itself exits non-zero on any
        # parity diff, so this step turns the proof job red on drift.
        if: always() && steps.compat.outcome == 'failure'
        run: |
          echo "::error title=compatibility/prometheus-forced-route failed::forced-route harness exited non-zero — route B (CERBERUS_EVAL_ROUTE=sharded) diverged from reference Prometheus, OR an infra failure occurred. See the harness log + the uploaded compatibility-prometheus-forced-route-report artifact"
          exit 1

  promql-surface:
    # Reference-backed full-surface PromQL rejection-completeness gate (#106).
    #
    # Stands up a SECOND reference Prometheus — the same pinned
    # prom/prometheus tag as compatibility/prometheus, but started WITH
    # --enable-feature=promql-experimental-functions (the standard
    # prometheus job deliberately runs flag-OFF for the showcase parity
    # contract, so this is a distinct target). It then drives every
    # parser.Functions symbol + the two experimental aggregators through
    # the flag-enabled reference's HTTP /api/v1/query and asserts that no
    # PromQL function the reference ACCEPTS is silently rejected by
    # cerberus (a coverage gap masquerading as a "parity rejection").
    #
    # The reference verdict is parse + type validation — data-independent,
    # so no ClickHouse / seeding / cerberus container is needed. Cerberus's
    # runtime verdict comes from the in-process pipeline recorded in
    # test/surface-parity/inventory.json (the same parse->lower->optimize->
    # emit path the HTTP handler runs), so the gate is deterministic +
    # dependency-light: a Docker daemon (already on the runner) + node
    # (already on ubuntu-latest). All logic lives in
    # .github/scripts/promql-surface-gate.mjs per the repo CI-scripts rule.
    #
    # This is a NORMAL CI job (not a branch-protection-required check) until
    # it has soaked on main — its green status on this PR is the proof.
    name: compatibility/promql-surface
    needs: [changes, gate]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # See the prometheus job: authed Docker Hub pulls dodge the anonymous
      # rate limit shared across runner IPs; skips silently on forks.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN_SET == 'true' }}
        env:
          DOCKERHUB_TOKEN_SET: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run PromQL surface-completeness gate
        id: gate
        # The script stands up + tears down the flag-enabled reference
        # itself (docker run / rm -f), polls /-/ready, probes every symbol,
        # and exits non-zero on any silent gap / artifact drift / showcase
        # misfile. node ships on ubuntu-latest, so no setup-node is needed.
        run: node .github/scripts/promql-surface-gate.mjs

  tempo:
    name: compatibility/tempo
    needs: [changes, gate]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # Buildx gives the Compose build cache, multi-arch support, and a
      # consistent build backend. The harness uses local build contexts
      # (cerberus + driver), so no remote registry login is needed.
      - uses: docker/setup-buildx-action@v4

      # See the prometheus job: authed Docker Hub pulls dodge the
      # anonymous rate limit shared across runner IPs; skips silently
      # on forks without the secrets.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN_SET == 'true' }}
        env:
          DOCKERHUB_TOKEN_SET: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run tempo-compatibility harness
        id: harness
        # NOTE: the old `FAIL_ON_DIFF: "1"` env here was DEAD — PR #503
        # deleted the `--fail-on-diff` flag from compatibility/tempo/
        # driver/diff.go, so nothing in compatibility/tempo/ ever read
        # this var (grep is clean). It gave a false sense that tempo
        # parity was gated when it wasn't. The real gate is now the
        # "Parity-regression ratchet" step below, which works uniformly
        # across all three heads off compat-score.json. Removed to kill
        # the dead signal.
        run: ./compatibility/tempo/scripts/run-tempo-compatibility.sh

      - name: Append score to step summary
        if: always()
        run: node .github/scripts/compat-step-summary.mjs
        env:
          HEAD: tempo
          SCORE: compatibility/tempo/reports/compat-score.json

      - name: Parity-regression ratchet
        # GATE: see the prometheus job for the full rationale. Fails the
        # job when tempo's compat-score.json drops below the committed
        # floor in compatibility/parity-baseline.json (heads.tempo). This
        # replaces the dead FAIL_ON_DIFF env removed from the harness step
        # above — it is the actual tempo parity gate.
        if: steps.harness.outcome == 'success'
        run: node .github/scripts/compat-ratchet.mjs
        env:
          HEAD: tempo
          SCORE: compatibility/tempo/reports/compat-score.json

      - name: Upload report
        # `if: always()` so we capture whatever the driver wrote even
        # when the harness step failed. The differ writes diff.md and
        # compat-score.json under this directory; the seeder leaves it
        # empty. Globbing the entire reports/ tree picks up both.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compatibility-tempo-report
          path: compatibility/tempo/reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Publish score to compat-scores branch
        # See the prometheus job for the orphan-branch contract. Only
        # push: main reaches this step; other event types short-circuit.
        # Includes a retry loop so the three head jobs can safely race
        # against the same orphan branch.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          HEAD: tempo
          SRC: compatibility/tempo/reports/compat-score.json
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f "$SRC" ]; then
            echo "no score file at $SRC; nothing to publish"
            exit 0
          fi
          git config user.name "cerberus-compat-bot"
          git config user.email "cerberus-compat-bot@users.noreply.github.com"
          # Strip cerberus-only bookkeeping (passed / total / percent)
          # before publishing: shields.io rejects unknown keys on the
          # endpoint-badge schema with an "invalid properties" SVG title.
          tmp=$(mktemp)
          jq '{schemaVersion, label, message, color}' "$SRC" > "$tmp"

          MAX_ATTEMPTS=5
          attempt=1
          while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
            echo "==> publish attempt $attempt / $MAX_ATTEMPTS"
            git fetch origin compat-scores 2>/dev/null || true
            if git rev-parse --verify origin/compat-scores >/dev/null 2>&1; then
              git checkout -B compat-scores origin/compat-scores
            else
              git checkout --orphan compat-scores
              git rm -rf . 2>/dev/null || true
              git clean -fdx
            fi
            mkdir -p badges
            cp "$tmp" "badges/${HEAD}.json"
            git add badges/
            if git diff --staged --quiet; then
              echo "score unchanged; no commit needed"
              exit 0
            fi
            git commit -m "compat-scores: update ${HEAD} score"
            if git push origin compat-scores; then
              echo "==> published ${HEAD} score on attempt $attempt"
              exit 0
            fi
            echo "==> push rejected (likely concurrent update); retrying"
            git reset --hard
            attempt=$((attempt + 1))
            sleep $((attempt * 2))
          done
          echo "::error title=compat-scores publish failed::could not push ${HEAD} score after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Fail job if harness step failed
        if: always() && steps.harness.outcome == 'failure'
        run: |
          echo "::error title=compatibility/tempo suite failed::harness step failed -- see logs and uploaded report"
          exit 1

  loki:
    name: compatibility/loki
    needs: [changes, gate]
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # NOTE: job-level `continue-on-error: true` was removed here.
    # Previously it combined with `if: always()` on Upload to make
    # every job-level failure report a green workflow conclusion.
    # The new contract: the workflow conclusion MUST track the job
    # conclusion. Upload still runs on failure (`if: always()`),
    # but the explicit "Fail job if harness step failed" step at
    # the end re-raises a non-zero exit when the harness step
    # diverged or crashed, so the workflow badge correctly turns red.
    steps:
      - uses: actions/checkout@v6

      # The run script does `go run ./cmd/seed` + `go test -c` of the
      # vendored bench driver, so we need a Go toolchain. setup-go
      # honours go.mod's `go` directive and pulls the matching toolchain.
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      # Buildx gives the Compose build cache + a consistent backend
      # for the local cerberus image context.
      - uses: docker/setup-buildx-action@v4

      # See the prometheus job: authed Docker Hub pulls dodge the
      # anonymous rate limit shared across runner IPs; skips silently
      # on forks without the secrets.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN_SET == 'true' }}
        env:
          DOCKERHUB_TOKEN_SET: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run loki-compatibility harness
        id: harness
        # The script handles its own teardown via an EXIT trap
        # (compose down -v + go.mod / go.sum revert), so no explicit
        # cleanup step is needed even on failure.
        run: ./compatibility/loki/scripts/run-loki-compatibility.sh

      - name: Append score to step summary
        if: always()
        run: node .github/scripts/compat-step-summary.mjs
        env:
          HEAD: loki
          SCORE: compatibility/loki/reports/compat-score.json

      - name: Parity-regression ratchet
        # GATE: see the prometheus job for the full rationale. Fails the
        # job when loki's compat-score.json drops below the committed
        # floor in compatibility/parity-baseline.json (heads.loki).
        if: steps.harness.outcome == 'success'
        run: node .github/scripts/compat-ratchet.mjs
        env:
          HEAD: loki
          SCORE: compatibility/loki/reports/compat-score.json

      - name: Upload report
        # `if: always()` so we capture whatever the driver wrote even
        # when the harness step failed. The script writes the raw
        # `go test -v` stream to compatibility/loki/reports/diff.json
        # and the loki driver writes compat-score.json next to it.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compatibility-loki-report
          path: compatibility/loki/reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Publish score to compat-scores branch
        # See the prometheus job for the orphan-branch contract. Only
        # push: main reaches this step; other event types short-circuit.
        # Includes a retry loop so the three head jobs can safely race
        # against the same orphan branch.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          HEAD: loki
          SRC: compatibility/loki/reports/compat-score.json
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f "$SRC" ]; then
            echo "no score file at $SRC; nothing to publish"
            exit 0
          fi
          git config user.name "cerberus-compat-bot"
          git config user.email "cerberus-compat-bot@users.noreply.github.com"
          # Strip cerberus-only bookkeeping (passed / total / percent)
          # before publishing: shields.io rejects unknown keys on the
          # endpoint-badge schema with an "invalid properties" SVG title.
          tmp=$(mktemp)
          jq '{schemaVersion, label, message, color}' "$SRC" > "$tmp"

          MAX_ATTEMPTS=5
          attempt=1
          while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
            echo "==> publish attempt $attempt / $MAX_ATTEMPTS"
            git fetch origin compat-scores 2>/dev/null || true
            if git rev-parse --verify origin/compat-scores >/dev/null 2>&1; then
              git checkout -B compat-scores origin/compat-scores
            else
              git checkout --orphan compat-scores
              git rm -rf . 2>/dev/null || true
              git clean -fdx
            fi
            mkdir -p badges
            cp "$tmp" "badges/${HEAD}.json"
            git add badges/
            if git diff --staged --quiet; then
              echo "score unchanged; no commit needed"
              exit 0
            fi
            git commit -m "compat-scores: update ${HEAD} score"
            if git push origin compat-scores; then
              echo "==> published ${HEAD} score on attempt $attempt"
              exit 0
            fi
            echo "==> push rejected (likely concurrent update); retrying"
            git reset --hard
            attempt=$((attempt + 1))
            sleep $((attempt * 2))
          done
          echo "::error title=compat-scores publish failed::could not push ${HEAD} score after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Fail job if harness step failed
        # Last step in the job. Re-raises the harness step's failure
        # AFTER the artifact has been emitted, so the workflow
        # conclusion mirrors the harness outcome instead of being
        # masked by `if: always()` housekeeping above.
        if: always() && steps.harness.outcome == 'failure'
        run: |
          echo "::error title=compatibility/loki suite failed::harness step failed -- see logs and uploaded report"
          exit 1
