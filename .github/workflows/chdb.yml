name: chdb

# chDB engine + TXTAR-roundtrip lane.
#
# Two informational jobs, both linking libchdb.so:
#
#   1. `probe`     — driver-shim sanity check (`TestChDBProbe`). Validates
#                    the chdb-go database/sql driver round-trips
#                    Map(String, String) into a Go map[string]string via
#                    rows.Scan. Originally the only chDB CI lane.
#
#   2. `roundtrip` — TXTAR seed → SQL → expected_rows differential lane,
#                    split into a matrix over the three QL heads
#                    (promql / logql / traceql). Each matrix entry runs
#                    `go test -tags chdb -count=1 ./test/spec/<ql>/...`
#                    which executes the chdb-tagged `TestRoundTripChDB`
#                    walker over every *.txtar fixture under that head
#                    that declares both `seed:` and `expected_rows:`.
#
# Why split: the required PR gates (`check` + `lint` + `forbid-skip`) are
# CGO-free and never compile the chdb-go driver, so they cannot run the
# roundtrip pass. Without this workflow exercising
# `./test/spec/{promql,logql,traceql}/`, fixture regressions slip past
# code review (e.g. label_replace_basic.txtar landed broken on main via
# #312 — no workflow caught it).
#
# Required on PRs whose path filter matches (see `paths:` below). The
# `probe` job and each `roundtrip (<ql>)` matrix entry are entries in
# the required-status-checks list on `main`. Required-on-match means
# GitHub's branch protection waits for the workflow to register a
# context; when the workflow is skipped by the path filter, the check
# is recorded as `expected` and resolves automatically because no run
# was created. Promoted from informational after Pool-DD #382 merged
# while the chDB lane was skipping `internal/api/**` changes and let
# four broken handler tests through (fixed in #388).
#
# If you widen the path filter, audit the required-checks list at the
# same time — a context that never runs blocks every PR.

on:
  push:
    branches: [main]
  # PR trigger has no `paths:` filter so `probe` and `roundtrip (<ql>)`
  # always appear in the PR rollup. Required for promoting them to
  # required-status-checks — a path-skipped check leaves the rollup
  # missing entries and would block merges of pure-docs PRs.
  pull_request:
  workflow_dispatch:
  schedule:
    # nightly at 04:00 UTC
    - cron: '0 4 * * *'

permissions:
  contents: read

concurrency:
  group: chdb-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # See `.github/workflows/ci.yml` for the rationale + filter convention.
  # Docs-only PRs short-circuit `probe` and the `roundtrip` matrix.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.compute.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request'

      - id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          # See ci.yml for why `every` is required (the `**` baseline
          # plus negation patterns would otherwise always be true).
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.markdown'
              - '!docs/**'
              - '!LICENSE*'
              - '!CHANGELOG.md'
              - '!.markdownlint*'
              - '!CLAUDE.md'
              - '!AGENTS.md'
              - '!README*'

      - id: compute
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ steps.filter.outputs.code }}" = "false" ]; then
              echo "docs_only=true" >> "$GITHUB_OUTPUT"
            else
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  probe:
    name: probe
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install libchdb.so
        run: just chdb-install

      - name: Run chDB probe
        run: go test -tags chdb -v -count=1 -run TestChDBProbe ./internal/chclient/...

      - name: Run handler tests (chDB)
        run: just test-chdb

  # `roundtrip` walks every *.txtar fixture under test/spec/<ql>/ and,
  # for fixtures that declare both `seed:` and `expected_rows:`, runs
  # the stored `sql:` + `args:` against an ephemeral in-process chDB
  # session and asserts the resulting rows match `expected_rows:`. The
  # test entry point is `TestRoundTripChDB` in
  # test/spec/<ql>/roundtrip_chdb_test.go.
  #
  # Matrix entries run in parallel (`fail-fast: false`) so a regression
  # in one head doesn't mask regressions in the others.
  roundtrip:
    name: roundtrip (${{ matrix.ql }})
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        ql: [promql, logql, traceql]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install libchdb.so
        run: just chdb-install

      - name: Run TXTAR round-trip (${{ matrix.ql }})
        run: go test -tags chdb -count=1 ./test/spec/${{ matrix.ql }}/...
