name: chdb

# chDB engine + TXTAR-roundtrip lane.
#
# Two informational jobs, both linking libchdb.so:
#
#   1. `probe`     — driver-shim sanity check (`TestChDBProbe`). Validates
#                    the chdb-go database/sql driver round-trips
#                    Map(String, String) into a Go map[string]string via
#                    rows.Scan. Originally the only chDB CI lane.
#
#   2. `roundtrip` — TXTAR seed → SQL → expected_rows differential lane,
#                    split into a matrix over the three QL heads
#                    (promql / logql / traceql). Each matrix entry runs
#                    `go test -tags chdb -count=1 ./test/spec/<ql>/...`
#                    which executes the chdb-tagged `TestRoundTripChDB`
#                    walker over every *.txtar fixture under that head
#                    that declares both `seed:` and `expected_rows:`.
#
# Why split: the required PR gates (`check` + `lint` + `forbid-skip`) are
# CGO-free and never compile the chdb-go driver, so they cannot run the
# roundtrip pass. Without this workflow exercising
# `./test/spec/{promql,logql,traceql}/`, fixture regressions slip past
# code review (e.g. label_replace_basic.txtar landed broken on main via
# #312 — no workflow caught it).
#
# Required on PRs whose path filter matches (see `paths:` below). The
# `probe` job and each `roundtrip (<ql>)` matrix entry are entries in
# the required-status-checks list on `main`. Required-on-match means
# GitHub's branch protection waits for the workflow to register a
# context; when the workflow is skipped by the path filter, the check
# is recorded as `expected` and resolves automatically because no run
# was created. Promoted from informational after Pool-DD #382 merged
# while the chDB lane was skipping `internal/api/**` changes and let
# four broken handler tests through (fixed in #388).
#
# If you widen the path filter, audit the required-checks list at the
# same time — a context that never runs blocks every PR.

on:
  push:
    # `release/*.x` so `probe` + `roundtrip (<ql>)` (required checks) also run on
    # a maintenance-line hotfix push, giving release.yml's maintenance preflight
    # check-runs to verify before publishing.
    branches: [main, 'release/*.x']
  # PR trigger has no `paths:` filter so `probe` and `roundtrip (<ql>)`
  # always appear in the PR rollup. Required for promoting them to
  # required-status-checks — a path-skipped check leaves the rollup
  # missing entries and would block merges of pure-docs PRs.
  pull_request:
  workflow_dispatch:
  schedule:
    # nightly at 04:00 UTC
    - cron: '0 4 * * *'

permissions:
  contents: read

concurrency:
  group: chdb-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # See `.github/workflows/ci.yml` for the rationale + filter convention.
  # Docs-only PRs short-circuit `probe` and the `roundtrip` matrix.
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.compute.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v7
        if: github.event_name == 'pull_request'

      - id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          # See ci.yml for why `every` is required (the `**` baseline
          # plus negation patterns would otherwise always be true).
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.markdown'
              - '!docs/**'
              - '!LICENSE*'
              - '!CHANGELOG.md'
              - '!.markdownlint*'
              - '!CLAUDE.md'
              - '!AGENTS.md'
              - '!README*'

      - id: compute
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ steps.filter.outputs.code }}" = "false" ]; then
              echo "docs_only=true" >> "$GITHUB_OUTPUT"
            else
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  # `chdb-build` is a FAST, PR-visible compile gate over the entire
  # chdb-tagged tree. It does NOT run any tests — `go build` + `go vet`
  # with `-tags chdb` is enough to surface a build break in any
  # chdb-tagged file (test/property/*_test.go, the chDB probe, the
  # roundtrip walkers, test/perf/*) in seconds-to-low-minutes.
  #
  # Why this exists: the required PR gates (`check` + `lint` +
  # `forbid-skip`) are CGO-free and compile with the DEFAULT build tags,
  # so they never touch chdb-tagged source. The heavier chDB jobs that
  # DO compile it (`probe`, `roundtrip`, `perf-guards`) only run their
  # work on `pull_request` here — but a regression that breaks
  # compilation of, say, test/property (which only runs in property.yml
  # nightly) would otherwise hide until the next push-to-main / nightly.
  # PR #908 did exactly that: it changed `internal/api/loki.StreamValue`
  # from a tuple to a struct, broke `test/property/logql_test.go`, merged
  # green because no PR check compiled the chdb-tagged property package,
  # and broke the property lane on the next push. This job closes that
  # gap — a chdb-tag build break now fails a PR check, not a nightly.
  #
  # COMPILE-ONLY by design: no `go test` run, so it stays cheap enough
  # to gate every PR. The `go vet` step is the load-bearing one for the
  # #908 class: `go build ./...` does NOT compile `_test.go` files, but
  # the #908 break was in test/property/logql_test.go — `go vet` (and
  # only vet, among the two) typechecks test files without executing
  # them. `go build` is kept as the cheaper first signal for breaks in
  # non-test chdb-tagged source (the chDB probe, roundtrip walkers).
  chdb-build:
    name: chdb-build
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      # Cache the pinned libchdb.so so the install step is a no-op cache
      # hit on the common path (the recipe is idempotent — it skips the
      # download when the file already exists at CHDB_INSTALL_PATH). The
      # key is pinned to the recipe's CHDB_VERSION so a version bump busts
      # the cache automatically.
      - name: Cache libchdb.so
        uses: actions/cache@v5
        with:
          path: /usr/local/lib/libchdb.so
          key: libchdb-${{ runner.os }}-${{ runner.arch }}-v4.0.2

      - name: Install libchdb.so
        run: just chdb-install

      - name: Compile chdb-tagged tree (go build)
        run: go build -tags chdb ./...

      - name: Vet chdb-tagged tree (go vet)
        run: go vet -tags chdb ./...

  probe:
    name: probe
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install libchdb.so
        run: just chdb-install

      - name: Run chDB probe
        run: go test -tags chdb -v -count=1 -run TestChDBProbe ./internal/chclient/...

      - name: Run handler tests (chDB)
        run: just test-chdb

  # `roundtrip` walks every *.txtar fixture under test/spec/<ql>/ and,
  # for fixtures that declare both `seed:` and `expected_rows:`, runs
  # the stored `sql:` + `args:` against an ephemeral in-process chDB
  # session and asserts the resulting rows match `expected_rows:`. The
  # test entry point is `TestRoundTripChDB` in
  # test/spec/<ql>/roundtrip_chdb_test.go.
  #
  # Matrix entries run in parallel (`fail-fast: false`) so a regression
  # in one head doesn't mask regressions in the others.
  #
  # DOCS-ONLY GUARD IS PER-STEP, NOT JOB-LEVEL — deliberately. The three
  # `roundtrip (<ql>)` matrix legs are required status checks on `main`.
  # A *job-level* `if: docs_only != 'true'` would skip the job before the
  # matrix expands, so the contexts `roundtrip (promql/logql/traceql)`
  # are never created and branch protection blocks every docs-only PR
  # forever with "Expected — Waiting for status to be reported" (a plain
  # skipped non-matrix job reports its named context and resolves, but a
  # skipped matrix job never publishes its per-leg names). Instead the
  # job always runs so the matrix expands and each leg's context is
  # published; the docs-only guard sits on the work steps, so on a
  # docs-only PR every step is skipped and each leg concludes `success`
  # in seconds (no chDB compile/run) — satisfying the required check
  # without doing the work. Do NOT hoist this back to the job level.
  roundtrip:
    name: roundtrip (${{ matrix.ql }})
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        ql: [promql, logql, traceql]
    steps:
      - uses: actions/checkout@v7
        if: needs.changes.outputs.docs_only != 'true'

      - uses: actions/setup-go@v6
        if: needs.changes.outputs.docs_only != 'true'
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        if: needs.changes.outputs.docs_only != 'true'
        with:
          tool: just

      - name: Install libchdb.so
        if: needs.changes.outputs.docs_only != 'true'
        run: just chdb-install

      - name: Run TXTAR round-trip (${{ matrix.ql }})
        if: needs.changes.outputs.docs_only != 'true'
        run: go test -tags chdb -count=1 ./test/spec/${{ matrix.ql }}/...

  # `perf-guards` runs the chDB-tagged deterministic perf-regression
  # ASSERTIONS under test/perf/ — the load-bearing fix for task #73.
  # Before this job, test/perf compiled under the `chdb` tag but ran in
  # NO CI lane (nothing invoked `./test/perf/...`), so the harnesses only
  # `t.Logf`'d and could never fail. The tests are now assertion-pins, not
  # wall-clock benchmarks, so they belong on a gating lane:
  #
  #   - TestOrderByDecision_ChDB: EXPLAIN indexes=1 granule-prune ratio
  #     floor (≥4×) proving the cerberus-ddl MetricName-first metrics
  #     ORDER BY win (#791) still holds against a byte-identical
  #     ServiceName-first table.
  #   - TestSeriesFanout_ChDB: a don't-regress-upward /series round-trip
  #     ceiling (the #790 fan-in batching is held off main, so this pins
  #     the current N rather than asserting ==1).
  #   - TestSliceAllocs_ChDB: a don't-regress-upward allocation pin on the
  #     plan-slicer copy-on-write off-spine sharing. It asserts (*Planner)
  #     .slice()'s allocs/op stay under a bound at K=4 and K=16, so a revert
  #     of the COW sharing in internal/chplan/reanchor.go back to a per-shard
  #     CloneNode re-inflates the count past the bound and fails here. The
  #     wall-clock companion (internal/solver.BenchmarkSlice) is informational
  #     in perf-benchmark.yml; this is the gating arm.
  #
  # Wall-clock perf stays in the informational `perf-benchmark.yml`
  # (benchstat, never gates) to avoid runner-variance flake; only the
  # deterministic structural assertions gate here.
  perf-guards:
    name: perf-guards
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install libchdb.so
        run: just chdb-install

      - name: Run perf regression guards (chDB)
        run: just perf-chdb

  # `integration-promql` runs the chDB-backed EXOTIC PromQL integration
  # suite (test/integration/promql). It seeds ONE rich, fixed OTel fixture
  # (a mirror of the prometheus/compliance reference demo service) into an
  # ephemeral chDB session, mounts the real prom.Handler, and asserts every
  # query in the ~10-category exotic matrix against the from-scratch oracle
  # (test/property/oracle/promql) via property.CompareOutcomes.
  #
  # It is ORTHOGONAL to `roundtrip`: roundtrip pins per-fixture SQL shape
  # with self-derived (circular) expected_rows, catching CH execution
  # errors + golden drift; this suite drives the live parse -> lower ->
  # optimize -> emit -> execute pipeline against a TRUSTED, SUT-independent
  # oracle, catching SEMANTIC lowering/optimizer/emitter bugs the roundtrip
  # misses. CAT 1 (binary-op-over-rate) is the durable regression net for
  # the production code-47 break.
  #
  # No golden file + no GOLDEN_UPDATE: expected results are computed at run
  # time by the oracle, so a pass proves PromQL semantics, not reproduction
  # of a recording.
  integration-promql:
    name: integration (promql)
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Cache libchdb.so
        uses: actions/cache@v5
        with:
          path: /usr/local/lib/libchdb.so
          key: libchdb-${{ runner.os }}-${{ runner.arch }}-v4.0.2

      - name: Install libchdb.so
        run: just chdb-install

      - name: Run exotic PromQL integration suite (chDB)
        run: go test -tags chdb -count=1 ./test/integration/promql/...
