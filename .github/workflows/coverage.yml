name: coverage

# GA-prep coverage baseline workflow. Runs `just coverage` to produce
# a merged coverage profile (default-tag + chdb-tagged lanes), uploads
# the cover-merged.out artifact, and writes the per-package summary
# into the GitHub Actions step summary.
#
# Informational only. NOT a required PR check; not in the required
# status-checks list. Tracks coverage drift between cuts.
#
# Triggers: push-to-main + nightly + manual dispatch.

on:
  push:
    branches: [main]
  schedule:
    # nightly at 05:30 UTC (45 min after compatibility.yml at 04:00 UTC
    # so the runner doesn't double-book; well clear of the chdb job).
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install libchdb.so
        run: just chdb-install

      - name: Run coverage
        run: just coverage | tee coverage.log

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Coverage baseline";
            echo;
            echo "Generated by \`just coverage\`.";
            echo;
            echo "### Total";
            echo;
            echo '```';
            go tool cover -func=cover-merged.out | tail -1;
            echo '```';
            echo;
            echo "### Per-package (sorted by coverage)";
            echo;
            echo '```';
            awk -F'[: ,]' 'NR > 1 {
              n = split($0, w, " "); stmts = w[n-1]; hits = w[n];
              split($0, a, ":"); fp = a[1];
              sub(/^github\.com\/tsouza\/cerberus\//, "", fp);
              k = fp; sub(/\/[^\/]+$/, "", k);
              total[k] += stmts;
              if (hits != 0) covered[k] += stmts;
            } END {
              for (p in total) {
                pct = (total[p] > 0) ? 100.0*covered[p]/total[p] : 0;
                printf "%6.2f%%  %5d / %-5d  %s\n", pct, covered[p], total[p], p;
              }
            }' cover-merged.out | sort -rn;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile
          path: |
            cover.out
            cover-chdb.out
            cover-merged.out
          retention-days: 30
