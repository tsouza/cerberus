name: mutation

# Per-PR trigger is path-filtered to the 7 mutation-phased packages so
# only QL / optimizer / chplan / chsql / qlcommon-touching PRs pay the
# full matrix cost. Documentation / harness-only PRs skip the lane.
# Informational on push-to-main + nightly + dispatch + PRs; promotion
# to required PR gate happens after every phase stays green for a week
# at 95%.

on:
  pull_request:
    branches: [main]
    paths:
      - 'internal/chplan/**'
      - 'internal/chsql/**'
      - 'internal/optimizer/**'
      - 'internal/promql/**'
      - 'internal/logql/**'
      - 'internal/traceql/**'
      - 'internal/qlcommon/**'
      - '.gremlins.yaml'
      - '.github/workflows/mutation.yml'
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutate:
    # Per-phase mutation kill-zone. gremlins v0.6.0 has no per-package
    # threshold, so each phase runs as its own matrix entry scoped to a
    # single package with its own --threshold-efficacy bar. The bar in
    # `.gremlins.yaml` (currently 95) is the floor for the unscoped
    # whole-repo `just mutate` invocation only — the matrix below
    # mirrors it per phase. All matrix entries stay informational on
    # push-to-main + nightly + dispatch; promotion to a required PR
    # gate happens after every phase stays green for a week at 95%.
    #
    # All phases sit at 95% efficacy: the nightly runs have been
    # clearing every phase for an extended period, so the floor is
    # unified. Never lower a bar without a follow-up PR that
    # re-establishes the headroom + a clear test-quality rationale.
    name: gremlins ${{ matrix.phase }} (${{ matrix.scope }} @ ${{ matrix.efficacy }}%)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - phase: phase1
            scope: ./internal/chplan
            efficacy: 95
          - phase: phase2
            scope: ./internal/chsql
            efficacy: 95
          - phase: phase3-optimizer
            scope: ./internal/optimizer
            efficacy: 95
          - phase: phase4-promql
            scope: ./internal/promql
            efficacy: 95
          - phase: phase4-logql
            scope: ./internal/logql
            efficacy: 95
          - phase: phase4-traceql
            scope: ./internal/traceql
            efficacy: 95
          - phase: phase5-qlcommon
            scope: ./internal/qlcommon
            efficacy: 95
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      # We install gremlins directly via `go install` so we don't
      # depend on a third-party Action's release-download path.
      # setup-go's module cache keeps subsequent runs fast.
      # Use `--output` for structured JSON (gremlins exits 0 even
      # when `--threshold-efficacy` is violated in v0.6.0, so we
      # do the gating ourselves against the parsed JSON below).
      #
      # We consume gremlins via the tsouza/gremlins fork pinned to
      # v0.6.0-cerberus-sigterm so that in-flight mutants killed by
      # the runner's SIGTERM at job timeout are recorded as NOT_RUN
      # (via --on-shutdown-status=not-run) rather than LIVED, which
      # used to falsely deflate test_efficacy. Upstream PR:
      # https://github.com/go-gremlins/gremlins/pull/283
      - name: install gremlins
        run: go install github.com/tsouza/gremlins/cmd/gremlins@v0.6.0-cerberus-sigterm
      - name: gremlins unleash
        run: gremlins unleash --output gremlins.json --on-shutdown-status=not-run ${{ matrix.scope }}
      - name: enforce efficacy threshold
        run: |
          set -euo pipefail
          measured=$(jq -r '.test_efficacy' gremlins.json)
          threshold=${{ matrix.efficacy }}
          if awk -v m="$measured" -v t="$threshold" 'BEGIN { exit (m < t) ? 1 : 0 }'; then
            echo "::notice::gremlins efficacy ${measured}% >= threshold ${threshold}%"
          else
            echo "::error::gremlins efficacy ${measured}% < threshold ${threshold}%"
            exit 1
          fi
      - name: upload gremlins report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gremlins-${{ matrix.phase }}
          path: gremlins.json
          retention-days: 14
