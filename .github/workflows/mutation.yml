name: mutation

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutate:
    # Per-phase mutation kill-zone. gremlins v0.6.0 has no per-package
    # threshold, so each phase runs as its own matrix entry scoped to a
    # single package with its own --threshold-efficacy bar. The bar in
    # `.gremlins.yaml` (currently 95) is the floor for the unscoped
    # whole-repo `just mutate` invocation only — the matrix below
    # mirrors it per phase. All matrix entries stay informational on
    # push-to-main + nightly + dispatch; promotion to a required PR
    # gate happens after every phase stays green for a week at 95%.
    #
    # All phases sit at 95% efficacy: the nightly runs have been
    # clearing every phase for an extended period, so the floor is
    # unified. Never lower a bar without a follow-up PR that
    # re-establishes the headroom + a clear test-quality rationale.
    name: gremlins ${{ matrix.phase }} (${{ matrix.scope }} @ ${{ matrix.efficacy }}%)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - phase: phase1
            scope: ./internal/chplan
            efficacy: 95
          - phase: phase2
            scope: ./internal/chsql
            efficacy: 95
          - phase: phase3-optimizer
            scope: ./internal/optimizer
            efficacy: 95
          - phase: phase4-promql
            scope: ./internal/promql
            efficacy: 95
          - phase: phase4-logql
            scope: ./internal/logql
            efficacy: 95
          - phase: phase4-traceql
            scope: ./internal/traceql
            efficacy: 95
          - phase: phase5-qlcommon
            scope: ./internal/qlcommon
            efficacy: 95
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0
      - name: gremlins unleash
        # gremlins v0.6.0's `--threshold-efficacy` flag is documented as
        # a quality gate ("makes gremlins exit with an error if values
        # are not met") but in practice the binary exits 0 regardless
        # of the threshold. Parse the reported efficacy ourselves and
        # exit non-zero when the matrix `efficacy` floor isn't met.
        # When upstream fixes the exit-code behaviour, drop the awk
        # block and let `--threshold-efficacy` do the gating.
        run: |
          set -euo pipefail
          gremlins unleash \
            --threshold-efficacy ${{ matrix.efficacy }} \
            ${{ matrix.scope }} | tee gremlins.log
          awk -v threshold=${{ matrix.efficacy }} '
            /Test efficacy:/ {
              measured = $3
              gsub(/[^0-9.]/, "", measured)
              if ((measured + 0) < (threshold + 0)) {
                printf("::error::gremlins efficacy %s%% < threshold %s%%\n", measured, threshold)
                exit 1
              }
              printf("::notice::gremlins efficacy %s%% >= threshold %s%%\n", measured, threshold)
            }
          ' gremlins.log
