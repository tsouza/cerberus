name: property

# Nightly oracle property-test lane.
#
# Runs the chdb-tagged property tests under `./test/property/...` with
# a deeper rapid sweep than the local default. The test code itself
# uses rapid's default 100 iterations (so a developer running
# `go test -tags chdb ./test/property/...` locally gets a fast 100x
# sweep); this workflow overrides to `-rapid.checks=500` to widen the
# nightly search.
#
# Coverage today:
#
#   - TestPromQL_Property_FromScratch — PromQL instant + range +
#     aggregations against the from-scratch oracle.
#   - TestPromQL_InstantWindowSweep_FromScratch — sweeps the instant
#     eval time T (incl. the 60s/90s offsets the rc.8 window-anchor bug
#     hid in) across a continuous series; asserts the instant
#     range-vector result agrees with a from-scratch (T-range, T] window
#     oracle (non-empty when the window is non-empty).
#   - TestLogQL_Property              — LogQL stream + line filter +
#     `| label_format` against the from-scratch oracle.
#   - TestTraceQL_Property            — TraceQL spanset filter +
#     `| count() OP N` against the from-scratch oracle.
#
# All run in the same `property` job (one `go test` invocation walks
# every test in `./test/property/...`).
#
# Like `chdb.yml`, this workflow links `libchdb.so` and is therefore
# segregated from the standard required PR lane (`check` + `lint`, CGO-free).
# But it is ALSO a parity lane on the publish-on-merge release flow: it runs on
# EVERY pull_request so it can be a required status check, short-circuiting to a
# green no-op on a non-release PR and running the deep rapid sweep only on a
# `release/*` PR (so a release PR's green status includes the property tests).
# Mirrors chart-ci.yml's no-op pattern, keyed on the release branch.
#
# Triggers: pull_request + push to main + manual dispatch + nightly. On failure, the
# rapid seed is captured in the test output (and the workflow log).
# Authors can reproduce a failing run locally with:
#
#   go test -tags chdb -run TestPromQL_Property              -rapid.seed=<N> ./test/property/...
#   go test -tags chdb -run TestPromQL_InstantWindowSweep     -rapid.seed=<N> ./test/property/...
#   go test -tags chdb -run TestLogQL_Property               -rapid.seed=<N> ./test/property/...
#   go test -tags chdb -run TestTraceQL_Property             -rapid.seed=<N> ./test/property/...

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # nightly at 03:45 UTC, ahead of `chdb.yml` (04:00 UTC) so the
    # runners stagger and a libchdb cache primed here can be reused.
    - cron: '45 3 * * *'

# See chdb.yml: chDB's purego FFI can abort with "signal arrived during cgo
# execution" when Go's async preemption (SIGURG) interrupts a libchdb.so
# downcall. Disable async preemption for these chDB-tagged test processes;
# cooperative preemption still applies and the production binary is unaffected.
env:
  GODEBUG: asyncpreemptoff=1

permissions:
  contents: read

concurrency:
  group: property-${{ github.ref }}
  cancel-in-progress: false

jobs:
  property:
    name: property (PromQL + LogQL + TraceQL, rapid N=500)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # RUN_HEAVY gates the real work: true on push / schedule / dispatch, and on
    # a release PR (head branch release/*). On a regular PR every heavy step is
    # skipped and the job reports green without work — so `property …` can be a
    # required check that gates release PRs but never blocks ordinary PRs.
    env:
      RUN_HEAVY: ${{ github.event_name != 'pull_request' || startsWith(github.head_ref, 'release/') }}
    steps:
      - uses: actions/checkout@v7

      - if: env.RUN_HEAVY == 'true'
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - if: env.RUN_HEAVY == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install libchdb.so
        if: env.RUN_HEAVY == 'true'
        run: just chdb-install

      - name: No-op (non-release PR)
        if: env.RUN_HEAVY != 'true'
        run: echo "property is a green no-op on non-release PRs (real run on push/nightly/dispatch + release/* PRs)."

      - name: Run property tests (rapid N=500)
        if: env.RUN_HEAVY == 'true'
        # `-tags chdb` enables the chdb-tagged property entry points;
        # `-rapid.checks=500` widens beyond rapid's default of 100;
        # `-rapid.shrinktime=5m` lets the shrinker work on a failing
        # draw before the test gives up.
        # `-v` surfaces the rapid seed in the workflow log so a failure
        # is reproducible with `-rapid.seed=<N>`.
        #
        # Flag ordering matters: rapid's flags (`-rapid.checks`,
        # `-rapid.shrinktime`) are registered by the rapid library, not
        # by `go test`. `go test` only recognises them as test-binary
        # flags when they appear AFTER the package list — otherwise the
        # toolchain misparses them as build flags, drops the package
        # path, and falls back to `.` (the module root), which has no
        # Go files and aborts with `FAIL . [setup failed]`.
        run: |
          go test \
            -tags chdb \
            -count=1 \
            -v \
            -timeout=20m \
            ./test/property/... \
            -rapid.checks=500 \
            -rapid.shrinktime=5m

      - name: Upload rapid failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: property-rapid-failures
          # rapid persists shrunk failing draws under testdata/rapid/
          # of the test package directory. Capture them so the seed +
          # the minimised dataset/query are downloadable from the run.
          path: |
            test/property/testdata/rapid/**
          if-no-files-found: ignore
          retention-days: 30
