name: e2e

# End-to-end test umbrella. Currently hosts the `dashboard` job (full-
# stack smoke: k3d + cerberus + Grafana + Playwright); future e2e
# scenarios would land as additional jobs in this workflow.
#
# As of 2026-05-13 the `dashboard` job no longer runs on pull_request —
# it executes only on push to main + nightly + manual dispatch. It is
# no longer in the required-status-checks list either; regressions are
# caught at merge-to-main time and reverted from main if they break.
# The PR fast-feedback loop stays on `check` + `lint`.

on:
  push:
    branches: [main]
  schedule:
    # nightly at 03:17 UTC
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dashboard:
    name: dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'test/e2e/playwright/package.json'

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install k3d
        run: |
          curl -sSfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash

      - name: Bring up k3d stack
        run: just e2e-up

      - name: Seed OTel data (deterministic synthetic rows)
        run: just e2e-seed

      - name: Wait for real OTel data from the collector pipeline
        run: just e2e-wait-otel

      - name: Run Go E2E tests
        run: just e2e-run

      - name: Install Playwright + browsers
        working-directory: test/e2e/playwright
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        working-directory: test/e2e/playwright
        env:
          GRAFANA_URL: http://localhost:3000
          CERBERUS_URL: http://localhost:8080
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test/e2e/playwright/playwright-report
          retention-days: 14

      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo "=== pods ==="
          kubectl -n cerberus get pods -o wide || true
          echo "=== cerberus logs ==="
          kubectl -n cerberus logs deploy/cerberus --tail 200 || true
          echo "=== clickhouse logs ==="
          kubectl -n cerberus logs deploy/clickhouse --tail 200 || true
          echo "=== grafana logs ==="
          kubectl -n cerberus logs deploy/grafana --tail 200 || true
          echo "=== otel-collector gateway logs ==="
          kubectl -n cerberus logs deploy/otel-collector-gateway --tail 200 || true
          echo "=== otel-collector agent logs ==="
          kubectl -n cerberus logs daemonset/otel-collector-agent --tail 200 || true
          echo "=== sample-app traces logs ==="
          kubectl -n cerberus logs deploy/sample-app-traces --tail 100 || true
          echo "=== sample-app metrics logs ==="
          kubectl -n cerberus logs deploy/sample-app-metrics --tail 100 || true
          echo "=== sample-app metrics previous-container logs ==="
          kubectl -n cerberus logs deploy/sample-app-metrics --previous --tail 100 || true
          echo "=== sample-app logs logs ==="
          kubectl -n cerberus logs deploy/sample-app-logs --tail 100 || true
          echo "=== sample-app metrics describe ==="
          kubectl -n cerberus describe deployment/sample-app-metrics || true
          kubectl -n cerberus describe pod -l app=sample-app,signal=metrics || true

      - name: Tear down
        if: always()
        run: just e2e-down

  startup-bench:
    # Startup-speed benchmark: spawn cerberus and assert <2 s to /healthz.
    # Informational only — not a required gate. The fast-feedback PR loop
    # stays on `check` + `lint`. Runs on push-to-main + nightly + manual
    # dispatch alongside the dashboard job.
    name: startup-bench
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Why not `services:`? `clickhouse/clickhouse-server:24.8-alpine`'s
    # two-phase entrypoint (temp server → create user+DB → restart) takes
    # 120–200s under GH Actions runner load, and GH's `services:` retry
    # mechanism kills the container on the first window expiry. Running
    # CH inline as a plain `docker run` step with our own poll loop
    # decouples the wait from GH's healthcheck timer and never races.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Start ClickHouse
        run: |
          docker run -d --name clickhouse \
            -p 9000:9000 -p 8123:8123 \
            -e CLICKHOUSE_DB=otel \
            -e CLICKHOUSE_USER=cerberus \
            -e CLICKHOUSE_PASSWORD=cerberus \
            clickhouse/clickhouse-server:24.8-alpine

      - name: Wait for ClickHouse
        run: |
          # Poll for up to 5 minutes. CH alpine boot under GH Actions
          # load takes 120–200s; the inline polling lets us wait
          # without GH killing the container.
          for i in $(seq 1 60); do
            if docker exec clickhouse wget -q --spider http://localhost:8123/ping; then
              echo "ClickHouse ready after $((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "ClickHouse failed to become ready after 5 minutes"
          docker logs --tail 100 clickhouse
          exit 1

      - name: Run startup benchmark
        env:
          CH_ADDR: 127.0.0.1:9000
          CH_DATABASE: otel
          CH_USERNAME: cerberus
          CH_PASSWORD: cerberus
        run: just startup-bench

      - name: Stop ClickHouse
        if: always()
        run: docker rm -f clickhouse || true
