name: e2e

# End-to-end test umbrella. Hosts both:
#   - `compose-smoke` — repo-root quickstart compose stack smoke
#     (`docker compose up --wait`) + Grafana Playwright catch-net,
#     SHARDED across a balanced matrix of isolated-compose-stack jobs
#     (compose-smoke-setup emits the matrix from the single-source-of-
#     truth .github/scripts/compose-smoke-matrix.mjs; compose-smoke-shard
#     runs each shard's specs against its own stack; the aggregator job
#     literally named `compose-smoke` needs the matrix and gates on it).
#     Runs on pull_request + push-to-main at SWEEP_DEPTH=lean (the
#     required PR gate) and on the nightly schedule at
#     SWEEP_DEPTH=full. The clickhouse / host / otelcol dashboards
#     are compose-only surfaces (their receivers don't run in the
#     k3d stack), so the nightly full-depth sweep of them has to
#     happen HERE — the dashboard job can't cover them. Required
#     status check on branch protection — DO NOT rename the AGGREGATOR
#     job (the check name is pinned to `compose-smoke`; the matrix
#     children report as `compose-smoke-shard (shard-x)` and are NOT
#     the gate).
#   - `dashboard` — full-stack k3d + cerberus + Grafana + Playwright
#     smoke, SHARDED across a modest matrix of isolated-k3d-cluster jobs
#     (dashboard-setup emits the matrix from the single-source-of-truth
#     .github/scripts/dashboard-matrix.mjs; dashboard-shard runs each
#     shard's specs against its own k3d cluster; the aggregator job
#     literally named `dashboard` needs the matrix and rolls it up).
#     Runs on push-to-main + nightly + manual dispatch only.
#     Informational on merges, not a PR gate (never runs on
#     pull_request, so NOT a branch-protection check); regressions are
#     caught at merge-to-main time and reverted from main if they break.
#     On schedule + dispatch the DEDICATED crawl shard runs the Grafana
#     surface crawler with CRAWL_STACK=k3d (same engine as compose-smoke's
#     crawl lane, this stack's config + inventory — see
#     test/e2e/playwright/crawl/stacks.ts) at SWEEP_DEPTH=full,
#     CONCURRENTLY with the smoke shards. The ~50min crawl BFS is a single
#     indivisible test(); splitting its frontier across shards is the
#     follow-up that beats the 50min wall-clock floor.
#   - `startup-bench` — startup-speed bench (cerberus to /healthz in
#     <2s). Same trigger set as `dashboard`; informational only.
#
# Why `compose-smoke` matters on top of `dashboard`: the dashboard
# job uses k3d, not docker-compose. Without `compose-smoke` the
# quickstart compose stack has zero PR coverage and silently breaks
# when a contributor edits docker-compose.yml / Dockerfile.local /
# Grafana provisioning / the cerberus binary.
#
# What `compose-smoke` does:
#   1. `docker compose up --wait` — build cerberus, bring up CH +
#      cerberus + grafana, wait for all healthchecks to go green.
#   2. Curl cerberus's /healthz + /readyz and Grafana's /api/health
#      from the host. Confirms the published port maps are right and
#      the service contracts are honoured end-to-end.
#   3. Drive Grafana through every provisioned dashboard via a
#      Playwright catch-net spec — catches the class of bug where
#      Grafana 200s a `/api/ds/query` but the body carries
#      .results.<refId>.error (invisible to curl smokes).
#   4. Teardown with `docker compose down -v`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # nightly at 03:17 UTC
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      update_crawl_inventory:
        description: >-
          Regenerate the k3d crawl surface inventory
          (CERBERUS_UPDATE_INVENTORY=1) and upload it as an artifact to
          commit. This is the bootstrap/regen path for
          test/e2e/playwright/crawl/grafana-surface-inventory.k3d.json —
          the k3d crawl lane fails loudly until a non-empty inventory is
          committed.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

# No file-level concurrency — the two lanes have different policies.
# `compose-smoke` cancels in-progress on PR events; `dashboard` /
# `startup-bench` never cancel (a half-killed k3d teardown leaks
# Docker volumes). Per-job `concurrency:` blocks encode each policy.

jobs:
  # See `.github/workflows/ci.yml` for the rationale + filter convention.
  # Docs-only PRs short-circuit the compose-smoke job (Docker compose
  # build + Grafana Playwright catch-net are pointless when no code
  # changed). Runs on pull_request only — push and schedule bypass the
  # docs-only gate and go straight to the smoke job (a nightly run has
  # no diff to filter on).
  changes:
    name: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.compute.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          # See ci.yml for why `every` is required (the `**` baseline
          # plus negation patterns would otherwise always be true).
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.markdown'
              - '!docs/**'
              - '!LICENSE*'
              - '!CHANGELOG.md'
              - '!.markdownlint*'
              - '!CLAUDE.md'
              - '!AGENTS.md'
              - '!README*'

      - id: compute
        run: |
          if [ "${{ steps.filter.outputs.code }}" = "false" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  # `gate` is the cheap-first tripwire for the `compose-smoke` required
  # check. compose-smoke is the single most expensive PR lane (~14-45 min
  # full Docker compose stack + Grafana Playwright catch-net), so we
  # DON'T want to burn that runner time when a trivial discipline-grep or
  # a compile break would have failed the PR anyway. `gate` runs the same
  # fast checks ci.yml's `forbid-skip` job runs (pure `git grep`, seconds)
  # plus a `go build ./...` compile sanity check (~1-2 min with the module
  # cache); compose-smoke `needs: gate` and refuses to start on a PR until
  # gate is green.
  #
  # PR-ONLY by design (mirrors `changes`): on push / schedule / dispatch
  # the gate is skipped and compose-smoke's `if:` short-circuits the gate
  # clause to true, so the nightly + push lanes keep running unconditionally
  # (a nightly run has no diff to gate on, and push-to-main already merged).
  #
  # SAFETY: when gate FAILS on a PR, compose-smoke is SKIPPED — which
  # branch protection treats as satisfied — but that is NOT a merge hole,
  # because ci.yml's own `forbid-skip` / `check` go RED on the same
  # breakage and block the merge. The gate only saves runner minutes.
  gate:
    name: gate
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # The discipline scans diff against origin/main, so we need
          # both refs reachable (mirrors ci.yml's forbid-skip checkout).
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      # The six discipline scans (pure `git grep` / `perl`, no Go
      # toolchain) — byte-identical to ci.yml's `forbid-skip` job.
      - name: Reject t.Skip in test files
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: t-skip
      - name: Reject "not implemented" / "skipped" / "deferred" in tests + fixtures
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: wording-tests
      - name: Reject "not implemented" in production code
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: not-implemented
      - name: Reject soft-assertion / silent-recover patterns
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: soft-assert
      - name: Reject should_skip overlay entries
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: should-skip
      - name: Reject test escape-hatch patterns
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: escape-hatch

      # Compile sanity check. Far cheaper than the full compose stack;
      # catches a non-building tree before Docker buildx + k3d spin up.
      - name: go build (compile sanity)
        run: go build ./...

      # compose-smoke shard partition coverage guard. The setup job's
      # `verify` step is the load-bearing gate, but running the unit test
      # here too catches a dropped / double-assigned spec on the cheapest
      # tripwire — before any compose stack boots. ubuntu-latest ships node;
      # the test imports only node: builtins + the matrix module's pure fns.
      - name: compose-smoke shard coverage (unit guard)
        run: node --test .github/scripts/compose-smoke-matrix.test.mjs

      # dashboard (k3d) shard partition coverage guard. The dashboard lane
      # never runs on pull_request, so without this a PR that adds a spec but
      # forgets to shard it for the k3d lane would only fail later on a
      # push/nightly run. Running the unit guard here catches it on the cheap
      # PR gate, same as the compose-smoke guard above.
      - name: dashboard shard coverage (unit guard)
        run: node --test .github/scripts/dashboard-matrix.test.mjs

  # compose-smoke is sharded into a balanced matrix of isolated-compose-stack
  # jobs. The three heaviest specs are each a SINGLE async test() that loops
  # internally over every dashboard/panel/surface — indivisible by Playwright's
  # native --shard (which splits at test() granularity, leaving a one-test spec
  # whole). The only real parallelism is LOGICAL: split the spec FILES across N
  # jobs, each booting its OWN isolated compose stack, balanced by wall-clock
  # weight. The partition + coverage assertion live in the single source of
  # truth .github/scripts/compose-smoke-matrix.mjs — never hand-listed in YAML,
  # so a new spec that isn't sharded is a HARD CI failure (verify step below),
  # never a silent no-run.
  #
  # Topology:
  #   compose-smoke-setup   — verify the partition covers every cohort spec,
  #                           then emit the strategy.matrix JSON.
  #   compose-smoke-shard   — the matrix; each shard boots its own stack and
  #                           runs only its assigned specs.
  #   compose-smoke         — the AGGREGATOR, named EXACTLY `compose-smoke` so
  #                           the required-status-check context still appears
  #                           and gates (matrix children report as
  #                           `compose-smoke-shard (shard-x)`, not
  #                           `compose-smoke`). Fails unless every shard passed.
  #
  # COST: N shards = N parallel compose builds/boots — billable minutes rise
  # ~Nx, but wall-clock drops from the serial sum toward the longest shard.
  # That latency win on the slowest required PR gate is the whole point.
  compose-smoke-setup:
    name: compose-smoke-setup
    needs: [changes, gate]
    # Same trigger guard as the old monolith: PR (non-docs-only, gate green) /
    # push / schedule. needs.changes only runs on pull_request, so tolerate it
    # being absent on push/schedule (always() unwraps the skip).
    if: |
      always() &&
      (github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule') &&
      (github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true') &&
      (github.event_name != 'pull_request' || needs.gate.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      # Coverage gate FIRST: ::error:: + exit 1 if any compose-cohort spec is
      # unassigned to a shard (the forbidden silent-coverage-gap) or any
      # assigned/excluded entry is stale. Runs ~50ms, boots no stack — so a
      # dropped spec costs seconds, not a 25-min stack boot running the wrong
      # spec set. ubuntu-latest ships node; the module imports only node:
      # builtins, so no setup-node step is needed.
      - name: assert shard coverage of every compose-smoke spec
        run: node .github/scripts/compose-smoke-matrix.mjs
        env:
          MODE: verify

      # Emit the strategy.matrix JSON to $GITHUB_OUTPUT. emit re-runs the
      # assertions internally, so even without the verify step above it can
      # never ship a matrix that silently drops a spec.
      - id: emit
        name: emit shard matrix
        run: node .github/scripts/compose-smoke-matrix.mjs
        env:
          MODE: emit

  compose-smoke-shard:
    name: compose-smoke-shard
    needs: [changes, gate, compose-smoke-setup]
    # Re-applies the same trigger guard AND requires setup to have cleanly
    # emitted the matrix (a failed/skipped setup must not fan out shards).
    if: |
      always() &&
      needs.compose-smoke-setup.result == 'success' &&
      (github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule') &&
      (github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true') &&
      (github.event_name != 'pull_request' || needs.gate.result == 'success')
    runs-on: ubuntu-latest
    strategy:
      # MANDATORY: one shard's failure must NOT cancel its siblings. The
      # default (true) cancels in-flight shards into the ambiguous `cancelled`
      # rollup, destroys their failure artifacts, and hides whether the others
      # would also have failed. false => each shard runs to completion and the
      # aggregator sees a clean `failure`.
      fail-fast: false
      matrix: ${{ fromJSON(needs.compose-smoke-setup.outputs.matrix) }}
    # Per-lane AND now per-shard. PR/push run SWEEP_DEPTH=lean (required
    # fast-feedback gate); the nightly schedule runs SWEEP_DEPTH=full. At full
    # depth shard-crawl's single BFS test() is the ~50min long pole and needs
    # the 120 ceiling; PR/push shards stay at 45. Because each shard is its own
    # job, 45/120 is now per-shard wall-clock — more headroom than the old
    # shared monolith, not less. See docs/test-strategy.md (interaction sweep).
    timeout-minutes: ${{ github.event_name == 'schedule' && 120 || 45 }}
    concurrency:
      # Per-shard-keyed: sibling shards in the SAME run must not cancel each
      # other (a shared group + cancel-in-progress would do exactly that), but
      # a new push/PR-sync still cancels the prior run's matching shard.
      group: compose-smoke-${{ github.ref }}-${{ matrix.name }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      # Authenticated Docker Hub pulls get a far higher rate limit than
      # anonymous pulls from shared runner IPs (same hardening as the
      # compatibility workflow's compose jobs). Skips silently when the
      # secrets are absent (forks); GHCR mirroring is the stronger
      # long-term fix.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN_SET == 'true' }}
        env:
          DOCKERHUB_TOKEN_SET: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: docker compose up --wait
        run: |
          # --wait-timeout caps the wait at 5 min. Cold runners need
          # ~30-60s for the Go build + ~10-20s for CH first-boot; 300s
          # is generous slack.
          docker compose up --wait --wait-timeout 300

      - name: smoke cerberus /healthz + /readyz
        run: |
          curl -fsS --max-time 5 http://localhost:8080/healthz
          curl -fsS --max-time 5 http://localhost:8080/readyz

      - name: smoke Grafana /api/health
        run: |
          curl -fsS --max-time 5 http://localhost:3000/api/health \
            | tee /tmp/grafana-health.json
          # `database: ok` is the load-bearing field for "Grafana
          # itself is up and its internal SQLite is responsive".
          # Datasource health is a separate per-datasource probe.
          grep -q '"database":[[:space:]]*"ok"' /tmp/grafana-health.json

      # ---- Playwright dashboard catch-net ----
      # Drives Grafana through every provisioned dashboard, captures
      # /api/ds/query + /api/dashboards/* traffic, and asserts every
      # response is 2xx with no tunneled per-target error. This is the
      # gate that catches the class of bug where Grafana 200s a
      # ds/query but the body carries .results.<refId>.error — invisible
      # to curl smokes and to direct cerberus-API tests.
      #
      # Gate posture: hard fail. A non-2xx response or a tunneled
      # per-target error in a /api/ds/query body fails the job — that
      # was the gap that let dashboard-load regressions land on main
      # for hours unnoticed.
      # No npm cache here — the playwright suite doesn't currently
      # ship a package-lock.json, and setup-node's cache lookup hard-
      # fails before the install fallback below ever runs when the
      # cache-dependency-path is unresolvable. Re-add cache: npm once a
      # lockfile lands under test/e2e/playwright/.
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: install Playwright deps
        working-directory: test/e2e/playwright
        run: |
          # npm ci needs a lockfile; fall back to `npm install` if the
          # repo doesn't ship one yet (the existing playwright suite
          # uses the same pattern in the k3d e2e job).
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
          npx playwright install --with-deps chromium

      - name: playwright compose-grafana-smoke (${{ matrix.name }})
        id: playwright_smoke
        working-directory: test/e2e/playwright
        env:
          GRAFANA_BASE_URL: http://localhost:3000
          GRAFANA_URL: http://localhost:3000
          CERBERUS_URL: http://localhost:8080
          # Depth doctrine: PR/push = lean (required gate, fewest
          # states), nightly schedule = full (every dashboard's
          # browser render, showcase family included). The depth
          # flag only changes how many STATES the sweeps visit,
          # never which rules run — see
          # test/e2e/playwright/helpers/depth.ts.
          SWEEP_DEPTH: ${{ github.event_name == 'schedule' && 'full' || 'lean' }}
          # Select the crawl suite's stack config (crawl/stacks.ts).
          # CRAWL_STACK=compose pins this stack's surface inventory
          # (test/e2e/playwright/crawl/grafana-surface-inventory.compose.json);
          # the k3d dashboard job runs the same engine with
          # CRAWL_STACK=k3d against its own inventory file. See the
          # CRAWL_STACK comment in
          # test/e2e/playwright/playwright.config.ts.
          CRAWL_STACK: compose
        run: |
          # The spec set for THIS shard is the space-joined list that
          # .github/scripts/compose-smoke-matrix.mjs assigned to it (verified
          # to be a total, disjoint cover of the cohort by the setup job). The
          # specs themselves are unchanged — they enumerate every provisioned
          # dashboard/panel/surface and assert the catch-net, panel-shape,
          # histogram-completeness, filter-drill, kiosk, all-dashboards,
          # metrics-explorer, and crawl (BFS + ds/query + lints) contracts.
          # See docs/test-strategy.md (interaction sweep) for the per-spec map
          # and the shard manifest for which spec lands on which shard.
          npx playwright test ${{ matrix.specs }} --reporter=list

      - name: upload Playwright report on failure
        if: steps.playwright_smoke.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          # Per-shard name — a static name 409s across the matrix
          # (upload-artifact@v4+ rejects a second upload to a used name).
          name: compose-grafana-smoke-report-${{ matrix.name }}
          path: |
            test/e2e/playwright/playwright-report
            test/e2e/playwright/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: dump compose state + logs on failure
        if: failure() || steps.playwright_smoke.outcome == 'failure'
        run: |
          echo "=== compose ps ==="
          docker compose ps
          echo "=== clickhouse logs (last 200) ==="
          docker compose logs --tail=200 clickhouse || true
          echo "=== cerberus logs (last 200) ==="
          docker compose logs --tail=200 cerberus || true
          echo "=== grafana logs (last 200) ==="
          docker compose logs --tail=200 grafana || true
          echo "=== otel-collector logs (last 200) ==="
          docker compose logs --tail=200 otel-collector || true

      - name: teardown
        if: always()
        run: docker compose down -v --remove-orphans

  # The AGGREGATOR — named EXACTLY `compose-smoke` so the required
  # branch-protection status-check context still appears and gates. The matrix
  # children report as `compose-smoke-shard (shard-x)`, NOT `compose-smoke`;
  # branch protection waits on `compose-smoke` specifically, so this job MUST
  # exist and report green/red. DO NOT add the setup/shard job names to branch
  # protection — only this aggregator is the gate.
  compose-smoke:
    name: compose-smoke
    needs: [changes, gate, compose-smoke-setup, compose-smoke-shard]
    # always() so it still runs (and reports) when setup/shards skipped — e.g.
    # a docs-only PR, where the required context must still report green
    # without doing work, exactly as the old monolith did.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: gate on every shard
        run: |
          echo "setup  = ${{ needs.compose-smoke-setup.result }}"
          echo "shards = ${{ needs.compose-smoke-shard.result }}"
          # Docs-only PR (or any path that skipped setup) → the required check
          # must report green without work. A skipped setup means the matrix
          # never fanned out; pass the gate through, mirroring the old job's
          # docs-only short-circuit.
          if [ "${{ needs.compose-smoke-setup.result }}" = "skipped" ]; then
            echo "compose-smoke skipped (docs-only PR / gate not green / not applicable) — passing the required check."
            exit 0
          fi
          # Otherwise setup must have succeeded and the matrix must be a clean
          # success. A matrix exposes ONE rolled-up .result to dependents:
          # `success` only if EVERY child succeeded; `failure` if any failed;
          # `cancelled` if any was cancelled. The strict `!= 'success'` form
          # catches failure AND cancelled AND skipped — `contains(…,'failure')`
          # would miss `cancelled`, letting a cancelled shard set pass the
          # required check silently. fail-fast:false keeps a real spec failure
          # a clean `failure`, not an ambiguous `cancelled`.
          if [ "${{ needs.compose-smoke-setup.result }}" != "success" ]; then
            echo "::error::compose-smoke-setup did not succeed (${{ needs.compose-smoke-setup.result }})."
            exit 1
          fi
          if [ "${{ needs.compose-smoke-shard.result }}" != "success" ]; then
            echo "::error::one or more compose-smoke shards failed/cancelled (rolled-up: ${{ needs.compose-smoke-shard.result }})."
            exit 1
          fi
          echo "all compose-smoke shards passed."

  # ---------------------------------------------------------------------------
  # dashboard (k3d) lane — SHARDED across a modest matrix of isolated k3d
  # clusters, mirroring the compose-smoke split.
  #
  # The dominant cost is crawl/crawl.spec.ts: a SINGLE async BFS test() (the
  # ~50min long pole at SWEEP_DEPTH=full) that is indivisible by Playwright's
  # native --shard AND by spec-file sharding (one file, one test). So spec-file
  # sharding alone can't beat the 50min floor; the win this lane buys is COARSE
  # and LOGICAL: run the non-crawl smoke specs on their own k3d clusters
  # CONCURRENTLY with a DEDICATED crawl cluster, so the ~50min crawl no longer
  # runs serially after the smoke set. Wall-clock drops from
  # (smoke serial + crawl) toward max(crawl ~50min, slowest smoke shard).
  #
  # Beating the 50min floor itself needs the crawl ENGINE to partition its
  # discovered BFS frontier across shards (a CRAWL_SHARD_INDEX/COUNT contract +
  # a final union-merge-and-assert against the pinned inventory). That is a deep
  # change to the 1383-line BFS + the inventory ratchet, blocked today by the
  # k3d inventory being unbootstrapped — tracked as the explicit follow-up in
  # this lane's PR. This sharding is the safe coarse win that lands first.
  #
  # k3d cost/flake: a cluster is heavy (~3-5min bring-up) and flaky
  # (telemetrygen / otel-collector-gateway readiness BackOff). A matrix of N
  # clusters multiplies BOTH, so the shard count is kept MODEST (3) — two smoke
  # shards + one crawl shard. The partition + coverage assertion live in the
  # single source of truth .github/scripts/dashboard-matrix.mjs — never
  # hand-listed in YAML, so a new spec that isn't sharded is a HARD failure
  # (verify step below), never a silent no-run.
  #
  # Topology:
  #   dashboard-setup   — verify the partition covers every k3d-lane spec, then
  #                       emit the strategy.matrix JSON.
  #   dashboard-shard   — the matrix; each shard boots its OWN k3d cluster and
  #                       runs only its assigned specs (smoke shards with
  #                       CRAWL_STACK unset = crawl/** ignored, exactly as the
  #                       old unfiltered smoke step; the crawl shard with
  #                       CRAWL_STACK=k3d SWEEP_DEPTH=full = the crawl trio).
  #   dashboard         — the AGGREGATOR; a single clean pass/fail over every
  #                       shard. NOT a branch-protection check (the lane never
  #                       runs on pull_request), but a clean roll-up + the
  #                       coverage-discipline guard mirror compose-smoke.
  dashboard-setup:
    name: dashboard-setup
    needs: changes
    # Runs on pull_request (skipping docs-only PRs) so the parallel smoke shards
    # are exercised per-change, plus push + nightly + manual dispatch. The crawl
    # shard is the ~50min long pole and is dispatched only on schedule + manual
    # (INCLUDE_CRAWL below) — so PR/push get a fast smoke-only matrix with no
    # all-skipped crawl leg. Informational on merges, not a required PR gate.
    if: |
      always() &&
      (github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      # Coverage gate FIRST: ::error:: + exit 1 if any k3d-lane spec is
      # unassigned to a shard (the forbidden silent-coverage-gap) or any
      # assigned/excluded entry is stale. Runs ~50ms, boots no cluster — so a
      # dropped spec costs seconds, not a 3-5min k3d boot running the wrong
      # spec set. ubuntu-latest ships node; the module imports only node:
      # builtins, so no setup-node step is needed.
      - name: assert shard coverage of every dashboard-lane spec
        run: node .github/scripts/dashboard-matrix.mjs
        env:
          MODE: verify

      # Emit the strategy.matrix JSON to $GITHUB_OUTPUT. emit re-runs the
      # assertions internally, so even without the verify step above it can
      # never ship a matrix that silently drops a spec.
      - id: emit
        name: emit shard matrix
        run: node .github/scripts/dashboard-matrix.mjs
        env:
          MODE: emit
          # Include the ~50min crawl shard only on schedule + manual dispatch;
          # pull_request + push get a smoke-only matrix (fast, testable, no
          # all-skipped crawl leg).
          INCLUDE_CRAWL: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

  dashboard-shard:
    name: dashboard-shard
    needs: [dashboard-setup]
    if: needs.dashboard-setup.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      # MANDATORY: one shard's failure must NOT cancel its siblings — each
      # boots its own k3d cluster, and a cancelled-in-flight teardown leaks
      # Docker volumes. false => each shard runs to completion + the aggregator
      # sees a clean failure rather than an ambiguous cancelled.
      fail-fast: false
      matrix: ${{ fromJSON(needs.dashboard-setup.outputs.matrix) }}
    # 40 to match the old monolith. Per-shard now: the crawl shard's single BFS
    # test() is the ~50min long pole at SWEEP_DEPTH=full and needs the headroom;
    # because it runs ALONE on its own cluster, the smoke shards no longer wait
    # behind it. The crawl shard's own internal testInfo.setTimeout (75min in
    # crawl.spec.ts) governs the BFS; this job cap is the cluster-lifetime bound.
    timeout-minutes: 75
    concurrency:
      # Per-shard-keyed: sibling shards in the SAME run must not cancel each
      # other; never cancel-in-progress (a half-killed k3d teardown leaks
      # Docker volumes — same posture as the old dashboard job).
      group: e2e-dashboard-${{ github.ref }}-${{ matrix.name }}
      cancel-in-progress: false
    env:
      # The crawl shard (CRAWL_STACK=k3d) only does work on schedule + manual
      # dispatch — the per-PR/per-merge crawl fast lane is the compose stack's
      # job. On push-to-main the crawl shard is a near-instant green no-op: every
      # expensive step below is gated on RUN_SHARD, which is false for the crawl
      # shard on a push event. The smoke shards always run.
      RUN_SHARD: ${{ matrix.crawlStack != 'k3d' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        if: env.RUN_SHARD == 'true'
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-node@v6
        if: env.RUN_SHARD == 'true'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'test/e2e/playwright/package.json'

      - uses: taiki-e/install-action@v2
        if: env.RUN_SHARD == 'true'
        with:
          tool: just

      - name: Install k3d
        if: env.RUN_SHARD == 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash

      - name: Bring up k3d stack
        if: env.RUN_SHARD == 'true'
        run: just e2e-up

      - name: Seed OTel data (deterministic synthetic rows; rolling)
        if: env.RUN_SHARD == 'true'
        # `e2e-seed-rolling` runs the same INSERTs as `e2e-seed` once
        # synchronously (the next CI step sees a populated DB), then
        # leaves the seeder running in the background re-anchoring the
        # metric/log windows on the new now64(9) every 30 s. Replaces
        # the static ±15 min seed window the previous arms-race expanded
        # in PRs #590 / #615 / #617 / #693 to absorb suite drift; the
        # rolling design only has to cover one tick + the 5 m Prom/Loki
        # staleness lookback, so the static span shrinks back to ±5 min.
        # `e2e-down` (called from the teardown step below) stops the
        # seeder + its kubectl port-forward on cleanup.
        run: just e2e-seed-rolling

      - name: Wait for real OTel data from the collector pipeline
        if: env.RUN_SHARD == 'true'
        run: just e2e-wait-otel

      # Go e2e tests run ONCE across the matrix — on the single shard the
      # manifest marks runGoE2E:true. They're stack-health Go tests, not
      # Playwright; re-running them on every cluster would just burn minutes.
      - name: Run Go E2E tests
        if: env.RUN_SHARD == 'true' && matrix.runGoE2E
        run: just e2e-run

      - name: Install Playwright + browsers
        if: env.RUN_SHARD == 'true'
        working-directory: test/e2e/playwright
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      # ---- smoke shards (CRAWL_STACK unset => crawl/** ignored) ----
      # Runs this shard's assigned non-crawl spec subset (the space-joined list
      # .github/scripts/dashboard-matrix.mjs assigned, verified a total disjoint
      # cover by the setup job). CRAWL_STACK is unset here, so
      # playwright.config.ts ignores crawl/** — byte-for-byte the consumption
      # mode of the old unfiltered "Run Playwright smoke" step, just over a
      # spec subset instead of every spec serially.
      - name: Run Playwright smoke (${{ matrix.name }})
        id: playwright_smoke
        if: env.RUN_SHARD == 'true' && matrix.crawlStack != 'k3d'
        working-directory: test/e2e/playwright
        env:
          GRAFANA_URL: http://localhost:3000
          CERBERUS_URL: http://localhost:8080
          # iterate-all-dashboards reads dashboard JSON from disk; point it at
          # the k3d stack's provisioning dir (the spec default is the compose
          # stack's). The host / otelcol dashboards are fed by receivers the
          # k3d collector intentionally doesn't run (host_metrics, prometheus
          # self-scrape), so probing them here reports empty panels for data
          # this stack never ships; that compose set is covered per-PR by the
          # required compose-smoke job. ClickHouse query_log IS seeded on k3d
          # (the gateway's sqlquery/clickhouse-logs receiver mirrors compose),
          # so loki_explore_columns.spec.ts — the #908 Logs-Drilldown column
          # gate that queries {service_name="clickhouse"} directly — runs here.
          DASHBOARDS_DIR: ${{ github.workspace }}/test/e2e/grafana/dashboards
        run: npx playwright test ${{ matrix.specs }} --reporter=list

      # ---- crawl shard (CRAWL_STACK=k3d) ----
      # The same crawl framework the compose-smoke job runs per-PR
      # (test/e2e/playwright/crawl/ — BFS + universal oracles + inventory
      # ratchet, ds/query replays, data-quality lints), pointed at THIS stack
      # via CRAWL_STACK=k3d. Runs only on schedule + manual dispatch (RUN_SHARD
      # is false for the crawl shard on push), always at SWEEP_DEPTH=full (the
      # k3d inventory has no separate CI lean lane).
      #
      # Bootstrap convention: the committed k3d inventory
      # (test/e2e/playwright/crawl/grafana-surface-inventory.k3d.json) starts
      # EMPTY, and the crawl FAILS LOUDLY on it (see assertInventoryBootstrapped
      # in crawl/lib.ts) until a real inventory is committed — the red lane is
      # the pressure that keeps bootstrap from silently becoming permanent. To
      # bootstrap (or deliberately regenerate after surface growth): dispatch
      # this workflow with update_crawl_inventory=true, then commit the uploaded
      # artifact.
      - name: Run Playwright crawl (${{ matrix.name }}, CRAWL_STACK=k3d)
        id: playwright_crawl
        if: env.RUN_SHARD == 'true' && matrix.crawlStack == 'k3d'
        working-directory: test/e2e/playwright
        env:
          GRAFANA_URL: http://localhost:3000
          CERBERUS_URL: http://localhost:8080
          CRAWL_STACK: ${{ matrix.crawlStack }}
          SWEEP_DEPTH: full
          CERBERUS_UPDATE_INVENTORY: ${{ github.event_name == 'workflow_dispatch' && inputs.update_crawl_inventory && '1' || '' }}
        run: npx playwright test ${{ matrix.specs }} --reporter=list

      - name: Upload regenerated k3d crawl inventory
        if: always() && matrix.crawlStack == 'k3d' && github.event_name == 'workflow_dispatch' && inputs.update_crawl_inventory
        uses: actions/upload-artifact@v7
        with:
          name: grafana-surface-inventory-k3d
          path: test/e2e/playwright/crawl/grafana-surface-inventory.k3d.json
          retention-days: 14

      # Hard gate: zero cerberus container restarts across this shard,
      # asserted even when every spec passed. The nightly at run 27253909069
      # went GREEN while attempt 1 of the kiosk sweep hit "dial tcp …:8080:
      # connect: connection refused" — Playwright's retries rode out a window
      # where every cerberus pod was being probe-killed/unready at once, so the
      # lane silently shipped a restart-looping gateway. A restart is a failure
      # to fix at the source (probe budgets, resources, or a real crash); never
      # a thing retries may absorb. On violation the step prints the
      # previous-container logs + describes + events — the crash evidence —
      # then fails the job.
      - name: Assert zero cerberus restarts
        if: always() && env.RUN_SHARD == 'true'
        run: |
          total=0
          for c in $(kubectl -n cerberus get pods -l app=cerberus \
              -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{"\n"}{end}'); do
            total=$((total + c))
          done
          echo "cerberus container restarts (sum across pods): $total"
          if [ "$total" -gt 0 ]; then
            echo "::error::cerberus pods restarted $total time(s) during the e2e run — dumping evidence"
            kubectl -n cerberus get pods -o wide || true
            kubectl -n cerberus get events --sort-by=.lastTimestamp | tail -60 || true
            for p in $(kubectl -n cerberus get pods -l app=cerberus -o name); do
              echo "=== $p (previous container) ==="
              kubectl -n cerberus logs "$p" --previous --tail 120 || true
            done
            kubectl -n cerberus describe pods -l app=cerberus || true
            exit 1
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          # Per-shard name — a static name 409s across the matrix
          # (upload-artifact@v4+ rejects a second upload to a used name).
          name: playwright-report-${{ matrix.name }}
          path: test/e2e/playwright/playwright-report
          retention-days: 14

      - name: Dump cluster state on failure
        if: failure() && env.RUN_SHARD == 'true'
        run: |
          echo "=== pods ==="
          kubectl -n cerberus get pods -o wide || true
          echo "=== events (last 50) ==="
          kubectl -n cerberus get events --sort-by=.lastTimestamp | tail -50 || true
          echo "=== cerberus logs ==="
          kubectl -n cerberus logs deploy/cerberus --tail 200 || true
          # Per-pod current + previous-container logs for EVERY
          # cerberus pod: `logs deploy/...` picks one pod, which on a
          # crash-looping deployment is usually a healthy survivor —
          # run 27249217602 had two cerberus pods in CrashLoopBackOff
          # (exit 1) and the dump captured nothing about why. The
          # --previous tail is the crash evidence.
          for p in $(kubectl -n cerberus get pods -l app=cerberus -o name); do
            echo "=== $p (current) ==="
            kubectl -n cerberus logs "$p" --tail 50 || true
            echo "=== $p (previous container, if restarted) ==="
            kubectl -n cerberus logs "$p" --previous --tail 100 || true
          done
          echo "=== cerberus pod describes ==="
          kubectl -n cerberus describe pods -l app=cerberus || true
          echo "=== clickhouse logs ==="
          kubectl -n cerberus logs deploy/clickhouse --tail 200 || true
          echo "=== grafana logs ==="
          kubectl -n cerberus logs deploy/grafana --tail 200 || true
          echo "=== otel-collector gateway logs ==="
          kubectl -n cerberus logs deploy/otel-collector-gateway --tail 200 || true
          echo "=== otel-collector agent logs ==="
          kubectl -n cerberus logs daemonset/otel-collector-agent --tail 200 || true
          echo "=== sample-app traces logs ==="
          kubectl -n cerberus logs deploy/sample-app-traces --tail 100 || true
          echo "=== sample-app metrics logs ==="
          kubectl -n cerberus logs deploy/sample-app-metrics --tail 100 || true
          echo "=== sample-app metrics previous-container logs ==="
          kubectl -n cerberus logs deploy/sample-app-metrics --previous --tail 100 || true
          echo "=== sample-app logs logs ==="
          kubectl -n cerberus logs deploy/sample-app-logs --tail 100 || true
          echo "=== sample-app metrics describe ==="
          kubectl -n cerberus describe deployment/sample-app-metrics || true
          kubectl -n cerberus describe pod -l app=sample-app,signal=metrics || true
          echo "=== rolling seeder log (tail 200) ==="
          tail -200 /tmp/cerberus-e2e-seed-rolling.log 2>/dev/null || true
          echo "=== rolling seeder port-forward log (tail 50) ==="
          tail -50 /tmp/cerberus-e2e-seed-pf.log 2>/dev/null || true

      - name: Tear down
        if: always() && env.RUN_SHARD == 'true'
        run: just e2e-down

  # The AGGREGATOR — a single clean pass/fail over every dashboard shard. The
  # dashboard lane never runs on pull_request, so this is NOT a
  # branch-protection required check (unlike compose-smoke's aggregator); it
  # exists so a merge/nightly/dispatch run has one rolled-up dashboard verdict
  # instead of N per-shard contexts, and so the coverage-discipline guard
  # (dashboard-setup) gates the fan-out. always() so it still reports when the
  # setup/shards were skipped (e.g. a pull_request event, where the whole lane
  # is off).
  dashboard:
    name: dashboard
    needs: [dashboard-setup, dashboard-shard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: gate on every shard
        run: |
          echo "setup  = ${{ needs.dashboard-setup.result }}"
          echo "shards = ${{ needs.dashboard-shard.result }}"
          # If setup was skipped (docs-only PR, or a non-PR/push/schedule/
          # dispatch path), there is nothing to aggregate — report green
          # without work. On a code PR setup runs, so this branch does not fire
          # and the shard roll-up below is the real gate.
          if [ "${{ needs.dashboard-setup.result }}" = "skipped" ]; then
            echo "dashboard lane skipped (docs-only or unsupported event) — nothing to aggregate."
            exit 0
          fi
          # Otherwise setup must have succeeded and the matrix must be a clean
          # success. A matrix exposes ONE rolled-up .result: `success` only if
          # EVERY child succeeded; `failure` if any failed; `cancelled` if any
          # was cancelled. The strict `!= 'success'` form catches failure AND
          # cancelled AND skipped — fail-fast:false keeps a real spec failure a
          # clean `failure`, not an ambiguous `cancelled`.
          if [ "${{ needs.dashboard-setup.result }}" != "success" ]; then
            echo "::error::dashboard-setup did not succeed (${{ needs.dashboard-setup.result }})."
            exit 1
          fi
          if [ "${{ needs.dashboard-shard.result }}" != "success" ]; then
            echo "::error::one or more dashboard shards failed/cancelled (rolled-up: ${{ needs.dashboard-shard.result }})."
            exit 1
          fi
          echo "all dashboard shards passed."

  startup-bench:
    # Startup-speed benchmark: spawn cerberus and assert <2 s to /healthz.
    # Informational only — not a required gate. The fast-feedback PR loop
    # stays on `check` + `lint` + `compose-smoke`. Runs on push-to-main +
    # nightly + manual dispatch alongside the dashboard job.
    name: startup-bench
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: e2e-startup-bench-${{ github.ref }}
      cancel-in-progress: false
    # Why not `services:`? `clickhouse/clickhouse-server:25.8-alpine`'s
    # two-phase entrypoint (temp server → create user+DB → restart) takes
    # 120–200s under GH Actions runner load, and GH's `services:` retry
    # mechanism kills the container on the first window expiry. Running
    # CH inline as a plain `docker run` step with our own poll loop
    # decouples the wait from GH's healthcheck timer and never races.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Start ClickHouse
        run: |
          # Use the Ubuntu-base image, not -alpine. The alpine variant
          # on GH Actions runners stalls in the entrypoint script for
          # several minutes (never starts the server process); the
          # Ubuntu image boots in ~10s. The dashboard k3d job still
          # uses -alpine because it has more headroom in-cluster.
          docker run -d --name clickhouse \
            -p 9000:9000 -p 8123:8123 \
            -e CLICKHOUSE_DB=otel \
            -e CLICKHOUSE_USER=cerberus \
            -e CLICKHOUSE_PASSWORD=cerberus \
            clickhouse/clickhouse-server:25.8

      - name: Wait for ClickHouse
        run: |
          # Poll for up to 2 minutes — Ubuntu-base CH typically opens
          # 8123 within 10–20s. wget runs inside the container
          # (busybox-style is fine; full Ubuntu wget is also fine).
          for i in $(seq 1 24); do
            if docker exec clickhouse wget -q --spider http://localhost:8123/ping; then
              echo "ClickHouse ready after $((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "ClickHouse failed to become ready after 2 minutes"
          docker logs --tail 100 clickhouse
          exit 1

      - name: Run startup benchmark
        env:
          CH_ADDR: 127.0.0.1:9000
          CH_DATABASE: otel
          CH_USERNAME: cerberus
          CH_PASSWORD: cerberus
        run: just startup-bench

      - name: Stop ClickHouse
        if: always()
        run: docker rm -f clickhouse || true

  chaos:
    name: chaos
    # Live-stack chaos-engineering lane: fault-inject against the running
    # k3d stack and assert the gateway's landed resilience contracts hold
    # under REAL faults (circuit breaker #883, per-query wall-clock
    # timeout #886, handler-panic envelope #885, admission control #4).
    # This is the robustness layer ABOVE Layer 10's deterministic
    # stubbed-querier unit chaos (in the required `check` lane) — it
    # exercises real faults against a real deployment.
    #
    # INFORMATIONAL, never a PR gate. k3d is heavy and chaos flakes, so —
    # exactly like the `dashboard` job — this runs on push-to-main +
    # nightly + manual dispatch ONLY, never on pull_request, and is NOT a
    # branch-protection required check. A regression is caught at
    # merge-to-main time and reverted from main, not blocked pre-merge.
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # 40 to match the dashboard budget. Shared bring-up (e2e-up +
    # seed-rolling + wait-otel) is ~10-15 min; the phase-1 fault scenarios
    # are ~3-5 min each including heal + bounded recovery polling, fitting
    # comfortably under the cap (~25-30 min target wall-clock).
    timeout-minutes: 40
    concurrency:
      # Never cancel-in-progress — a half-killed k3d teardown leaks Docker
      # volumes (same posture as the dashboard job).
      group: e2e-chaos-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      # node for chaos-run.mjs (node: builtins only — no npm install).
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install k3d
        run: |
          curl -sSfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash

      # Reuse the e2e k3d bring-up VERBATIM (identical first steps to the
      # dashboard job): cluster, cerberus:e2e image, manifests, host port
      # maps (localhost:8080 cerberus), and live OTel data.
      - name: Bring up k3d stack
        run: just e2e-up

      - name: Seed OTel data (deterministic synthetic rows; rolling)
        run: just e2e-seed-rolling

      - name: Wait for real OTel data from the collector pipeline
        run: just e2e-wait-otel

      # Apply the chaos overlay (low breaker threshold + small
      # CERBERUS_QUERY_TIMEOUT + small admit/pool caps) so faults trip
      # FAST + DETERMINISTICALLY within the per-scenario budget.
      - name: Apply chaos overlay (resilience knobs)
        run: just e2e-chaos-overlay

      # Phase-1 scenarios sequentially with heal-between-each:
      # ch-pod-kill, ch-slow/query-timeout, cerberus-pod-kill. On the
      # nightly schedule + manual dispatch, run the full phase set
      # (adds ch-network-partition + load/admit-saturation).
      - name: Run live-stack chaos lane
        env:
          CERBERUS_URL: http://localhost:8080
          CHAOS_PHASE: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'all' || 'phase-1' }}
        run: just e2e-chaos

      # Cluster-state evidence dump on failure — copied from the dashboard
      # job so a red chaos run stays actionable (reviewers don't learn to
      # ignore the lane). Per-pod current + previous-container logs are the
      # crash evidence; the chaos lane deliberately does NOT inherit the
      # dashboard job's blanket `Assert zero cerberus restarts` step (a
      # breaker-trip-by-design flips /readyz red and cerberus-pod-kill
      # replaces a replica — both fold into each scenario's chaos-aware
      # recovery assertion instead).
      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo "=== pods ==="
          kubectl -n cerberus get pods -o wide || true
          echo "=== events (last 50) ==="
          kubectl -n cerberus get events --sort-by=.lastTimestamp | tail -50 || true
          echo "=== networkpolicies ==="
          kubectl -n cerberus get networkpolicies -o wide || true
          echo "=== cerberus logs ==="
          kubectl -n cerberus logs deploy/cerberus --tail 200 || true
          for p in $(kubectl -n cerberus get pods -l app=cerberus -o name); do
            echo "=== $p (current) ==="
            kubectl -n cerberus logs "$p" --tail 50 || true
            echo "=== $p (previous container, if restarted) ==="
            kubectl -n cerberus logs "$p" --previous --tail 100 || true
          done
          echo "=== cerberus pod describes ==="
          kubectl -n cerberus describe pods -l app=cerberus || true
          echo "=== clickhouse logs ==="
          kubectl -n cerberus logs deploy/clickhouse --tail 200 || true
          echo "=== clickhouse pod describes ==="
          kubectl -n cerberus describe pods -l app=clickhouse || true
          echo "=== otel-collector gateway logs ==="
          kubectl -n cerberus logs deploy/otel-collector-gateway --tail 200 || true
          echo "=== otel-collector agent logs ==="
          kubectl -n cerberus logs daemonset/otel-collector-agent --tail 200 || true
          echo "=== rolling seeder log (tail 200) ==="
          tail -200 /tmp/cerberus-e2e-seed-rolling.log 2>/dev/null || true

      - name: Tear down
        if: always()
        run: just e2e-down
