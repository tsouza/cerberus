name: e2e

# End-to-end test umbrella. Hosts both:
#   - `compose-smoke` — repo-root quickstart compose stack smoke
#     (`docker compose up --wait`) + Grafana Playwright catch-net.
#     Runs on pull_request + push-to-main at SWEEP_DEPTH=lean (the
#     required PR gate) and on the nightly schedule at
#     SWEEP_DEPTH=full. The clickhouse / host / otelcol dashboards
#     are compose-only surfaces (their receivers don't run in the
#     k3d stack), so the nightly full-depth sweep of them has to
#     happen HERE — the dashboard job can't cover them. Required
#     status check on branch protection — DO NOT rename the job
#     (the check name is pinned to `compose-smoke`).
#   - `dashboard` — full-stack k3d + cerberus + Grafana + Playwright
#     smoke. Runs on push-to-main + nightly + manual dispatch only.
#     Informational on merges, not a PR gate; regressions are caught
#     at merge-to-main time and reverted from main if they break.
#     On schedule + dispatch it additionally runs the Grafana surface
#     crawler with CRAWL_STACK=k3d (same engine as compose-smoke's
#     crawl lane, this stack's config + inventory — see
#     test/e2e/playwright/crawl/stacks.ts).
#   - `startup-bench` — startup-speed bench (cerberus to /healthz in
#     <2s). Same trigger set as `dashboard`; informational only.
#
# Why `compose-smoke` matters on top of `dashboard`: the dashboard
# job uses k3d, not docker-compose. Without `compose-smoke` the
# quickstart compose stack has zero PR coverage and silently breaks
# when a contributor edits docker-compose.yml / Dockerfile.local /
# Grafana provisioning / the cerberus binary.
#
# What `compose-smoke` does:
#   1. `docker compose up --wait` — build cerberus, bring up CH +
#      cerberus + grafana, wait for all healthchecks to go green.
#   2. Curl cerberus's /healthz + /readyz and Grafana's /api/health
#      from the host. Confirms the published port maps are right and
#      the service contracts are honoured end-to-end.
#   3. Drive Grafana through every provisioned dashboard via a
#      Playwright catch-net spec — catches the class of bug where
#      Grafana 200s a `/api/ds/query` but the body carries
#      .results.<refId>.error (invisible to curl smokes).
#   4. Teardown with `docker compose down -v`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # nightly at 03:17 UTC
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      update_crawl_inventory:
        description: >-
          Regenerate the k3d crawl surface inventory
          (CERBERUS_UPDATE_INVENTORY=1) and upload it as an artifact to
          commit. This is the bootstrap/regen path for
          test/e2e/playwright/crawl/grafana-surface-inventory.k3d.json —
          the k3d crawl lane fails loudly until a non-empty inventory is
          committed.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

# No file-level concurrency — the two lanes have different policies.
# `compose-smoke` cancels in-progress on PR events; `dashboard` /
# `startup-bench` never cancel (a half-killed k3d teardown leaks
# Docker volumes). Per-job `concurrency:` blocks encode each policy.

jobs:
  # See `.github/workflows/ci.yml` for the rationale + filter convention.
  # Docs-only PRs short-circuit the compose-smoke job (Docker compose
  # build + Grafana Playwright catch-net are pointless when no code
  # changed). Runs on pull_request only — push and schedule bypass the
  # docs-only gate and go straight to the smoke job (a nightly run has
  # no diff to filter on).
  changes:
    name: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.compute.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          # See ci.yml for why `every` is required (the `**` baseline
          # plus negation patterns would otherwise always be true).
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.markdown'
              - '!docs/**'
              - '!LICENSE*'
              - '!CHANGELOG.md'
              - '!.markdownlint*'
              - '!CLAUDE.md'
              - '!AGENTS.md'
              - '!README*'

      - id: compute
        run: |
          if [ "${{ steps.filter.outputs.code }}" = "false" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  # `gate` is the cheap-first tripwire for the `compose-smoke` required
  # check. compose-smoke is the single most expensive PR lane (~14-45 min
  # full Docker compose stack + Grafana Playwright catch-net), so we
  # DON'T want to burn that runner time when a trivial discipline-grep or
  # a compile break would have failed the PR anyway. `gate` runs the same
  # fast checks ci.yml's `forbid-skip` job runs (pure `git grep`, seconds)
  # plus a `go build ./...` compile sanity check (~1-2 min with the module
  # cache); compose-smoke `needs: gate` and refuses to start on a PR until
  # gate is green.
  #
  # PR-ONLY by design (mirrors `changes`): on push / schedule / dispatch
  # the gate is skipped and compose-smoke's `if:` short-circuits the gate
  # clause to true, so the nightly + push lanes keep running unconditionally
  # (a nightly run has no diff to gate on, and push-to-main already merged).
  #
  # SAFETY: when gate FAILS on a PR, compose-smoke is SKIPPED — which
  # branch protection treats as satisfied — but that is NOT a merge hole,
  # because ci.yml's own `forbid-skip` / `check` go RED on the same
  # breakage and block the merge. The gate only saves runner minutes.
  gate:
    name: gate
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # The discipline scans diff against origin/main, so we need
          # both refs reachable (mirrors ci.yml's forbid-skip checkout).
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      # The six discipline scans (pure `git grep` / `perl`, no Go
      # toolchain) — byte-identical to ci.yml's `forbid-skip` job.
      - name: Reject t.Skip in test files
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: t-skip
      - name: Reject "not implemented" / "skipped" / "deferred" in tests + fixtures
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: wording-tests
      - name: Reject "not implemented" in production code
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: not-implemented
      - name: Reject soft-assertion / silent-recover patterns
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: soft-assert
      - name: Reject should_skip overlay entries
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: should-skip
      - name: Reject test escape-hatch patterns
        run: node .github/scripts/forbid-skip.mjs
        env:
          CHECK: escape-hatch

      # Compile sanity check. Far cheaper than the full compose stack;
      # catches a non-building tree before Docker buildx + k3d spin up.
      - name: go build (compile sanity)
        run: go build ./...

  compose-smoke:
    name: compose-smoke
    needs: [changes, gate]
    # Lane doctrine: PR + push run at SWEEP_DEPTH=lean (the required
    # fast-feedback gate); the nightly schedule runs at
    # SWEEP_DEPTH=full. The schedule lane exists because the
    # clickhouse / host / otelcol dashboards are compose-only
    # surfaces — the k3d dashboard job's collector intentionally
    # doesn't run their receivers — so full-depth coverage of them
    # has to live in this job. `needs.changes` only runs on
    # pull_request, so we have to tolerate it being absent on
    # push/schedule (always() unwraps the skip, and the docs-only
    # short-circuit only applies on PR).
    if: |
      always() &&
      (github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule') &&
      (github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true') &&
      (github.event_name != 'pull_request' || needs.gate.result == 'success')
    runs-on: ubuntu-latest
    # Timeout is per-lane. PR/push run SWEEP_DEPTH=lean: the catch-net
    # smoke + the iterate-* specs + the lean crawl (root + nav + one
    # representative state per interaction control on the three
    # drilldown roots) finish well under 45 min — that ceiling (was 30)
    # absorbed the showcase-family kiosk renders (showcase-promql adds
    # ~100 panel states to iterate-panel-kiosk alone).
    #
    # The nightly schedule runs SWEEP_DEPTH=full: the crawl spec alone
    # BFS-walks every eligible surface AND drives every interactive
    # control on each (the interaction sweep), which was observed at
    # 50+ minutes wall-clock on its own — on top of the full-depth
    # kiosk/browser-render passes of the other specs in this same job.
    # 45 min cannot hold that; the full lane gets 120. The expression
    # keeps the PR gate tight (fast feedback) while the nightly lane
    # has the headroom the full-depth interaction sweep genuinely
    # needs. Full-depth is NIGHTLY-ONLY by design — never a PR gate;
    # see SWEEP_DEPTH below + docs/test-strategy.md (interaction sweep).
    timeout-minutes: ${{ github.event_name == 'schedule' && 120 || 45 }}
    concurrency:
      group: compose-smoke-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      # Authenticated Docker Hub pulls get a far higher rate limit than
      # anonymous pulls from shared runner IPs (same hardening as the
      # compatibility workflow's compose jobs). Skips silently when the
      # secrets are absent (forks); GHCR mirroring is the stronger
      # long-term fix.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN_SET == 'true' }}
        env:
          DOCKERHUB_TOKEN_SET: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: docker compose up --wait
        run: |
          # --wait-timeout caps the wait at 5 min. Cold runners need
          # ~30-60s for the Go build + ~10-20s for CH first-boot; 300s
          # is generous slack.
          docker compose up --wait --wait-timeout 300

      - name: smoke cerberus /healthz + /readyz
        run: |
          curl -fsS --max-time 5 http://localhost:8080/healthz
          curl -fsS --max-time 5 http://localhost:8080/readyz

      - name: smoke Grafana /api/health
        run: |
          curl -fsS --max-time 5 http://localhost:3000/api/health \
            | tee /tmp/grafana-health.json
          # `database: ok` is the load-bearing field for "Grafana
          # itself is up and its internal SQLite is responsive".
          # Datasource health is a separate per-datasource probe.
          grep -q '"database":[[:space:]]*"ok"' /tmp/grafana-health.json

      # ---- Playwright dashboard catch-net ----
      # Drives Grafana through every provisioned dashboard, captures
      # /api/ds/query + /api/dashboards/* traffic, and asserts every
      # response is 2xx with no tunneled per-target error. This is the
      # gate that catches the class of bug where Grafana 200s a
      # ds/query but the body carries .results.<refId>.error — invisible
      # to curl smokes and to direct cerberus-API tests.
      #
      # Gate posture: hard fail. A non-2xx response or a tunneled
      # per-target error in a /api/ds/query body fails the job — that
      # was the gap that let dashboard-load regressions land on main
      # for hours unnoticed.
      # No npm cache here — the playwright suite doesn't currently
      # ship a package-lock.json, and setup-node's cache lookup hard-
      # fails before the install fallback below ever runs when the
      # cache-dependency-path is unresolvable. Re-add cache: npm once a
      # lockfile lands under test/e2e/playwright/.
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: install Playwright deps
        working-directory: test/e2e/playwright
        run: |
          # npm ci needs a lockfile; fall back to `npm install` if the
          # repo doesn't ship one yet (the existing playwright suite
          # uses the same pattern in the k3d e2e job).
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
          npx playwright install --with-deps chromium

      - name: playwright compose-grafana-smoke
        id: playwright_smoke
        working-directory: test/e2e/playwright
        env:
          GRAFANA_BASE_URL: http://localhost:3000
          GRAFANA_URL: http://localhost:3000
          CERBERUS_URL: http://localhost:8080
          # Depth doctrine: PR/push = lean (required gate, fewest
          # states), nightly schedule = full (every dashboard's
          # browser render, showcase family included). The depth
          # flag only changes how many STATES the sweeps visit,
          # never which rules run — see
          # test/e2e/playwright/helpers/depth.ts.
          SWEEP_DEPTH: ${{ github.event_name == 'schedule' && 'full' || 'lean' }}
          # Select the crawl suite's stack config (crawl/stacks.ts).
          # CRAWL_STACK=compose pins this stack's surface inventory
          # (test/e2e/playwright/crawl/grafana-surface-inventory.compose.json);
          # the k3d dashboard job runs the same engine with
          # CRAWL_STACK=k3d against its own inventory file. See the
          # CRAWL_STACK comment in
          # test/e2e/playwright/playwright.config.ts.
          CRAWL_STACK: compose
        run: |
          # Phase-1 panel-shape spec (iterate-panel-shape.spec.ts) runs
          # alongside the catch-net smoke. It enumerates every
          # provisioned dashboard, finds every aggregating panel
          # target, and asserts the by(...) / without(...) label-shape
          # rule against cerberus's /api/v1/query_range — pinning the
          # N2/N11/N14 sweep findings so they can't silently regress.
          #
          # Phase-2 histogram-completeness spec
          # (iterate-histogram-completeness.spec.ts) iterates the same
          # dashboard surface but selects histogram_quantile(...)
          # targets, asserts the underlying _bucket / _count / _sum
          # companion series exist on the wire, and pins the
          # no-fabricated-value rule for histogram_quantile over
          # bucket-less metrics. Closes N5 / N6.
          #
          # Phase-3 filter-drill spec (iterate-filter-drill.spec.ts)
          # rides the same dashboard enumeration: for every panel
          # with a by(...) clause it re-fires the query with a
          # `{<key>="<value>"}` matcher synthesised from a baseline-
          # observed value and asserts the filtered series count is
          # in (0, baseline] — the Q3-resolved subset rule. Pins
          # N3/N15 (matcher-path drill regressions).
          #
          # Phase-4 single-panel-kiosk spec
          # (iterate-panel-kiosk.spec.ts) iterates every provisioned
          # dashboard + every panel, opens the panel in single-panel
          # kiosk view (`?viewPanel=<id>&kiosk`), asserts the body
          # renders, no role=alert error banner appears, and no
          # browser console errors fire. ESCs back to the grid view
          # and asserts the back-nav leaves no stuck-loading panel or
          # orphaned modal behind. Closes N13 (latent).
          #
          # iterate-all-dashboards.spec.ts reads
          # test/e2e/grafana/compose/dashboards/*.json at spec-build
          # time, so it auto-adapts to whatever dashboards the
          # provisioning directory carries. As the rich-observability
          # rollout lands new dashboards (clickhouse, otelcol, host),
          # the spec picks
          # them up without an edit here.
          #
          # iterate-metrics-explorer.spec.ts enumerates every metric
          # cerberus publishes and probes /api/v1/series for each.
          # Pins the user's #8 sweep finding: the labels chip must not
          # surface "Unable to fetch labels" for any published metric.
          #
          # crawl/ suite (P4/P5 — the deterministic Grafana crawler):
          #   - crawl/crawl.spec.ts BFS-walks every same-origin surface
          #     reachable from the Grafana root with universal per-page
          #     oracles (console errors, datasource-API non-2xx +
          #     tunneled errors, panel tri-state, crash banners) and
          #     pins the visited set against
          #     crawl/grafana-surface-inventory.compose.json. SWEEP_DEPTH
          #     drives the lane: lean (PR gate) = root + nav + one
          #     representative per drilldown app; full (this job's
          #     nightly schedule run) = exhaustive BFS under a hard
          #     page cap.
          #   - crawl/dsquery.spec.ts replays consumer-grade queries
          #     through POST /api/ds/query (the plugin BACKEND — a
          #     decode layer the datasource-proxy probes never touch).
          #   - crawl/lints.spec.ts carries the data-quality lints
          #     (histogram degeneracy, identical-quantile-series).
          npx playwright test \
            compose_grafana_smoke.spec.ts \
            iterate-panel-shape.spec.ts \
            iterate-histogram-completeness.spec.ts \
            iterate-filter-drill.spec.ts \
            iterate-panel-kiosk.spec.ts \
            iterate-all-dashboards.spec.ts \
            iterate-metrics-explorer.spec.ts \
            crawl/crawl.spec.ts \
            crawl/dsquery.spec.ts \
            crawl/lints.spec.ts \
            --reporter=list

      - name: upload Playwright report on failure
        if: steps.playwright_smoke.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: compose-grafana-smoke-report
          path: |
            test/e2e/playwright/playwright-report
            test/e2e/playwright/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: dump compose state + logs on failure
        if: failure() || steps.playwright_smoke.outcome == 'failure'
        run: |
          echo "=== compose ps ==="
          docker compose ps
          echo "=== clickhouse logs (last 200) ==="
          docker compose logs --tail=200 clickhouse || true
          echo "=== cerberus logs (last 200) ==="
          docker compose logs --tail=200 cerberus || true
          echo "=== grafana logs (last 200) ==="
          docker compose logs --tail=200 grafana || true
          echo "=== otel-collector logs (last 200) ==="
          docker compose logs --tail=200 otel-collector || true

      - name: teardown
        if: always()
        run: docker compose down -v --remove-orphans

  dashboard:
    name: dashboard
    # Push-to-main + nightly + manual dispatch only — informational on
    # merges, not a PR gate. The PR fast-feedback loop stays on
    # `check` + `lint` + `compose-smoke`.
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # 40 (was 25): the schedule/dispatch lanes now also run the k3d
    # crawl suite (CRAWL_STACK=k3d at SWEEP_DEPTH=full — exhaustive
    # BFS + ds/query replays + data-quality lints) after the
    # auto-discovery smoke. Push-to-main runs skip the crawl step and
    # stay well under the old 25-minute ceiling.
    timeout-minutes: 40
    concurrency:
      group: e2e-dashboard-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'test/e2e/playwright/package.json'

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install k3d
        run: |
          curl -sSfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash

      - name: Bring up k3d stack
        run: just e2e-up

      - name: Seed OTel data (deterministic synthetic rows; rolling)
        # `e2e-seed-rolling` runs the same INSERTs as `e2e-seed` once
        # synchronously (the next CI step sees a populated DB), then
        # leaves the seeder running in the background re-anchoring the
        # metric/log windows on the new now64(9) every 30 s. Replaces
        # the static ±15 min seed window the previous arms-race expanded
        # in PRs #590 / #615 / #617 / #693 to absorb suite drift; the
        # rolling design only has to cover one tick + the 5 m Prom/Loki
        # staleness lookback, so the static span shrinks back to ±5 min.
        # `e2e-down` (called from the teardown step below) stops the
        # seeder + its kubectl port-forward on cleanup.
        run: just e2e-seed-rolling

      - name: Wait for real OTel data from the collector pipeline
        run: just e2e-wait-otel

      - name: Run Go E2E tests
        run: just e2e-run

      - name: Install Playwright + browsers
        working-directory: test/e2e/playwright
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        working-directory: test/e2e/playwright
        env:
          GRAFANA_URL: http://localhost:3000
          CERBERUS_URL: http://localhost:8080
          # iterate-all-dashboards reads dashboard JSON from disk;
          # point it at the k3d stack's provisioning dir (the spec
          # default is the compose stack's). The compose-only
          # dashboards (clickhouse / host / otelcol) are fed by
          # receivers the k3d collector intentionally doesn't run, so
          # probing them here reports empty panels for data this stack
          # never ships; the compose set is covered per-PR by the
          # required compose-smoke job.
          DASHBOARDS_DIR: ${{ github.workspace }}/test/e2e/grafana/dashboards
        # `npx playwright test` with no spec filter auto-discovers
        # every `*.spec.ts` under test/e2e/playwright/. That includes
        # the phase-5 `iterate-time-ranges.spec.ts` matrix sweep,
        # which is deliberately NOT in the compose-smoke job's
        # explicit invocation list (Q2 decision — too expensive for
        # PR gate; nightly-only per
        # /home/thiago/.claude/plans/e2e-enhance.md §9). Any future
        # nightly-only spec should follow the same pattern: just add
        # the file here and skip it from the compose-smoke job's
        # explicit invocation list.
        #
        # Auto-discovered specs of note (each is hard-fail in this
        # informational dashboard job; the job itself is not a PR gate):
        #   - iterate-all-dashboards.spec.ts: reads the DASHBOARDS_DIR
        #       JSON at spec-build time and probes every panel against
        #       the real cerberus stack.
        #   - iterate-metrics-explorer.spec.ts: enumerates every
        #       metric cerberus publishes and probes /api/v1/series for
        #       each. Pins the user's #8 sweep finding: the labels chip
        #       must not surface "Unable to fetch labels".
        run: npx playwright test

      # ---- k3d crawl lane (one engine, N stack configs) ----
      # The same crawl framework the compose-smoke job runs per-PR
      # (test/e2e/playwright/crawl/ — BFS + universal oracles +
      # inventory ratchet, ds/query replays, data-quality lints),
      # pointed at THIS stack via CRAWL_STACK=k3d. Schedule + manual
      # dispatch only: the per-PR / per-merge fast lane is the compose
      # stack's job, and the k3d lane always crawls at SWEEP_DEPTH=full
      # (its inventory has no separate CI lean lane).
      #
      # Bootstrap convention: the committed k3d inventory
      # (test/e2e/playwright/crawl/grafana-surface-inventory.k3d.json)
      # starts EMPTY, and the crawl FAILS LOUDLY on it (see
      # assertInventoryBootstrapped in crawl/lib.ts) until a real
      # inventory is committed — the red lane is the pressure that
      # keeps bootstrap from silently becoming permanent. To
      # bootstrap (or deliberately regenerate after surface growth):
      # dispatch this workflow with update_crawl_inventory=true, then
      # commit the uploaded artifact.
      - name: Run Playwright crawl (CRAWL_STACK=k3d)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        working-directory: test/e2e/playwright
        env:
          GRAFANA_URL: http://localhost:3000
          CERBERUS_URL: http://localhost:8080
          CRAWL_STACK: k3d
          SWEEP_DEPTH: full
          CERBERUS_UPDATE_INVENTORY: ${{ github.event_name == 'workflow_dispatch' && inputs.update_crawl_inventory && '1' || '' }}
        run: |
          npx playwright test \
            crawl/crawl.spec.ts \
            crawl/dsquery.spec.ts \
            crawl/lints.spec.ts \
            --reporter=list

      - name: Upload regenerated k3d crawl inventory
        if: always() && github.event_name == 'workflow_dispatch' && inputs.update_crawl_inventory
        uses: actions/upload-artifact@v7
        with:
          name: grafana-surface-inventory-k3d
          path: test/e2e/playwright/crawl/grafana-surface-inventory.k3d.json
          retention-days: 14

      # Hard gate: zero cerberus container restarts across the whole
      # job, asserted even when every spec passed. The nightly at run
      # 27253909069 went GREEN while attempt 1 of the kiosk sweep hit
      # "dial tcp …:8080: connect: connection refused" — Playwright's
      # retries rode out a window where every cerberus pod was being
      # probe-killed/unready at once, so the lane silently shipped a
      # restart-looping gateway. A restart is a failure to fix at the
      # source (probe budgets, resources, or a real crash); never a
      # thing retries may absorb. On violation the step prints the
      # previous-container logs + describes + events — the crash
      # evidence — then fails the job.
      - name: Assert zero cerberus restarts
        if: always()
        run: |
          total=0
          for c in $(kubectl -n cerberus get pods -l app=cerberus \
              -o jsonpath='{range .items[*]}{.status.containerStatuses[0].restartCount}{"\n"}{end}'); do
            total=$((total + c))
          done
          echo "cerberus container restarts (sum across pods): $total"
          if [ "$total" -gt 0 ]; then
            echo "::error::cerberus pods restarted $total time(s) during the e2e run — dumping evidence"
            kubectl -n cerberus get pods -o wide || true
            kubectl -n cerberus get events --sort-by=.lastTimestamp | tail -60 || true
            for p in $(kubectl -n cerberus get pods -l app=cerberus -o name); do
              echo "=== $p (previous container) ==="
              kubectl -n cerberus logs "$p" --previous --tail 120 || true
            done
            kubectl -n cerberus describe pods -l app=cerberus || true
            exit 1
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test/e2e/playwright/playwright-report
          retention-days: 14

      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo "=== pods ==="
          kubectl -n cerberus get pods -o wide || true
          echo "=== events (last 50) ==="
          kubectl -n cerberus get events --sort-by=.lastTimestamp | tail -50 || true
          echo "=== cerberus logs ==="
          kubectl -n cerberus logs deploy/cerberus --tail 200 || true
          # Per-pod current + previous-container logs for EVERY
          # cerberus pod: `logs deploy/...` picks one pod, which on a
          # crash-looping deployment is usually a healthy survivor —
          # run 27249217602 had two cerberus pods in CrashLoopBackOff
          # (exit 1) and the dump captured nothing about why. The
          # --previous tail is the crash evidence.
          for p in $(kubectl -n cerberus get pods -l app=cerberus -o name); do
            echo "=== $p (current) ==="
            kubectl -n cerberus logs "$p" --tail 50 || true
            echo "=== $p (previous container, if restarted) ==="
            kubectl -n cerberus logs "$p" --previous --tail 100 || true
          done
          echo "=== cerberus pod describes ==="
          kubectl -n cerberus describe pods -l app=cerberus || true
          echo "=== clickhouse logs ==="
          kubectl -n cerberus logs deploy/clickhouse --tail 200 || true
          echo "=== grafana logs ==="
          kubectl -n cerberus logs deploy/grafana --tail 200 || true
          echo "=== otel-collector gateway logs ==="
          kubectl -n cerberus logs deploy/otel-collector-gateway --tail 200 || true
          echo "=== otel-collector agent logs ==="
          kubectl -n cerberus logs daemonset/otel-collector-agent --tail 200 || true
          echo "=== sample-app traces logs ==="
          kubectl -n cerberus logs deploy/sample-app-traces --tail 100 || true
          echo "=== sample-app metrics logs ==="
          kubectl -n cerberus logs deploy/sample-app-metrics --tail 100 || true
          echo "=== sample-app metrics previous-container logs ==="
          kubectl -n cerberus logs deploy/sample-app-metrics --previous --tail 100 || true
          echo "=== sample-app logs logs ==="
          kubectl -n cerberus logs deploy/sample-app-logs --tail 100 || true
          echo "=== sample-app metrics describe ==="
          kubectl -n cerberus describe deployment/sample-app-metrics || true
          kubectl -n cerberus describe pod -l app=sample-app,signal=metrics || true
          echo "=== rolling seeder log (tail 200) ==="
          tail -200 /tmp/cerberus-e2e-seed-rolling.log 2>/dev/null || true
          echo "=== rolling seeder port-forward log (tail 50) ==="
          tail -50 /tmp/cerberus-e2e-seed-pf.log 2>/dev/null || true

      - name: Tear down
        if: always()
        run: just e2e-down

  startup-bench:
    # Startup-speed benchmark: spawn cerberus and assert <2 s to /healthz.
    # Informational only — not a required gate. The fast-feedback PR loop
    # stays on `check` + `lint` + `compose-smoke`. Runs on push-to-main +
    # nightly + manual dispatch alongside the dashboard job.
    name: startup-bench
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: e2e-startup-bench-${{ github.ref }}
      cancel-in-progress: false
    # Why not `services:`? `clickhouse/clickhouse-server:25.8-alpine`'s
    # two-phase entrypoint (temp server → create user+DB → restart) takes
    # 120–200s under GH Actions runner load, and GH's `services:` retry
    # mechanism kills the container on the first window expiry. Running
    # CH inline as a plain `docker run` step with our own poll loop
    # decouples the wait from GH's healthcheck timer and never races.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Start ClickHouse
        run: |
          # Use the Ubuntu-base image, not -alpine. The alpine variant
          # on GH Actions runners stalls in the entrypoint script for
          # several minutes (never starts the server process); the
          # Ubuntu image boots in ~10s. The dashboard k3d job still
          # uses -alpine because it has more headroom in-cluster.
          docker run -d --name clickhouse \
            -p 9000:9000 -p 8123:8123 \
            -e CLICKHOUSE_DB=otel \
            -e CLICKHOUSE_USER=cerberus \
            -e CLICKHOUSE_PASSWORD=cerberus \
            clickhouse/clickhouse-server:25.8

      - name: Wait for ClickHouse
        run: |
          # Poll for up to 2 minutes — Ubuntu-base CH typically opens
          # 8123 within 10–20s. wget runs inside the container
          # (busybox-style is fine; full Ubuntu wget is also fine).
          for i in $(seq 1 24); do
            if docker exec clickhouse wget -q --spider http://localhost:8123/ping; then
              echo "ClickHouse ready after $((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "ClickHouse failed to become ready after 2 minutes"
          docker logs --tail 100 clickhouse
          exit 1

      - name: Run startup benchmark
        env:
          CH_ADDR: 127.0.0.1:9000
          CH_DATABASE: otel
          CH_USERNAME: cerberus
          CH_PASSWORD: cerberus
        run: just startup-bench

      - name: Stop ClickHouse
        if: always()
        run: docker rm -f clickhouse || true

  chaos:
    name: chaos
    # Live-stack chaos-engineering lane: fault-inject against the running
    # k3d stack and assert the gateway's landed resilience contracts hold
    # under REAL faults (circuit breaker #883, per-query wall-clock
    # timeout #886, handler-panic envelope #885, admission control #4).
    # This is the robustness layer ABOVE Layer 10's deterministic
    # stubbed-querier unit chaos (in the required `check` lane) — it
    # exercises real faults against a real deployment.
    #
    # INFORMATIONAL, never a PR gate. k3d is heavy and chaos flakes, so —
    # exactly like the `dashboard` job — this runs on push-to-main +
    # nightly + manual dispatch ONLY, never on pull_request, and is NOT a
    # branch-protection required check. A regression is caught at
    # merge-to-main time and reverted from main, not blocked pre-merge.
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # 40 to match the dashboard budget. Shared bring-up (e2e-up +
    # seed-rolling + wait-otel) is ~10-15 min; the phase-1 fault scenarios
    # are ~3-5 min each including heal + bounded recovery polling, fitting
    # comfortably under the cap (~25-30 min target wall-clock).
    timeout-minutes: 40
    concurrency:
      # Never cancel-in-progress — a half-killed k3d teardown leaks Docker
      # volumes (same posture as the dashboard job).
      group: e2e-chaos-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      # node for chaos-run.mjs (node: builtins only — no npm install).
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install k3d
        run: |
          curl -sSfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash

      # Reuse the e2e k3d bring-up VERBATIM (identical first steps to the
      # dashboard job): cluster, cerberus:e2e image, manifests, host port
      # maps (localhost:8080 cerberus), and live OTel data.
      - name: Bring up k3d stack
        run: just e2e-up

      - name: Seed OTel data (deterministic synthetic rows; rolling)
        run: just e2e-seed-rolling

      - name: Wait for real OTel data from the collector pipeline
        run: just e2e-wait-otel

      # Apply the chaos overlay (low breaker threshold + small
      # CERBERUS_QUERY_TIMEOUT + small admit/pool caps) so faults trip
      # FAST + DETERMINISTICALLY within the per-scenario budget.
      - name: Apply chaos overlay (resilience knobs)
        run: just e2e-chaos-overlay

      # Phase-1 scenarios sequentially with heal-between-each:
      # ch-pod-kill, ch-slow/query-timeout, cerberus-pod-kill. On the
      # nightly schedule + manual dispatch, run the full phase set
      # (adds ch-network-partition + load/admit-saturation).
      - name: Run live-stack chaos lane
        env:
          CERBERUS_URL: http://localhost:8080
          CHAOS_PHASE: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'all' || 'phase-1' }}
        run: just e2e-chaos

      # Cluster-state evidence dump on failure — copied from the dashboard
      # job so a red chaos run stays actionable (reviewers don't learn to
      # ignore the lane). Per-pod current + previous-container logs are the
      # crash evidence; the chaos lane deliberately does NOT inherit the
      # dashboard job's blanket `Assert zero cerberus restarts` step (a
      # breaker-trip-by-design flips /readyz red and cerberus-pod-kill
      # replaces a replica — both fold into each scenario's chaos-aware
      # recovery assertion instead).
      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo "=== pods ==="
          kubectl -n cerberus get pods -o wide || true
          echo "=== events (last 50) ==="
          kubectl -n cerberus get events --sort-by=.lastTimestamp | tail -50 || true
          echo "=== networkpolicies ==="
          kubectl -n cerberus get networkpolicies -o wide || true
          echo "=== cerberus logs ==="
          kubectl -n cerberus logs deploy/cerberus --tail 200 || true
          for p in $(kubectl -n cerberus get pods -l app=cerberus -o name); do
            echo "=== $p (current) ==="
            kubectl -n cerberus logs "$p" --tail 50 || true
            echo "=== $p (previous container, if restarted) ==="
            kubectl -n cerberus logs "$p" --previous --tail 100 || true
          done
          echo "=== cerberus pod describes ==="
          kubectl -n cerberus describe pods -l app=cerberus || true
          echo "=== clickhouse logs ==="
          kubectl -n cerberus logs deploy/clickhouse --tail 200 || true
          echo "=== clickhouse pod describes ==="
          kubectl -n cerberus describe pods -l app=clickhouse || true
          echo "=== otel-collector gateway logs ==="
          kubectl -n cerberus logs deploy/otel-collector-gateway --tail 200 || true
          echo "=== otel-collector agent logs ==="
          kubectl -n cerberus logs daemonset/otel-collector-agent --tail 200 || true
          echo "=== rolling seeder log (tail 200) ==="
          tail -200 /tmp/cerberus-e2e-seed-rolling.log 2>/dev/null || true

      - name: Tear down
        if: always()
        run: just e2e-down
