name: e2e

# End-to-end test umbrella. Currently hosts the `dashboard` job (full-
# stack smoke: k3d + cerberus + Grafana + Playwright); future e2e
# scenarios would land as additional jobs in this workflow.
#
# The `dashboard` job is a required status check (branch protection).
# Path filter is intentionally absent so docs- and CI-only PRs still
# produce the check.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # nightly at 03:17 UTC
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dashboard:
    name: dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'test/e2e/playwright/package.json'

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install k3d
        run: |
          curl -sSfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash

      - name: Bring up k3d stack
        run: just e2e-up

      - name: Seed OTel data
        run: just e2e-seed

      - name: Run Go E2E tests
        run: just e2e-run

      - name: Install Playwright + browsers
        working-directory: test/e2e/playwright
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        working-directory: test/e2e/playwright
        env:
          GRAFANA_URL: http://localhost:3000
          CERBERUS_URL: http://localhost:8080
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test/e2e/playwright/playwright-report
          retention-days: 14

      - name: Dump cluster state on failure
        if: failure()
        run: |
          echo "=== pods ==="
          kubectl -n cerberus get pods -o wide || true
          echo "=== cerberus logs ==="
          kubectl -n cerberus logs deploy/cerberus --tail 200 || true
          echo "=== clickhouse logs ==="
          kubectl -n cerberus logs deploy/clickhouse --tail 200 || true
          echo "=== grafana logs ==="
          kubectl -n cerberus logs deploy/grafana --tail 200 || true

      - name: Tear down
        if: always()
        run: just e2e-down
