name: Feature request
description: Suggest a feature, an optimisation, or an unimplemented capability.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before filing:

        - Check [`docs/roadmap.md`](../blob/main/docs/roadmap.md) — your feature may already be planned or tracked.
        - Check the [Roadmap Project](https://github.com/users/tsouza/projects/1) for live status.
        - Check open PRs at <https://github.com/tsouza/cerberus/pulls>.
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Concrete usage scenarios > abstract requests.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        How should cerberus behave with this feature? If it's a new PromQL/LogQL/TraceQL construct, paste the query syntax. If it's an HTTP endpoint, paste a curl example.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, partial solutions, or related features in other tools (Prometheus, Loki, Tempo, VictoriaMetrics, SigNoz, …).
  - type: dropdown
    id: scope
    attributes:
      label: How would you scope this?
      options:
        - Core QL or API surface, full-impact users hit it daily
        - Advanced QL / API; nice-to-have for production parity
        - Optimizer / performance / advanced testing
        - Not sure
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/tsouza/cerberus/blob/main/CODE_OF_CONDUCT.md).
          required: true
