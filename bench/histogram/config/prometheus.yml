global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: histbench-reference

# No live scrape targets — the generator remote-writes the identical fixture
# that lands in ClickHouse (see cmd/gen). The out-of-order window is a safety
# net; the generator writes samples in global time order so it is rarely needed.
scrape_configs: []

storage:
  tsdb:
    out_of_order_time_window: 1h
