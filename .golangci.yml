version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - revive
    - misspell
    # bodyclose: catches `resp, _ := client.Do(req); ...` without
    #   `defer resp.Body.Close()`. Cerberus does a lot of HTTP — leaks
    #   here are easy to introduce.
    - bodyclose
    # errorlint: flags naked `%v` formatting of error values and
    #   non-wrapped error comparisons. Pushes toward `errors.Is/As` +
    #   `fmt.Errorf("...: %w", err)` which gives consumers structured
    #   error handling.
    - errorlint
    # forbidigo: bans `unsafe.Pointer` and `reflect.Value.FieldByName`
    #   inside `internal/traceql/` + `internal/api/tempo/` so the
    #   parser-internal shim retired in #148 cannot be reintroduced.
    #   See docs/fork-tempo-plan.md § "Cerberus PR #D". Scoped to those
    #   two dirs via `exclusions.rules[].path-except` below.
    - forbidigo
  settings:
    revive:
      rules:
        # Default to no doc comments on every exported symbol — package-level
        # docs cover intent; method comments only appear where WHY is non-obvious.
        - name: exported
          disabled: true
    errorlint:
      # Allow comparing error sentinel values via `errors.Is`; flag
      # everything else (`err == sentinel` becomes a finding).
      errorf: true
      asserts: true
      comparison: true
    forbidigo:
      # analyze-types: true → forbidigo resolves identifiers through the
      #   type checker, so the rules match the canonical `unsafe.Pointer`
      #   and `reflect.Value.FieldByName` even under aliased imports.
      analyze-types: true
      forbid:
        - pattern: '^unsafe\.Pointer$'
          msg: 'unsafe.Pointer is forbidden in internal/traceql/ and internal/api/tempo/ — use the tsouza/tempo:cerberus-accessors fork accessors instead. See docs/fork-tempo-plan.md.'
        - pattern: '^reflect\.Value\.FieldByName$'
          msg: 'reflect.FieldByName on parser AST is forbidden — use the upstream-fork accessors instead.'
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - revive
          - errcheck
          - bodyclose
          - errorlint
      - path: cmd/
        linters:
          - revive
          - errcheck
      # forbidigo fires ONLY inside internal/traceql/ + internal/api/tempo/
      # — invert via `path-except` so every other path is excluded.
      - linters:
          - forbidigo
        path-except: '^internal/(traceql|api/tempo)/'

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tsouza/cerberus
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
