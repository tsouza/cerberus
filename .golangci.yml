# ---------------------------------------------------------------------------
# Quality-metric linters (see `enable:` block below).
#
# Each linter measures a structural code-quality signal and is configured
# with a threshold tuned to pass current main with headroom — the point is
# enforcement going forward (block PRs that introduce new violations), not
# punitive retroactive cleanup. Thresholds may be tightened later as the
# called-out hotspots are refactored; raising thresholds is fine when a new
# pattern needs it, but lowering should be the gradient.
#
# - gocognit (cognitive complexity per function). Counts how hard a fn is
#   to read: nesting, switches, jumps. Threshold 60 covers the SQL emitter
#   dispatcher (`(*QueryBuilder).writeInto`, 59) which is intrinsically
#   shaped like a big switch over node kinds. TODO: tighten to 30 once
#   writeInto is broken up by emit_node.go.
#
# - cyclop (cyclomatic complexity per function + package average). Counts
#   branches. `max-complexity: 32` covers `writeInto` (30); `package-average:
#   10.0` covers `engine` at ~4 with room. TODO: tighten max-complexity to
#   25 once writeInto is decomposed.
#
# - funlen (function length: lines + statements). Catches the "this got
#   too long, split it" review comment. 150 lines / 80 statements clears
#   the biggest production fn (`histogramQuantileValueFrag`, 91 lines /
#   79 stmts) with breathing room.
#
# - nestif (max nested-if depth). Currently max 5; threshold 6 leaves a
#   one-step buffer.
#
# - dupl (token-stream duplication). Threshold 220 tokens. The 200 floor
#   would fire on a near-identical pair of constant-fold helpers in
#   `internal/optimizer/constant_fold.go` (lines 124-164 ↔ 170-210, ~210
#   tokens) — duplication acknowledged in the fold-by-type design.
#   TODO: deduplicate the per-type fold helpers and tighten back to 200.
#
# - maintidx (composite Maintainability Index). Halstead-based score;
#   warns when a fn's MI < 20. Production minimum currently 47 (no fires).
#
# - lll (line length). 280 chars. Cerberus emits long CH SQL strings and
#   `INSERT VALUES` seed data in `test/e2e/seed/cmd/seed/main.go` reaches
#   264 chars. 140 would fire on ~30 legitimate SQL/seed lines; 280 keeps
#   the linter useful for accidental 500-char monsters without rewriting
#   readable SQL.
#
# The `test/spec/` and `test/property/` paths are excluded from the
# complexity linters because they hold deterministic-IR pretty-printers
# (`chplan_print.go`, 142 cognitive complexity by design — covers every
# IR node) and oracle evaluators that mirror PromQL semantics; they're
# test infrastructure, not production code.
# ---------------------------------------------------------------------------

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - revive
    - misspell
    # bodyclose: catches `resp, _ := client.Do(req); ...` without
    #   `defer resp.Body.Close()`. Cerberus does a lot of HTTP — leaks
    #   here are easy to introduce.
    - bodyclose
    # errorlint: flags naked `%v` formatting of error values and
    #   non-wrapped error comparisons. Pushes toward `errors.Is/As` +
    #   `fmt.Errorf("...: %w", err)` which gives consumers structured
    #   error handling.
    - errorlint
    # forbidigo: bans `unsafe.Pointer` and `reflect.Value.FieldByName`
    #   across every `internal/**` package so the parser-internal shim
    #   retired in #148 cannot be reintroduced anywhere in the engine.
    #   The original gate covered only `internal/traceql/` +
    #   `internal/api/tempo/` (the packages that historically carried
    #   the shims); the scope was widened to all of `internal/` as
    #   project-wide hygiene — there are zero current violations, so
    #   the gate is purely forward-looking. See docs/upstream-forks.md.
    #   Scoped via `exclusions.rules[].path-except` below.
    - forbidigo
    # Quality-metric linters — see header comment.
    - gocognit
    - cyclop
    - funlen
    - nestif
    - dupl
    - maintidx
    - lll
  settings:
    revive:
      rules:
        # Default to no doc comments on every exported symbol — package-level
        # docs cover intent; method comments only appear where WHY is non-obvious.
        - name: exported
          disabled: true
    errorlint:
      # Allow comparing error sentinel values via `errors.Is`; flag
      # everything else (`err == sentinel` becomes a finding).
      errorf: true
      asserts: true
      comparison: true
    forbidigo:
      # analyze-types: true → forbidigo resolves identifiers through the
      #   type checker, so the rules match the canonical `unsafe.Pointer`
      #   and `reflect.Value.FieldByName` even under aliased imports.
      analyze-types: true
      forbid:
        - pattern: '^unsafe\.Pointer$'
          msg: 'unsafe.Pointer is forbidden across internal/** — use the tsouza/* upstream-fork accessors instead. See docs/upstream-forks.md.'
        - pattern: '^reflect\.Value\.FieldByName$'
          msg: 'reflect.FieldByName on parser AST is forbidden across internal/** — use the upstream-fork accessors instead.'
    gocognit:
      min-complexity: 60
    cyclop:
      max-complexity: 32
      package-average: 10.0
    funlen:
      lines: 150
      statements: 80
    nestif:
      min-complexity: 6
    dupl:
      threshold: 220
    maintidx:
      under: 20
    lll:
      line-length: 280
  exclusions:
    # Drop sibling-worktree leakage. Lefthook pre-push runs
    # `golangci-lint run ./...` from a worktree root under
    # `.claude/worktrees/<name>/`; the golangci cache is shared (keyed
    # by the single module path), so a run can surface OTHER agents'
    # worktrees — reported relative to cwd as either a `.claude/...`
    # segment (this tree's own nested re-entry) or `../<name>/...` (a
    # collapsed sibling, where the shared `.claude/worktrees/` prefix
    # is elided). Cerberus is one module rooted at go.mod, so `go list
    # ./...` never yields a parent-relative package — any reported path
    # that escapes upward via `..` is foreign-worktree noise, never the
    # committer's change. Match both shapes. (`exclusions.paths` is the
    # only directory-skip key the golangci-lint v2 schema accepts;
    # `run.exclude-dirs` / `issues.exclude-dirs` are rejected.)
    paths:
      - (^|/)\.claude($|/)
      - (^|/)\.\.($|/)
    rules:
      - path: _test\.go
        linters:
          - gosec
          - revive
          - errcheck
          - bodyclose
          - errorlint
          - gocognit
          - cyclop
          - funlen
          - nestif
          - dupl
          - maintidx
          - lll
      - path: cmd/
        linters:
          - revive
          - errcheck
      # envdocs.go is the live source-of-truth for docs/configuration.md: each
      # entry's description is the verbatim doc prose, so some lines legitimately
      # exceed 280 chars (same rationale as the long CH SQL strings above).
      - path: internal/config/envdocs\.go
        linters:
          - lll
      # forbidigo fires ONLY inside internal/** — invert via `path-except`
      # so every other path (cmd/, test/, compatibility/, scripts/, …) is
      # excluded. Previously the scope was just `internal/(traceql|api/tempo)/`;
      # widened to all of `internal/` as project-wide hygiene against the
      # parser-internal shim pattern retired in #148.
      - linters:
          - forbidigo
        path-except: '^internal/'
      # test/spec/ holds the deterministic IR pretty-printer + roundtrip
      # runner; test/property/ holds the rapid oracle evaluators. Both are
      # test infrastructure whose structure mirrors the IR / PromQL surface
      # — they're allowed to be large by design.
      - path: test/spec/
        linters:
          - gocognit
          - cyclop
          - funlen
          - nestif
          - dupl
          - maintidx
          - lll
      - path: test/property/
        linters:
          - gocognit
          - cyclop
          - funlen
          - nestif
          - dupl
          - maintidx
          - lll

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tsouza/cerberus
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
