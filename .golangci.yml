version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - revive
    - misspell
  settings:
    revive:
      rules:
        # Default to no doc comments on every exported symbol — package-level
        # docs cover intent; method comments only appear where WHY is non-obvious.
        - name: exported
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - revive
      - path: cmd/
        linters:
          - revive
          - errcheck

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tsouza/cerberus
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
