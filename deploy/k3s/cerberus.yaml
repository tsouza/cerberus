---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cerberus-config
  namespace: cerberus
data:
  CERBERUS_HTTP_ADDR: ":8080"
  CERBERUS_CH_ADDR: "clickhouse:9000"
  CERBERUS_CH_DATABASE: "otel"
  CERBERUS_CH_USERNAME: "cerberus"
  CERBERUS_CH_PASSWORD: "cerberus"
  CERBERUS_CH_DIAL_TIMEOUT: "10s"
---
apiVersion: v1
kind: Service
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: cerberus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: cerberus
  template:
    metadata:
      labels:
        app: cerberus
    spec:
      containers:
        - name: cerberus
          # Image is built locally and imported into k3d via `just e2e-up`.
          # See Justfile's e2e-up recipe.
          image: cerberus:e2e
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cerberus-config
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
