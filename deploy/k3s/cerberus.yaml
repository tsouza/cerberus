---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cerberus-config
  namespace: cerberus
data:
  CERBERUS_HTTP_ADDR: ":8080"
  CERBERUS_CH_ADDR: "clickhouse:9000"
  CERBERUS_CH_DATABASE: "otel"
  CERBERUS_CH_USERNAME: "cerberus"
  CERBERUS_CH_PASSWORD: "cerberus"
  CERBERUS_CH_DIAL_TIMEOUT: "10s"
  # Self-observability OTLP export — once R4.5 wires the OTLP SDK, cerberus
  # will push its own metrics + traces to the in-cluster gateway, which
  # forwards them to ClickHouse via the clickhouseexporter. Reading those
  # rows back through cerberus closes the dogfood loop (see the
  # "Cerberus self-observability" Grafana dashboard in deploy/grafana/).
  # Empty value disables OTLP export entirely (zero-collector binary).
  CERBERUS_OTEL_ENDPOINT: "otel-collector-gateway.cerberus.svc:4317"
  CERBERUS_OTEL_INSECURE: "true"
  CERBERUS_OTEL_SERVICE_NAME: "cerberus"
  CERBERUS_OTEL_SAMPLER: "parentbased_traceidratio:0.1"
---
apiVersion: v1
kind: Service
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: cerberus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  # replicas is intentionally omitted — the HorizontalPodAutoscaler in
  # cerberus-hpa.yaml owns this field. Setting it here would cause the
  # Deployment controller and the HPA to fight over the replica count
  # on every reconcile. The HPA's minReplicas (2) defines the floor.
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: cerberus
  template:
    metadata:
      labels:
        app: cerberus
    spec:
      containers:
        - name: cerberus
          # Image is built locally and imported into k3d via `just e2e-up`.
          # See Justfile's e2e-up recipe.
          image: cerberus:e2e
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cerberus-config
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
          # /readyz pings ClickHouse (with a small TTL cache so this
          # probe doesn't hammer CH) and reports the auto-create-schema
          # invariant. A failure removes the pod from the Service
          # endpoints without restarting it — backpressure, not crash.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
          # /healthz is intentionally dependency-free: a failure here
          # means the process is wedged and k8s should restart the pod.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
