# ct / helm-template fixture: bundled ClickHouse on object storage ("bwc" data
# tier), single-node S3 backend pointed at a MinIO-style endpoint. The inline
# credentials are THROWAWAY render-only values (MinIO defaults) so kubeconform
# can validate the chart-managed object-store Secret; real installs use
# objectStorage.s3.credentialsSecret or useEnvironmentCredentials (IRSA).
clickhouse:
  bundled:
    enabled: true
    objectStorage:
      backend: s3
      bucket: cerberus-bwc
      path: data
      s3:
        endpoint: http://minio:9000
        region: us-east-1
        forcePathStyle: true
        accessKeyId: minioadmin
        secretAccessKey: minioadmin
