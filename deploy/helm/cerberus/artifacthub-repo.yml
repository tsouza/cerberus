# Artifact Hub repository metadata for the cerberus OCI chart.
#
# Pushed once (idempotently) as the special AH artifact alongside the chart:
#
#   oras push ghcr.io/tsouza/cerberus/charts/cerberus:artifacthub.io \
#     --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
#     artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
#
# repositoryID is the UUID Artifact Hub issues when the OCI repo
# (oci://ghcr.io/tsouza/cerberus/charts/cerberus) is registered. Fill it in
# after registration; until then AH cannot verify ownership.
repositoryID: ""
owners:
