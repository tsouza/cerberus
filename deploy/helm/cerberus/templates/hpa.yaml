{{- /* HPA is monolith-only: in split mode each head's replica count is fixed
       by split.<head>.replicaCount so a head can be deterministically scaled to
       zero for blast-radius isolation without an HPA fighting the change. */ -}}
{{- if and .Values.autoscaling.enabled (ne .Values.mode "split") }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cerberus.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cerberus.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cerberus.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    # Memory target is OFF by default — see values.yaml (the rc.5 OOM finding:
    # a memory-utilisation target thrashes against GOMEMLIMIT-driven heap).
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
    {{- with .Values.autoscaling.extraMetrics }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
