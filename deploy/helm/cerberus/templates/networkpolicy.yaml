{{- if .Values.networkPolicy.enabled }}
{{- /* The ClickHouse egress ports are identical for every head, so derive
       them once and reuse the list in each NetworkPolicy body below. */ -}}
{{- $chPorts := list }}
{{- range .Values.clickhouse.addr }}
{{- $hp := splitList ":" . }}
{{- if eq (len $hp) 2 }}
{{- $chPorts = append $chPorts (last $hp | int) }}
{{- end }}
{{- end }}
{{- $chPorts = $chPorts | uniq }}
{{- if eq .Values.mode "split" }}
{{- /* Split mode: one NetworkPolicy per ENABLED head. cerberus.selectorLabels
       carries no app.kubernetes.io/component label, so it would select ZERO
       pods in split mode where every head Deployment adds component=<svc>;
       cerberus.headSelectorLabels is the stable per-head selector. Ingress +
       egress semantics are identical to the monolith branch, applied per head. */ -}}
{{- $root := . }}
{{- range (include "cerberus.heads" . | fromYamlArray) }}
{{- $svc := .svc }}
{{- $hv := include "cerberus.headValues" (dict "ctx" $root "svc" $svc) | fromYaml }}
{{- if $hv.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cerberus.headFullname" (dict "ctx" $root "svc" $svc) }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "cerberus.headLabels" (dict "ctx" $root "svc" $svc) | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cerberus.headSelectorLabels" (dict "ctx" $root "svc" $svc) | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ $root.Values.service.targetPort }}
      {{- with $root.Values.networkPolicy.ingress }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # Auto-allowed egress, derived from the typed connection values: the
    # ClickHouse data plane, DNS resolution, and (when set) the OTLP collector.
    {{- if $chPorts }}
    - ports:
        {{- range $chPorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    # DNS — UDP + TCP 53, to any peer (CoreDNS / kube-dns).
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if $root.Values.otlp.endpoint }}
    {{- $otlpHostPort := splitList ":" (regexReplaceAll "^https?://" $root.Values.otlp.endpoint "") }}
    {{- if eq (len $otlpHostPort) 2 }}
    # OTLP self-telemetry export endpoint.
    - ports:
        - protocol: TCP
          port: {{ last $otlpHostPort | int }}
    {{- end }}
    {{- end }}
    {{- with $root.Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}
{{- else }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cerberus.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cerberus.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cerberus.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
      {{- with .Values.networkPolicy.ingress }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # Auto-allowed egress, derived from the typed connection values: the
    # ClickHouse data plane, DNS resolution, and (when set) the OTLP collector.
    {{- if $chPorts }}
    - ports:
        {{- range $chPorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
    {{- end }}
    # DNS — UDP + TCP 53, to any peer (CoreDNS / kube-dns).
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.otlp.endpoint }}
    {{- $otlpHostPort := splitList ":" (regexReplaceAll "^https?://" .Values.otlp.endpoint "") }}
    {{- if eq (len $otlpHostPort) 2 }}
    # OTLP self-telemetry export endpoint.
    - ports:
        - protocol: TCP
          port: {{ last $otlpHostPort | int }}
    {{- end }}
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}
