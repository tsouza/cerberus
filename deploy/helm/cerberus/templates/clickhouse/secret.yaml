{{- if and .Values.clickhouse.bundled.enabled (eq (include "cerberus.clickhouse.createObjectStoreSecret" .) "true") }}
{{- $os := .Values.clickhouse.bundled.objectStorage }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cerberus.clickhouse.objectStoreSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cerberus.clickhouse.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq $os.backend "s3" }}
  access-key-id: {{ $os.s3.accessKeyId | quote }}
  secret-access-key: {{ $os.s3.secretAccessKey | quote }}
  {{- else if eq $os.backend "gcs" }}
  access-key-id: {{ $os.gcs.accessKeyId | quote }}
  secret-access-key: {{ $os.gcs.secretAccessKey | quote }}
  {{- else if eq $os.backend "azure" }}
  account-name: {{ $os.azure.accountName | quote }}
  account-key: {{ $os.azure.accountKey | quote }}
  {{- end }}
{{- end }}
