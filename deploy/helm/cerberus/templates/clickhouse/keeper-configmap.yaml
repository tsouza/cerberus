{{- if and .Values.clickhouse.bundled.enabled (eq (include "cerberus.clickhouse.keeperEnabled" .) "true") }}
{{- $b := .Values.clickhouse.bundled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cerberus.keeper.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cerberus.keeper.labels" . | nindent 4 }}
data:
  keeper_config.xml: |
    <clickhouse>
      <logger>
        <level>information</level>
        <console>1</console>
      </logger>
      <listen_host>0.0.0.0</listen_host>
      <keeper_server>
        <tcp_port>9181</tcp_port>
        <!-- KEEPER_SERVER_ID is derived from the pod ordinal at start-up. -->
        <server_id from_env="KEEPER_SERVER_ID" />
        <log_storage_path>/var/lib/clickhouse-keeper/coordination/log</log_storage_path>
        <snapshot_storage_path>/var/lib/clickhouse-keeper/coordination/snapshots</snapshot_storage_path>
        <coordination_settings>
          <operation_timeout_ms>10000</operation_timeout_ms>
          <session_timeout_ms>30000</session_timeout_ms>
          <raft_logs_level>information</raft_logs_level>
        </coordination_settings>
        <raft_configuration>
          {{- range $i := until (int $b.keeper.replicas) }}
          <server>
            <id>{{ add $i 1 }}</id>
            <hostname>{{ include "cerberus.keeper.fullname" $ }}-{{ $i }}.{{ include "cerberus.keeper.headlessName" $ }}.{{ $.Release.Namespace }}.svc.cluster.local</hostname>
            <port>9234</port>
          </server>
          {{- end }}
        </raft_configuration>
      </keeper_server>
    </clickhouse>
{{- end }}
