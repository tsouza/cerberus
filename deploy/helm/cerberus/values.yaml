# Default values for cerberus.
# This is a YAML-formatted file. Every key is annotated for helm-docs (`# --`).
#
# cerberus is configured 100% via environment variables (there is no config
# file). The chart lowers three layers of values into env:
#   1. Typed blocks (clickhouse / query / otlp / autoCreate / admit / schema /
#      http / debug / prom) -> canonical CERBERUS_* env in a ConfigMap
#      (password -> Secret).
#   2. `config: {}` free-form map -> verbatim KEY: value env. This reaches the
#      ENTIRE long tail: every scalar CERBERUS_* knob the binary reads is
#      settable here, typed or not (~90 knobs total — see docs/configuration.md).
#   3. `extraEnv` / `extraEnvFrom` -> raw container env (supports valueFrom).
# Precedence (last wins): typed blocks < config < extraEnv.
# COMPLETENESS GUARANTEE: nothing the binary reads is unreachable from the
# chart. Typed blocks cover the common + special-rendering knobs (TLS file
# mounts, password Secret, list joins); `config` covers the rest verbatim.

# -- Override the chart name (defaults to the chart's own name, `cerberus`).
nameOverride: ""
# -- Override the fully-qualified release name (`<release>-cerberus` by default).
fullnameOverride: ""
# -- Extra labels added to every rendered object (tpl-rendered). NOT added to
# selectors (those are immutable).
commonLabels: {}

# -- Deployment topology: `monolith` or `split`.
# `monolith` (default) renders exactly one Deployment + one Service (`cerberus`)
# whose single process serves all three heads — byte-for-byte the prior chart
# behaviour. `split` renders THREE per-head Deployments + THREE bare-named
# ClusterIP Services (`prometheus`, `loki`, `tempo`), each process serving ONE
# head via CERBERUS_ENABLED_HEADS. Splitting isolates the blast radius: one head
# OOMing no longer severs the others, since they no longer share a
# process/cgroup. Per-head `resources` / `query.maxSamples` / `replicaCount`
# live under `split.<head>` below; the aggregate `cerberus` Service does NOT
# exist in split mode.
mode: monolith

# -- Number of replicas. Ignored when `autoscaling.enabled` is true (the HPA
# owns the replica count then). In `split` mode this is the per-head default,
# overridable per head under `split.<head>.replicaCount`.
replicaCount: 2

# -- Per-head overrides applied ONLY when `mode: split`. Each head (prometheus /
# loki / tempo) gets its own Deployment + bare-named ClusterIP Service and may
# override `enabled` (default true — a disabled head renders no workload),
# `replicaCount`, `resources`, and `query.maxSamples`. Anything left null
# inherits the top-level value, so the typical split install only sets the few
# knobs that genuinely differ per head — e.g. Tempo gets fat memory + a tight
# /api/search maxSamples while Prom and Loki stay lean. Every head still reads
# the SAME shared env ConfigMap (ClickHouse connection, schema, etc.); only the
# CERBERUS_ENABLED_HEADS pin, the per-head maxSamples, and resources differ.
split:
  prometheus:
    # -- Render the Prometheus head Deployment + Service in split mode.
    enabled: true
    # -- Replicas for the Prometheus head (inherits top-level `replicaCount`
    # when null). Ignored when `autoscaling.enabled` is true.
    replicaCount: null
    # -- Resource requests/limits for the Prometheus head (inherits top-level
    # `resources` when null).
    resources: null
    # -- Max samples a single Prometheus-head query may materialise
    # (CERBERUS_QUERY_MAX_SAMPLES). Inherits top-level `query.maxSamples` when
    # null.
    maxSamples: null
  loki:
    # -- Render the Loki head Deployment + Service in split mode.
    enabled: true
    # -- Replicas for the Loki head (inherits top-level `replicaCount` when
    # null). Ignored when `autoscaling.enabled` is true.
    replicaCount: null
    # -- Resource requests/limits for the Loki head (inherits top-level
    # `resources` when null).
    resources: null
    # -- Max samples a single Loki-head query may materialise
    # (CERBERUS_QUERY_MAX_SAMPLES). Inherits top-level `query.maxSamples` when
    # null.
    maxSamples: null
  tempo:
    # -- Render the Tempo head Deployment + Service in split mode.
    enabled: true
    # -- Replicas for the Tempo head (inherits top-level `replicaCount` when
    # null). Ignored when `autoscaling.enabled` is true.
    replicaCount: null
    # -- Resource requests/limits for the Tempo head (inherits top-level
    # `resources` when null). Tempo's /api/search drain is the memory-heavy
    # head — give it the fat limit here.
    resources: null
    # -- Max samples a single Tempo-head query may materialise
    # (CERBERUS_QUERY_MAX_SAMPLES). Inherits top-level `query.maxSamples` when
    # null. Tempo /api/search benefits from a tighter cap.
    maxSamples: null

image:
  # -- cerberus container image repository.
  repository: ghcr.io/tsouza/cerberus
  # -- Image tag. Defaults to the chart's appVersion (e.g. `1.0.0`) when empty.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Optional image digest (`sha256:...`). When set, pins by digest and is
  # appended as `@<digest>` after the tag.
  digest: ""

# -- Image pull secrets for private registries.
imagePullSecrets: []

serviceAccount:
  # -- Create a dedicated ServiceAccount.
  create: true
  # -- Name of the ServiceAccount to use/create. Generated from the fullname
  # when empty.
  name: ""
  # -- Annotations for the ServiceAccount (e.g. IRSA / Workload Identity).
  annotations: {}
  # -- Mount the SA token into the SA itself. cerberus calls no k8s API → false.
  automountServiceAccountToken: false

# -- Mount the ServiceAccount token into the pod. cerberus calls no k8s API →
# false (defence in depth).
automountServiceAccountToken: false

# ---------------------------------------------------------------------------
# ClickHouse connection — lowered to CERBERUS_CH_* env.
# ---------------------------------------------------------------------------

# -- ClickHouse connection block (lowered to CERBERUS_CH_* env). See fields below.
clickhouse:
  # -- ClickHouse address list (`host:port`), joined with `,` into
  # CERBERUS_CH_ADDR. Native protocol is 9000 (9440 TLS); HTTP is 8123.
  addr:
    - clickhouse:9000
  # -- Target database (CERBERUS_CH_DATABASE).
  database: otel
  # -- ClickHouse username (CERBERUS_CH_USERNAME).
  username: default
  # -- Wire protocol: `native` or `http` (CERBERUS_CH_PROTOCOL).
  protocol: native
  # -- Dial timeout (CERBERUS_CH_DIAL_TIMEOUT).
  dialTimeout: 10s
  # -- ClickHouse connection-pool tuning. Each key is emitted to env only when
  # set; leave a key null/unset to keep the binary's own default.
  pool:
    # -- Max open connections (CERBERUS_CH_MAX_OPEN_CONNS). Binary default: 10.
    maxOpenConns: null
    # -- Max idle connections (CERBERUS_CH_MAX_IDLE_CONNS). Binary default: 5.
    maxIdleConns: null
    # -- Max connection lifetime (CERBERUS_CH_CONN_MAX_LIFETIME). Binary
    # default: 30s.
    connMaxLifetime: ""
  # -- Inline password. Renders a chart-managed Secret. PREFER `existingSecret`
  # in production so the password never lands in values / release history.
  password: ""
  # -- Name of a pre-existing Secret holding the ClickHouse password. Takes
  # precedence over `password` (no chart Secret is rendered).
  existingSecret: ""
  # -- Key within the Secret (chart-managed or existing) holding the password.
  passwordKey: password
  tls:
    # -- Enable TLS to ClickHouse (CERBERUS_CH_TLS_ENABLED).
    enabled: false
    # -- Skip server cert verification (CERBERUS_CH_TLS_INSECURE_SKIP_VERIFY).
    # Insecure — for testing only.
    insecureSkipVerify: false
    # -- Override the TLS server name (SNI) (CERBERUS_CH_TLS_SERVER_NAME).
    serverName: ""
    # -- Name of a Secret holding the TLS cert files. When set, it is mounted at
    # /etc/cerberus/tls and the CERBERUS_CH_TLS_*_FILE env point at the keys
    # below.
    existingSecret: ""
    # -- Key in the TLS Secret for the CA cert → CERBERUS_CH_TLS_CA_FILE.
    caFileKey: ca.crt
    # -- Key in the TLS Secret for the client cert → CERBERUS_CH_TLS_CERT_FILE.
    certFileKey: tls.crt
    # -- Key in the TLS Secret for the client key → CERBERUS_CH_TLS_KEY_FILE.
    keyFileKey: tls.key

# ---------------------------------------------------------------------------
# Structured knobs.
# ---------------------------------------------------------------------------

# -- Auto-create toggles (lowered to CERBERUS_AUTO_CREATE_* env). See fields below.
autoCreate:
  # -- Apply the OTel-CH schema DDL at boot (CERBERUS_AUTO_CREATE_SCHEMA).
  schema: true
  # -- Create the target database if absent (CERBERUS_AUTO_CREATE_DATABASE).
  database: false

# Per-head admission control (in-flight concurrency caps). prom / loki / tempo
# each accept EITHER an explicit integer cap OR a boolean: `true` enables the
# head at its conservative default cap (64 / 64 / 32), `false` (or `0`) leaves
# the head unlimited, and a positive integer (e.g. `2`) pins an exact cap.
# `disabled: true` is the master switch that removes admission control on every
# head at once.
admit:
  # -- Prom API in-flight cap (CERBERUS_ADMIT_PROM): integer cap, or true (default cap 64) / false (unlimited).
  prom: true
  # -- Loki API in-flight cap (CERBERUS_ADMIT_LOKI): integer cap, or true (default cap 64) / false (unlimited).
  loki: true
  # -- Tempo API in-flight cap (CERBERUS_ADMIT_TEMPO): integer cap, or true (default cap 32) / false (unlimited).
  tempo: true
  # -- Disable admission entirely on every head (CERBERUS_ADMIT_DISABLED).
  disabled: false

otlp:
  # -- OTLP gRPC endpoint for cerberus self-telemetry export
  # (CERBERUS_OTLP_ENDPOINT). EMPTY disables self-telemetry export entirely.
  # cerberus has NO /metrics endpoint — this is the only observability path.
  endpoint: ""
  # -- Use an insecure (plaintext) OTLP connection (CERBERUS_OTLP_INSECURE).
  insecure: false
  # -- Comma-separated OTLP headers, e.g. `authorization=Bearer xxx`
  # (CERBERUS_OTLP_HEADERS).
  headers: ""
  # -- Export interval (CERBERUS_OTLP_EXPORT_INTERVAL).
  exportInterval: ""
  # -- Export timeout (CERBERUS_OTLP_TIMEOUT).
  timeout: ""

# -- Schema / DDL configuration (lowered to CERBERUS_SCHEMA_* env). The typed
# keys (`ttl`, `replicated`) take precedence; any OTHER key is passed through
# verbatim as CERBERUS_SCHEMA_<KEY> (the long tail — see docs/configuration.md),
# e.g. `schema: { CLUSTER: "main" }` → CERBERUS_SCHEMA_CLUSTER.
schema:
  # -- Per-signal retention TTL (CERBERUS_SCHEMA_TTL), e.g. "2w" / "30d".
  ttl: ""
  # -- Replicated-ClickHouse (HA) schema. Emits a Replicated database +
  # ReplicatedMergeTree tables instead of plain MergeTree — required for any
  # multi-replica ClickHouse cluster.
  replicated:
    # -- Enable Replicated-DB schema (CERBERUS_SCHEMA_DATABASE_REPLICATED).
    enabled: false
    # -- ZooKeeper/Keeper path for the Replicated database
    # (CERBERUS_SCHEMA_DATABASE_REPLICATED_PATH). MUST contain the `{shard}` /
    # `{replica}` macros and mirror the ClickHouse cluster's Replicated-DB
    # coordination path, e.g. "/clickhouse/databases/otel/{shard}/{replica}".
    zookeeperPath: ""

# -- Run the startup requirements check (CERBERUS_REQUIREMENTS_CHECK): verify
# the ClickHouse connection + schema are usable at boot. Non-fatal — logs and
# retries rather than crash-looping. Emitted into env only when true.
requirementsCheck: false

# -- ClickHouse-optimization auto-picker (CERBERUS_CH_OPTIMIZATIONS). `auto`
# (the default) probes the connected ClickHouse version once at startup and
# enables every stable, result-equivalent optimization the server supports —
# `aggregation_in_order` (24.8+) and `condition_cache` (25.3+) — for free, with
# zero tuning and no risk on older servers (a feature above the server's version
# is simply not enabled). Set `off` to disable all, or a comma-separated list of
# feature ids to pin an explicit selection. See docs/clickhouse-optimizations.md.
chOptimizations: auto

# -- Query safety limits. Each key is emitted to env only when set; leave a key
# null/empty to keep the binary's own default. These cap the blast radius of a
# single expensive query.
query:
  # -- Max samples a single query may materialise (CERBERUS_QUERY_MAX_SAMPLES).
  # Default-on at 5000000 — the backstop for the runaway-drain OOM class,
  # sized to bound a ~2Gi heap without rejecting realistic Grafana queries
  # (matches the binary default). Raise it for larger pods, or set 0 to
  # disable the budget entirely.
  maxSamples: 5000000
  # -- Per-query wall-clock timeout (CERBERUS_QUERY_TIMEOUT). Binary default:
  # 2m. Also derives the ClickHouse socket read timeout when CH_READ_TIMEOUT is
  # unset.
  timeout: ""
  # -- Per-query ClickHouse server-side memory ceiling
  # (CERBERUS_CH_QUERY_MAX_MEMORY). Accepts a raw byte integer (e.g. 1073741824)
  # or a humanized Kubernetes-style size string (e.g. "2Gi", "512Mi", "1G"); the
  # raw-integer form is unchanged for backward compatibility. Binary default:
  # 1073741824 (1 GiB).
  chMaxMemory: null

# -- Debug / profiling toggles.
debug:
  # -- Expose the net/http/pprof handlers on the HTTP listener
  # (CERBERUS_DEBUG_PPROF). Off by default; enable transiently for profiling.
  pprof: false

# -- Prometheus head configuration.
prom:
  # -- OTel resource attributes to project as Prometheus labels (joined to
  # CERBERUS_PROM_RESOURCE_LABELS). This is a BOUNDED ALLOWLIST: leave it empty
  # and cerberus promotes EVERY resource attribute → unbounded label
  # cardinality. List only the keys you actually query / group on.
  resourceLabels: []
    # - deployment.environment.name
    # - k8s.namespace.name
    # - k8s.pod.name
    # - service.name

http:
  # -- HTTP listen address (CERBERUS_HTTP_ADDR). The port here must match
  # `service.targetPort`.
  addr: ":8080"

# -- Log level: one of debug, info, warn, error (CERBERUS_LOG_LEVEL).
logLevel: info
# -- Log format: json or text (CERBERUS_LOG_FORMAT).
logFormat: json

# ---------------------------------------------------------------------------
# Free-form env + escape hatches (the long tail of CERBERUS_* knobs).
# ---------------------------------------------------------------------------

# -- Arbitrary env vars rendered verbatim into the env ConfigMap. This is the
# completeness escape hatch: EVERY scalar CERBERUS_* knob the binary reads is
# settable here as `KEY: value` even when no typed block exists for it (the long
# tail — CH breaker/keepalive/compression tuning, HTTP server timeouts, solver /
# shard knobs, schema metric-table overrides, etc.). See the full inventory in
# docs/configuration.md. Use a typed block above where one exists; reach for
# `config` for everything else. Overrides the typed defaults. Example:
# `{CERBERUS_EVAL_ROUTE: "single", CERBERUS_CH_BREAKER_THRESHOLD: "0.5"}`.
config: {}
# -- Raw container env entries (supports `valueFrom` — fieldRef / secretKeyRef /
# resourceFieldRef). Overrides everything (envFrom is lowest precedence). Use
# for GOMEMLIMIT, downward-API values, externally-managed secrets.
extraEnv: []
# -- Raw `envFrom` sources (configMapRef / secretRef) merged after the chart's
# own env ConfigMap.
extraEnvFrom: []
# -- Args appended to the container when `args`/`command` are unset.
extraArgs: []
# -- Full override of the container command (entrypoint).
command: []
# -- Full override of the container args.
args: []
# -- Extra volumes (tpl-rendered).
extraVolumes: []
# -- Extra volume mounts on the cerberus container (tpl-rendered).
extraVolumeMounts: []
# -- Extra sidecar containers (tpl-rendered).
extraContainers: []
# -- Init containers (tpl-rendered).
initContainers: []
# -- Arbitrary extra manifests rendered into the release (tpl-rendered list).
extraManifests: []
# -- Container lifecycle hooks.
lifecycle: {}
# -- Extra annotations on the Deployment object.
deploymentAnnotations: {}
# -- Extra pod annotations (tpl-rendered). Merged with the config/secret
# checksum annotations.
podAnnotations: {}
# -- Extra pod labels (tpl-rendered).
podLabels: {}

# ---------------------------------------------------------------------------
# Hardened security defaults — ON. cerberus is stateless and writes nothing to
# its rootfs, so read-only rootfs is safe.
# ---------------------------------------------------------------------------

# -- Pod-level security context. Defaults to distroless:nonroot (uid/gid 65532).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Service type.
  type: ClusterIP
  # -- Service port (the cerberus wire endpoint for all three heads).
  port: 8080
  # -- Container target port. Must match the port in `http.addr`.
  targetPort: 8080
  # -- appProtocol on the Service port (helps L7-aware meshes/ingress).
  appProtocol: http
  # -- Service annotations.
  annotations: {}
  # -- NodePort (only honoured when `type: NodePort`).
  nodePort: null
  # -- loadBalancerClass (only honoured when `type: LoadBalancer`).
  loadBalancerClass: ""

ingress:
  # -- Enable an Ingress for the gateway.
  enabled: false
  # -- IngressClass name.
  className: ""
  # -- Ingress annotations (tpl-rendered).
  annotations: {}
  # -- Ingress hosts + paths.
  hosts:
    - host: cerberus.local
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS blocks.
  tls: []

# -- Pod resource requests/limits. Mirrors the reference k3s manifest: a small
# request, a generous memory limit, no CPU limit (bursting is fine; probe kills
# under CPU starvation are the real risk). The chart auto-derives GOMEMLIMIT at
# ~80% of limits.memory; override it via extraEnv if you need a different value.
resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    memory: 1536Mi

autoscaling:
  # -- Enable a HorizontalPodAutoscaler. When true, `replicaCount` is ignored.
  enabled: false
  # -- Minimum replicas (survives a single-pod failure at >=2).
  minReplicas: 2
  # -- Maximum replicas.
  maxReplicas: 4
  # -- Target average CPU utilisation %. cerberus's hot path is CPU-bound on the
  # gateway side, so CPU is a faithful load proxy. Set to null to drop it.
  targetCPUUtilizationPercentage: 70
  # -- Target average memory utilisation %. OFF by default — a memory target
  # thrashes against GOMEMLIMIT-driven heap (rc.5 OOM finding).
  targetMemoryUtilizationPercentage: null
  # -- Extra HPA metric specs appended verbatim (e.g. custom/Pods metrics).
  extraMetrics: []
  # -- HPA scaling behaviour. Empty uses the cluster default. The reference
  # manifest uses scaleUp-fast / scaleDown-slow.
  behavior: {}

podDisruptionBudget:
  # -- Create a PodDisruptionBudget.
  enabled: false
  # -- Minimum available pods (used when `maxUnavailable` is null).
  minAvailable: 1
  # -- Maximum unavailable pods (mutually exclusive with `minAvailable`).
  maxUnavailable: null

networkPolicy:
  # -- Create a NetworkPolicy. Egress auto-allows the ClickHouse port(s) (parsed
  # from `clickhouse.addr`), DNS, and the OTLP endpoint port (parsed from
  # `otlp.endpoint`).
  enabled: false
  # -- Ingress peer selectors on the gateway port. Empty = allow from anywhere;
  # narrow to e.g. the Grafana namespace.
  ingress: []
  # -- Extra egress rules appended to the auto-derived ClickHouse/DNS/OTLP set.
  egress: []

# -- Deployment update strategy.
updateStrategy:
  type: RollingUpdate

# -- Liveness probe. Dependency-free `/healthz`; a failure restarts the pod.
# Budgets are sized for a saturated node (5s timeout, 6 failures ≈ 60s).
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
# -- Readiness probe. `/readyz` pings ClickHouse (with a small TTL cache); a
# failure removes the pod from the Service endpoints (backpressure, no restart).
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 2
  periodSeconds: 3
  timeoutSeconds: 5
  failureThreshold: 5
# -- Startup probe (off by default).
startupProbe: {}

# -- Node selector.
nodeSelector: {}
# -- Tolerations.
tolerations: []
# -- Affinity. Composed UNDER `affinityPresets` below — any field set here
# wins; the presets only inject podAffinity terms.
affinity: {}

# -- Scheduling affinity presets (a convenience over hand-writing raw
# affinity). Composed over `affinity` above.
affinityPresets:
  # -- Co-locate cerberus pods with the ClickHouse pods they query, to keep
  # the hot native :9000 path node-local instead of crossing nodes/AZs.
  # CAVEAT: this gives only PROBABILISTIC locality (~1/N), because
  # `clickhouse.addr` is the ClickHouse Service, which round-robins across all
  # replicas — it cuts cross-AZ traffic but does not guarantee the node-local
  # replica is queried. See the chart README + docs/operations.md.
  colocateWithClickHouse:
    # -- Enable the co-location podAffinity.
    enabled: false
    # -- "preferred" (soft — cerberus still schedules if no ClickHouse node
    # has room) or "required" (hard — only schedules onto a ClickHouse node).
    mode: preferred
    # -- Label selector identifying the ClickHouse pods to sit with.
    podSelector:
      matchLabels:
        app.kubernetes.io/name: clickhouse
    # -- Topology domain: kubernetes.io/hostname (same node) or
    # topology.kubernetes.io/zone (same AZ).
    topologyKey: kubernetes.io/hostname

# -- Topology spread constraints.
topologySpreadConstraints: []
# -- PriorityClass name.
priorityClassName: ""
# -- Termination grace period (seconds).
terminationGracePeriodSeconds: 30
# -- Use the host network namespace.
hostNetwork: false
# -- DNS policy.
dnsPolicy: ""
# -- DNS config.
dnsConfig: {}
