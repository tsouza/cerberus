# Reference Loki configuration for the LogQL compatibility harness.
#
# Single-binary, all-targets, filesystem backend, no auth — matches the
# upstream Grafana "quick start" yaml. The compatibility tester writes
# the seeded fixture via /loki/api/v1/push and queries via the standard
# /loki/api/v1/query{,_range,_labels,_series} endpoints — no clustering,
# no object storage, no ingester ring tuning needed.
#
# Don't promote this config into a "production" template — it's
# intentionally minimal so reference Loki behaviour stays close to
# default and the diff against cerberus surfaces real semantic gaps
# rather than configuration noise.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Relax the default per-stream / per-tenant ingestion limits enough that
# the seeder's 3-5 services × ~600 entries/service burst (sent in one
# /push batch per stream) doesn't get rate-limited. The harness lifecycle
# is short-lived (compose up → push → query → compose down) so the limits
# only need to absorb the seed window.
#
# `max_query_series` is bumped well above the upstream default (500)
# because PR #537 had to exclude 9 unwrap/range-aggregation corpus cases
# whose logfmt fan-out fans the reference Loki past the 500-series guard.
# The harness fixture is tiny (one tenant, few hundred streams), so a
# 10k ceiling absorbs the high-cardinality `| logfmt | unwrap` cases
# without breaking the container. Same rationale for the sibling stream /
# parallelism knobs — they let high-cardinality queries finish instead
# of returning HTTP 400, giving cerberus a real reference baseline to
# diff against rather than an upstream rejection.
limits_config:
  ingestion_rate_mb: 64
  ingestion_burst_size_mb: 128
  per_stream_rate_limit: 32MB
  per_stream_rate_limit_burst: 64MB
  reject_old_samples: false
  reject_old_samples_max_age: 168h
  max_query_lookback: 0s
  allow_structured_metadata: true
  max_query_series: 10000
  max_streams_matchers_per_query: 10000
  max_streams_per_user: 0
  max_query_parallelism: 32

# Disable the ingester WAL's host-disk-usage throttle. The default
# (`-ingester.wal-disk-full-threshold=0.90`) rejects every /push with
# `500: Ingester is shutting down` once the HOST disk crosses 90% —
# the check reads the container filesystem's usage, which mirrors the
# host. A hermetic differential stack ingesting a ~19k-line ephemeral
# fixture must not change behaviour based on how full the developer's
# (or runner's) disk happens to be; the throttle exists to protect
# long-lived production WALs, not a compose stack that is torn down
# minutes after it starts. Setting 0 disables the check (upstream-
# documented semantics).
ingester:
  wal:
    disk_full_threshold: 0

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false
