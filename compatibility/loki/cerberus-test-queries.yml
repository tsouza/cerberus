# Cerberus overlay for the vendored grafana/loki:pkg/logql/bench corpus.
#
# This file lives OUTSIDE compatibility/loki/upstream/loki-bench/ so
# cerberus-side curation doesn't leak into the AGPL-3.0 vendor subtree.
#
# Schema (mirrors prometheus/compliance's test-queries.yml posture):
#
#   should_skip:
#     - source: "<suite>/<file>.yaml#<description>"
#       reason: "free-form English describing why this query is excluded"
#       since:  "<YYYY-MM-DD>"  # when the skip was added; for drift audits
#       jira:   "<tracker-ref>" # GH issue / PR number or short kind tag
#
#   should_fail:
#     # Same shape; for queries we EXPECT to round-trip but want to track
#     # as known-broken. Initially unused.
#
# Suite coverage:
#
#   - fast/        — minimal-coverage corpus; one upstream-pinned
#                    `skip: true` row remains.
#   - regression/  — enrolled wholesale; residual skips are upstream-
#                    pinned `skip: true` rows or seed-gap entries
#                    pending seeder expansion. `| json`, `| logfmt`,
#                    `| regexp`, `| pattern`, `| unpack`, `| drop`,
#                    `| keep`, `| unwrap`, `detected_level` injection /
#                    filtering, range aggregations on unwrapped values,
#                    range-aggregation `by`/`without` grouping, and
#                    numeric/duration/bytes label filters are all wired
#                    so entries that only needed those have been
#                    dropped. Reference-side cardinality rejections
#                    used to live here too until loki-config.yaml's
#                    `max_query_series` was raised to 10000.
#   - exhaustive/  — enrolled wholesale; same posture as regression/.
#
# Maintenance:
#
#   - Reviewers add an entry when a vendored query exercises a LogQL
#     feature cerberus hasn't shipped, OR when the runner surfaces a
#     persistent diff vs the reference Loki.
#   - Empty should_skip / should_fail are fine. The runner consumes
#     this overlay via `--overlay compatibility/loki/cerberus-test-queries.yml`.
#     Each matched entry suppresses the case before it hits the wire
#     and records the reason in the result row's `skipReason` field.
#   - When a query's status changes (e.g. cerberus implements the
#     feature), drop the entry and let CI verify the diff is clean.
#   - The `scripts/check-skip-additions.sh` CI gate rejects net-new
#     entries that lack a `jira:` / `link:` / `#NNN` tracker reference.
#   - On every Loki tag bump (see ../README.md "Bump procedure"),
#     re-validate the `source:` paths point at queries that still exist.

# Why parts of the corpus remain skipped:
#
#   The fast/ basic-selector and simple-metrics entries were unskipped
#   after the seed expansion added multi-label streams, structured
#   metadata, and multi-format log lines. The regression/ + exhaustive/
#   slices were originally enrolled in bulk; entries that only depended
#   on features that have since landed were dropped. Surviving skips
#   fall into two buckets:
#
#     - Upstream-pinned `skip: true` rows — the vendored corpus marks
#       these as unsupported by Loki's own v2 engine (stddev_over_time,
#       quantile_over_time, numeric label filters on certain shapes,
#       dataobj-engine schema gap). No reference baseline to diff
#       against.
#     - Seed-gap entries — labels or log-line keywords the seeder
#       doesn't yet emit; pending a seeder expansion.
#
#   The reference-side cardinality-rejection bucket (handful of
#   `| unwrap`d range-aggregation entries that exceeded the reference
#   Loki's 500-series-per-query guard) is gone — loki-config.yaml's
#   `max_query_series` was raised to 10000 so the reference now answers
#   those queries instead of returning HTTP 400, putting them back into
#   the compat denominator with a real upstream baseline.
#
#   The following LogQL features are wired in cerberus and no longer
#   gate any skip:
#
#     - `| unpack` / `| pattern` — post-fetch (cerberus supports parse-only)
#     - `| line_format` / `| label_format`
#     - `| decolorize`
#     - `| logfmt` (bare + typed `| logfmt foo="bar"`)
#     - `| json` (bare + typed `| json field="path"`)
#     - `| regexp`
#     - `| drop` / `| keep` (post-fetch label projection)
#     - `detected_level` injection + `| detected_level=...` filtering
#     - Numeric / duration / bytes label filters
#     - `| unwrap` (bare + `duration(...)` / `duration_seconds(...)` /
#       `bytes(...)`)
#     - Range aggregations on unwrapped values (sum_over_time,
#       avg_over_time, min/max_over_time, etc.)
#     - `by`/`without` grouping on range aggregations
#
# Resolution path:
#
#   - regression/ + exhaustive/ are enrolled verbatim. As each LogQL
#     feature lands, the matching overlay rows are dropped and CI
#     verifies the diff is clean.
#   - The seeder writes multi-label streams with JSON/logfmt/unstructured
#     lines, structured metadata (detected_level), and error keywords
#     (failed/refused). Entries that only needed matching selectors have
#     been unskipped.

should_skip:
  # fast/structured-metadata — entry kept here is upstream-pinned
  # (`skip: true` in the vendored corpus) so that a future upstream
  # flip doesn't silently re-enable parity diffing on cerberus before
  # the dataobj-engine baseline is revisited.
  - source: "fast/structured-metadata.yaml#JSON parsing with structured metadata filter first"
    reason: "Upstream already pins `skip: true` (dataobj-engine schema gap). Listed explicitly so a future upstream `skip: false` flip doesn't silently re-enable on cerberus without revisiting the dataobj-engine baseline."
    since: "2026-05-15"
    jira: "docs/loki-compliance-plan.md PR 6 (upstream skip)"

