# Minimal single-binary Tempo config for the compatibility harness.
# Pairs with docker-compose.yml — the `tempo` service mounts it at
# /etc/tempo.yaml.
#
# Why this shape (v3.0-rc1):
#
#   The tempo image pinned in docker-compose.yml (main-2f74ea8 =
#   v3.0.0-rc.1+) replaces the legacy ingester/compactor monoliths
#   with the "live store" + "block builder" + "backend scheduler"
#   trio. When `target` defaults to `all` (single-binary), Tempo
#   auto-wires those modules in-process and disables Kafka ingest
#   (see modules.go's `IsSingleBinary(t.cfg.Target)` checks), so
#   the YAML only needs to set the server port, the OTLP receiver,
#   the storage backend, and a few overrides. This file mirrors
#   the upstream `example/docker-compose/single-binary/tempo.yaml`
#   from the same fork tag with two narrowings:
#
#     * `metrics_generator` block omitted — the harness doesn't
#       exercise the metrics-generator path (PR 5 will add
#       TraceQL-metrics queries; those query pre-ingested spans,
#       no generator required). Omitting the block avoids the
#       remote_write target requirement that would otherwise fail
#       startup.
#     * `query_frontend.mcp_server` omitted — not needed for the
#       harness's read paths.
#
# When the tempo image pin in docker-compose.yml bumps (in lock-step
# with the grafana/tempo go.mod version), revisit this config: Tempo's
# config schema occasionally renames fields between minor versions.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

# OTLP-only ingest. PR 3's seeder pushes identical OTLP batches to
# this endpoint and to ClickHouse so cerberus reads the same fixture.
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    # Blocklist poll controls how often queriers discover new searchable
    # blocks. The default is 5m; with the harness pushing data and then
    # immediately querying, a 5m poll means /api/search won't find the
    # data for up to 10m (2× poll interval). Reducing to 2s ensures the
    # querier discovers flushed blocks within seconds.
    blocklist_poll: 2s
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Tighten the live-store flush cadence so the harness smoke read sees
# spans within seconds of the OTLP push. Tempo v3 replaced the legacy
# ingester module with live_store, so the YAML key is live_store (not
# ingester). Field names match modules/livestore/config.go:
#   max_trace_live   (not trace_live_period)
#   max_trace_idle   (not trace_idle_period)
#   max_block_duration  (not storage.trace.block.max_block_duration)
#   complete_block_timeout  (not storage.trace.block.complete_block_timeout)
#
# The Search API (/api/search) only searches completed blocks, not live
# traces. FindByTraceID (/api/traces/<id>) searches both. Two config
# levers ensure /api/search returns data within seconds of push:
#   1. live_store settings (below) cut and flush blocks aggressively
#   2. blocklist_poll: 2s (above) ensures queriers discover flushed blocks
#      quickly (default is 5m, which means 10m staleness window).
#
# wal.ingestion_time_range_slack widens the window Tempo accepts for span
# timestamps relative to ingest wall-clock. Default is 2 minutes:
# tempodb/wal/wal.go: c.IngestionSlack = 2 * time.Minute. When span
# Start/End fall outside [now-slack, now+slack], modules/livestore/
# instance.go:445-454 clamps the span's recorded start/end up to "now",
# and the block's StartTime/EndTime BlockMeta uses the clamped values.
# That clamping causes /api/search?start=<X>&end=<Y> to find zero blocks
# whenever X/Y is more than ~slack outside the ingest wall-clock, even
# though /api/traces/<id> still returns the trace (traceID lookup is not
# time-range filtered).
#
# The seeder anchors its fixture at `now() - 5m` (see driver/seeder.go::
# currentAnchor); the differ recomputes its own anchor and uses ±1h
# window. 1h slack here is roomy enough to absorb the inter-process
# `now()` drift plus any flush/poll latency, while staying tight enough
# that a genuinely-stale fixture still surfaces via
# WarnOutsideIngestionSlack (tempodb/encoding/common/slackTimeRange.go).
# Previously this was 8760h (1y) as an escape hatch for the fixed
# 2026-05-11 anchor — that hatch is no longer needed now the anchor
# rolls with wall-clock.
live_store:
  wal:
    ingestion_time_range_slack: 1h
  max_trace_live: 2s
  max_trace_idle: 1s
  flush_check_period: 1s
  max_block_duration: 2s
  complete_block_timeout: 5s

# Route TraceQL-metrics queries (/api/metrics/query_range +
# /api/metrics/query) to the backend-blocks path instead of the live
# stores. Tempo v3 splits a metrics query at query_backend_after: the
# part more recent than the cutoff goes to Querier.queryRangeRecent
# (live stores), the rest to backend blocks. The aggressive live_store
# flush cadence above keeps only ~5s of data live
# (complete_block_timeout), so with the default cutoff every harness
# metrics query — the differ probes an anchor ± 1h window with
# anchor = now()-5m — lands on the live store and 500s with
# "time range must be within last 5s". 1s routes effectively
# everything to the completed blocks the search endpoints already
# read (blocklist_poll: 2s above keeps discovery fast).
query_frontend:
  metrics:
    query_backend_after: 1s

usage_report:
  reporting_enabled: false
