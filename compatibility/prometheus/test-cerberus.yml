# PromQL compatibility tester config for cerberus.
#
# Pointed at by `scripts/run-compatibility.sh`; consumed by the upstream
# `promql-compliance-tester` binary at compatibility/prometheus/upstream/promql/cmd/.
#
# Reference target  = stock Prometheus on the docker-compose stack
# Test target       = cerberus on the docker-compose stack
#
# Both ingest the same deterministic OTel fixture. Every difference in
# results is a real bug to fix at the source (cerberus code, seed, or
# upstream Prom). No expected-failures allow-list.

reference_target_config:
  query_url: 'http://localhost:29090'

test_target_config:
  query_url: 'http://localhost:29091'

query_tweaks: []
