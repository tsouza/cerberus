# Docker Compose stack for the PromQL compatibility harness.
#
# Services:
#   clickhouse    OTel-schema CH instance (auth: cerberus/cerberus, db: otel)
#   prometheus    reference Prom, listens on :29090 (matches test-cerberus.yml)
#   cerberus      cerberus under test, listens on :29091 (matches
#                 test-cerberus.yml)
#
# Seeding is no longer a compose service — the fixture is loaded by
# `go run ./compatibility/prometheus/cmd/seed/` invoked from
# scripts/run-compatibility.sh. The seeder reuses internal/schema/ddl so
# the harness schema can't drift from cerberus's own DDL.
#
# Usage:
#   ./scripts/run-compatibility.sh
# or:
#   docker compose up --wait
#   go run ./compatibility/prometheus/cmd/seed/
#   ../upstream/promql/cmd/promql-compliance-tester ...
#   docker compose down -v

name: cerberus-compatibility

services:
  clickhouse:
    # Use the Ubuntu-base image, NOT -alpine. Per PR #245's finding,
    # `clickhouse/clickhouse-server:25.8-alpine` on GH Actions runners
    # stalls in the entrypoint script for 5+ min (never starts the
    # server, never binds 8123). The Ubuntu-base variant boots in
    # ~10-20s on the same runners. A future maintainer: do not
    # innocently switch back to -alpine here without re-validating
    # against the GH-runner musl/scheduling regression.
    image: clickhouse/clickhouse-server:25.8
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: cerberus
      CLICKHOUSE_PASSWORD: cerberus
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      # `clickhouse-client --query 'SELECT 1'` is more reliable than
      # `wget /ping`: the HTTP listener (:8123) binds slightly before
      # the SQL engine is ready to answer queries. Talking SQL over the
      # local unix socket as the default user proves end-to-end
      # readiness (matches the pattern PR #245 used for startup-bench).
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 36
      start_period: 30s
    ports:
      - "29000:9000"
      - "28123:8123"

  prometheus:
    # v3.11.3 (latest stable) over v3.0.1: v3.0.1 ships an upstream bug
    # where `round(...)` doesn't drop `__name__` from its output series,
    # diverging from PromQL semantics. Fixed in upstream PR #15250
    # (https://github.com/prometheus/prometheus/pull/15250) which landed
    # post-v3.0.1. cerberus already implements the spec-correct behaviour
    # (`internal/promql/instant_fns.go::projectValueOverInner` emits
    # `'' AS MetricName` for derived samples per PR #359 / #376), so
    # pinning to a fixed-upstream tag closes the compat-lane diff
    # without touching cerberus's own semantics.
    image: prom/prometheus:v3.11.3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --web.listen-address=:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "29090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 2s
      timeout: 2s
      retries: 30

  cerberus:
    image: cerberus:compatibility
    build:
      context: ../..
      dockerfile: Dockerfile.local
    environment:
      CERBERUS_HTTP_ADDR: ":29091"
      CERBERUS_CH_ADDR: "clickhouse:9000"
      CERBERUS_CH_DATABASE: "otel"
      CERBERUS_CH_USERNAME: "cerberus"
      CERBERUS_CH_PASSWORD: "cerberus"
      CERBERUS_CH_DIAL_TIMEOUT: "10s"
      # cerberus provisions + validates its own schema on boot (the startup
      # requirements check runs after auto-create); the seeder's IF NOT EXISTS
      # DDL then no-ops and just inserts rows.
      CERBERUS_AUTO_CREATE_SCHEMA: "true"
      # Sharded-pushdown solver route knob, threaded from the host so the
      # forced-route compat job (compatibility/prometheus-forced-route) can
      # start cerberus with CERBERUS_EVAL_ROUTE=sharded — forcing every
      # ELIGIBLE plan onto route B (ineligible plans still fail toward route
      # A). Empty interpolation (the default in the standard prometheus job)
      # leaves the env var UNSET in the container, so cerberus falls back to
      # its own production default (Mode=auto). The harness proof: route B
      # must be byte-identical to reference Prometheus across the WHOLE corpus.
      CERBERUS_EVAL_ROUTE: "${CERBERUS_EVAL_ROUTE:-}"
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "29091:29091"
    healthcheck:
      test: ["CMD", "/usr/local/bin/cerberus", "--version"]
      interval: 2s
      timeout: 2s
      retries: 30

