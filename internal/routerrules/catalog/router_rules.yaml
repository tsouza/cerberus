# Router-rules catalog — GENERIC DRIVERS ONLY.
#
# This file is the single audit target for the hard architecture invariant:
# it carries ONLY rule STRUCTURE and detection LOGIC plus NAMED parameter
# references. It contains ZERO deployment-specific numbers. Every threshold,
# watermark, cap, and percentile cutoff is a named parameter resolved at
# runtime, per-deployment, from that deployment's own corpus aggregates or its
# config. A reviewer confirms the invariant by checking that no digit-bearing
# scalar appears in any param or condition value position below (the
# catalog/router_rules_test.go guard test asserts exactly this).
#
# Grammar: see docs/router-rules.md. Adding a rule = appending an entry here and
# bumping catalogVersion — no Go change.

apiVersion: routerrules.cerberus/v1
catalogVersion: 2

# --------------------------------------------------------------------------
# params: NAME + how to RESOLVE, never the value.
# kinds (closed set): config | corpus_percentile | corpus_agg | corpus_count_ratio
# --------------------------------------------------------------------------
params:
  # ---- config leaves: the ONLY place an operator number enters, via the
  # ---- deployment's own config/env. The number lives there, never here.
  - name: watermark_pctile
    kind: config
    key: router_rules.watermark_percentile        # fraction in (0,1); deployment env

  - name: min_class_support
    kind: config
    key: router_rules.min_rows_per_class          # min corpus rows for a class to count

  - name: memory_hard_cap
    kind: config
    key: query.max_memory_bytes                   # reuse the deployment's own query cap

  - name: sample_budget
    kind: config
    key: query.max_samples                        # reuse the deployment's own sample budget

  # ---- corpus-derived params: learned from THIS deployment's own data.
  - name: memory_high_watermark
    kind: corpus_percentile
    column: memory_usage
    percentile:
      ref: watermark_pctile                       # the fraction is itself a param ref
    partition_by: [language]                      # one watermark per language
    scope:
      route: A
      exit_status: ok                             # learn from the HEALTHY population only

  - name: fanout_route_b_floor
    kind: corpus_percentile
    column: fanout
    percentile:
      ref: watermark_pctile
    scope:
      route: B                                    # learn the shard floor from rows that DID shard

  - name: slow_duration_watermark
    kind: corpus_percentile
    column: query_duration_ms
    percentile:
      ref: watermark_pctile
    partition_by: [language]                      # one slow-watermark per language
                                                  # (a group_by column of every rule that uses it)


  # ---- new corpus-derived params (catalogVersion 2) -----------------------
  # A second percentile fraction, kept separate from watermark_pctile so the
  # cardinality-tail watermark and the read-amplification watermark tune
  # independently (a deployment may want a stricter tail on one than the other).
  - name: d_pctile
    kind: config
    key: router_rules.cumulative_d_percentile   # fraction in (0,1); deployment env

  # Per-shape cumulative-D tail learned from the corpus. cumulative_d is the
  # spine lookback the solver itself uses for eligibility, so its tail is the
  # most direct "this shape's geometry is pathological" signal.
  - name: d_high_watermark
    kind: corpus_percentile
    column: cumulative_d
    percentile:
      ref: d_pctile
    partition_by: [language]                       # one D-watermark per language
                                                   # (a group_by column of the rule that uses it)

  # Per-shape read_rows tail learned from the HEALTHY population only. A scan
  # reading far above its own healthy tail is the canonical signature of a
  # missing PREWHERE / late-materialisation rewrite.
  - name: read_rows_high_watermark
    kind: corpus_percentile
    column: read_rows
    percentile:
      ref: watermark_pctile
    partition_by: [shape_id]                       # self-relative per shape
    scope:
      exit_status: ok                              # learn the healthy tail only

  # Deployment-wide fraction of cerberus-side hard rejections over the routable
  # population. This is a single scalar surfaced in a finding MESSAGE for
  # context — it is NEVER a condition operand. corpus_count_ratio resolves to a
  # deployment-wide scalar (countIf(num)/countIf(den)), not a per-row/per-group
  # column, so it cannot gate a rule; recasting prevalence as message context
  # (not a gate) is what keeps this buildable in the existing grammar. A Scope
  # is one value per enum column (the count-ratio conds are AND-ed), so the
  # numerator names the explicit-rejection status; the finding text spells out
  # that breaker / sample_budget are tracked by the same rule's group_by.
  - name: cerberus_reject_ratio
    kind: corpus_count_ratio
    numerator_scope:
      exit_status: rejected                        # explicit cap-rejection
    denominator_scope:
      route: A                                     # over the routable population

# --------------------------------------------------------------------------
# rules: generic detectors. A condition references columns + ${param} only.
# Each rule pairs an observed-cost signal with the route the corpus recorded,
# so every finding states the wrong-route overlap.
# --------------------------------------------------------------------------
rules:
  - id: oom_on_route_a
    severity: critical
    since: 1
    status: active
    applies_to: [promql, logql, traceql]
    group_by: [shape_id, language]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: A }
        - { col: exit_status, op: in, enum: [oom] }
    evidence:
      report: [count, "max(memory_usage)"]
    finding: "route A OOM in class {shape_id}/{language}; force route B for this class"
    action: force_route_b

  - id: route_a_memory_near_cap
    severity: high
    since: 1
    status: active
    group_by: [shape_id, language]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: A }
        - { col: exit_status, op: eq, enum: ok }
        - { col: memory_usage, op: gte, param: memory_high_watermark }
    evidence:
      report: [count, "max(memory_usage)"]
    finding: "route A class {shape_id}/{language} at/above {memory_high_watermark}; corpus shows route B bounds peak memory — lower the route-B threshold for this class"
    action: lower_route_b_threshold

  - id: route_a_high_fanout_should_shard
    severity: medium
    since: 1
    status: active
    group_by: [shape_id, language]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: A }
        - { col: fanout, op: gte, param: fanout_route_b_floor }
    evidence:
      report: [count, "max(fanout)"]
    finding: "route A class {shape_id}/{language} has fan-out at/above {fanout_route_b_floor} (the range this deployment normally shards) — consider routing to B"
    action: lower_route_b_threshold

  - id: route_a_timeout_should_shard
    severity: high
    since: 1
    status: active
    group_by: [shape_id, language]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: A }
        - { col: exit_status, op: in, enum: [timeout] }
    evidence:
      report: [count, "max(query_duration_ms)"]
    finding: "route A timeout in class {shape_id}/{language}; route B time-slicing bounds per-shard wall-clock — force route B"
    action: force_route_b

  - id: route_a_hit_sample_budget
    severity: high
    since: 1
    status: active
    group_by: [shape_id, language]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: A }
        - { col: exit_status, op: in, enum: [sample_budget] }
    evidence:
      report: [count, "max(read_rows)"]
    finding: "route A hit the sample budget {sample_budget} in class {shape_id}/{language}; route B time-slicing would keep each shard under budget"
    action: force_route_b

  - id: route_b_overshard_low_fanout
    severity: medium
    since: 1
    status: active
    group_by: [shape_id, language]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: B }
        - { col: exit_status, op: eq, enum: ok }
        - { col: query_duration_ms, op: lt, param: slow_duration_watermark }
        - { col: fanout, op: lt, param: fanout_route_b_floor }
    evidence:
      report: [count, "avg(k_shards)"]
    finding: "route B class {shape_id}/{language} paid k-shard overhead below {fanout_route_b_floor} fan-out while finishing under {slow_duration_watermark} — route A is cheaper here (route-B regret)"
    action: raise_route_b_threshold

  - id: route_a_slow_hot_shape
    severity: medium
    since: 1
    status: active
    group_by: [normalized_query_hash, language, decision_reason]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: A }
        - { col: query_duration_ms, op: gte, param: slow_duration_watermark }
    evidence:
      report: [count, "max(query_duration_ms)"]
    finding: "route A hot shape {normalized_query_hash}/{language} is slow at/above {slow_duration_watermark} with high frequency — highest aggregate payoff to re-route to B"
    action: lower_route_b_threshold

  # ======================================================================
  # catalogVersion 2 rules (N1-N5). Every new failure rule groups by
  # decision_reason so the operator can read WHICH solver path produced the
  # failure (shardable vs not-sliceable vs scalar-heavy vs below-threshold) and
  # pick the right lever (shard / cap / reject / rewrite) — the catalog never
  # encodes that branch in a number. decision_reason is a grouping/attribution
  # column only; it is never a condition operand.
  # ======================================================================

  # N1 — hard-failure cluster, route-agnostic, attributed by solver reason.
  # Generalizes oom_on_route_a (which AND-s route=A + recommends force_route_b
  # unconditionally) to ALL hard failures regardless of route, grouped by the
  # solver reason so the operator sees shardable vs non-shardable. oom_on_route_a
  # is kept (it owns the route-A-below-threshold force-route-B sub-population);
  # this rule's action is deliberately reason-agnostic.
  - id: failure_cluster_by_reason
    severity: critical
    since: 2
    status: active
    applies_to: [promql, logql, traceql]
    group_by: [shape_id, language, decision_reason]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: exit_status, op: in, enum: [oom, timeout] }
    evidence:
      report: [count, "max(memory_usage)", "max(query_duration_ms)", "max(read_rows)"]
    finding: "hard-failure cluster in {shape_id}/{language} under decision_reason={decision_reason}; if the reason is a route-B blocker (not-sliceable / high-D / scalar-heavy) route B cannot help — cap query.max_samples / query.max_memory_bytes or cut cardinality; if below-threshold / instant, force route B"
    action: investigate_failure_cluster

  # N2 — route B already failing, attributed by shard count.
  # Guardrail against the shipped catalog's blind spot: the shard rules assume
  # route B bounds memory and recommend MORE sharding. A route-B class that
  # still fails is the counter-example. Rather than gate on an unknowable
  # k_shards saturation cap (a config number nobody can set correctly), this
  # rule fires on any route-B hard failure and surfaces max(k_shards) as
  # evidence so the operator reads the saturation from the data.
  - id: route_b_still_failing
    severity: high
    since: 2
    status: active
    applies_to: [promql, logql, traceql]
    group_by: [shape_id, language, decision_reason]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: B }
        - { col: exit_status, op: in, enum: [oom, timeout] }
    evidence:
      report: [count, "max(k_shards)", "max(memory_usage)"]
    finding: "route B {shape_id}/{language} STILL fails (reason={decision_reason}) at up to the shard count in evidence — more sharding will not help; reduce per-query cardinality or reject the shape"
    action: cap_cardinality_or_reject

  # N3 — cerberus-side rejection cluster.
  # sample_budget / breaker / rejected are cerberus-side terminal outcomes
  # decided BEFORE the CH dispatch (read_rows/memory are meaningless for them) —
  # a distinct operator signal that neither route A nor route B addresses.
  # group_by exit_status separates the three sub-causes; the deployment-wide
  # rejection share is surfaced as MESSAGE context via {cerberus_reject_ratio}
  # (a corpus_count_ratio scalar, never a gate).
  - id: cerberus_side_rejection_pressure
    severity: high
    since: 2
    status: active
    applies_to: [promql, logql, traceql]
    group_by: [shape_id, language, exit_status]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: exit_status, op: in, enum: [sample_budget, breaker, rejected] }
    evidence:
      report: [count, "max(read_rows)"]
    finding: "cerberus-side rejection cluster in {shape_id}/{language} (exit={exit_status}); deployment-wide explicit-rejection share is {cerberus_reject_ratio}. sample_budget -> raise query.max_samples iff CH has headroom, else pre-aggregate; breaker -> investigate upstream CH health; rejected -> re-evaluate the hard cap. Route B never fixes a cerberus-side rejection"
    action: review_rejection_guardrail

  # N4 — heavy shape geometry failing (the cardinality-product the solver itself
  # uses for eligibility). cumulative_d is the spine lookback; its tail is the
  # most direct "this shape is pathological independent of route" signal, and a
  # closer-to-source signal than N5's downstream read_rows proxy.
  - id: heavy_shape_geometry_failing
    severity: high
    since: 2
    status: active
    applies_to: [promql, logql, traceql]
    group_by: [shape_id, language, decision_reason]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: exit_status, op: in, enum: [oom, timeout] }
        - { col: cumulative_d, op: gte, param: d_high_watermark }
    evidence:
      report: [count, "max(cumulative_d)", "max(n_anchors)", "max(fanout)"]
    finding: "heavy-geometry failure cluster in {shape_id}/{language} (reason={decision_reason}) with cumulative_d at/above {d_high_watermark} — the shape's spine lookback is in its own pathological tail; cut the range/step or pre-aggregate before routing"
    action: investigate_heavy_geometry

  # N5 — read-amplification hot shape (experimental). Softest signal, shipped
  # experimental so it is loaded + validated but only evaluated on explicit
  # opt-in until an operator confirms precision on a real corpus. Flags healthy
  # scans reading far above their OWN per-shape tail — the canonical signature
  # of a missing PREWHERE / late-materialisation rewrite (read_rows is the
  # honest self-relative signal; there is no result-cardinality column, so no
  # read_rows/result ratio is fabricated).
  - id: read_amplification_hot_shape
    severity: medium
    since: 2
    status: experimental
    applies_to: [promql, logql, traceql]
    group_by: [shape_id, language]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: exit_status, op: eq, enum: ok }
        - { col: read_rows, op: gte, param: read_rows_high_watermark }
    evidence:
      report: [count, "max(read_rows)", "max(read_bytes)"]
    finding: "read-amplification hot shape {shape_id}/{language}: healthy scans read at/above {read_rows_high_watermark} rows, in this shape's own tail — a candidate for a missing PREWHERE / late-materialisation optimizer rewrite"
    action: investigate_read_amplification
