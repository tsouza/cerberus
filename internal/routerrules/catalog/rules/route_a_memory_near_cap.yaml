rules:
  - id: route_a_memory_near_cap
    severity: high
    since: 1
    status: active
    group_by: [shape_id, language]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: A }
        - { col: exit_status, op: eq, enum: ok }
        - { col: memory_usage, op: gte, param: memory_near_cap }
    evidence:
      report: [count, "max(memory_usage)"]
    finding: "route A class {shape_id}/{language} peaks at/above {memory_near_cap} — near the configured memory cap (a fraction of query.max_memory_bytes); one more step in shape or range risks an OOM. Route B bounds peak memory; lower the route-B threshold for this class"
    action: lower_route_b_threshold
