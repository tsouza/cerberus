rules:
  - id: route_b_overshard_low_fanout
    severity: medium
    since: 1
    status: active
    group_by: [shape_id, language]
    min_support:
      ref: min_class_support
    condition:
      all:
        - { col: route, op: eq, enum: B }
        - { col: exit_status, op: eq, enum: ok }
        - { col: query_duration_ms, op: lt, param: slow_duration_watermark }
        - { col: fanout, op: lt, param: fanout_route_b_floor }
    evidence:
      report: [count, "avg(k_shards)"]
    finding: "route B class {shape_id}/{language} paid k-shard overhead below {fanout_route_b_floor} fan-out while finishing under {slow_duration_watermark} — route A is cheaper here (route-B regret)"
    action: raise_route_b_threshold
