# OpenTelemetry Collector config for the repo-root docker-compose quickstart.
#
# This is the compose-flavoured cousin of test/e2e/k3s/otel-collector.yaml,
# stripped of every k8s-specific receiver (k8s_cluster, k8s_events,
# kubeletstats, filelog) and the agent/gateway split that only makes
# sense in a cluster. Compose has a single collector instance:
#
#   cerberus -> otel-collector (OTLP/gRPC :4317) -> clickhouseexporter -> CH
#
# Cerberus reaches the collector over the cerberus-dev docker network at
# `otel-collector:4317`. The collector then writes to the same
# `clickhouse` service the cerberus query path reads from, so the
# dogfood loop closes: cerberus emits self-telemetry, the collector
# persists it in CH, and cerberus's own Prom/Loki/Tempo APIs can query
# it back through Grafana.
#
# The clickhouseexporter rides the upstream sqltemplates package — the
# same set internal/schema/ddl uses — so the table shapes
# (otel_logs / otel_metrics_* / otel_traces) cannot drift from what
# cerberus expects to query.
#
# Three additional metric receivers fan in alongside cerberus's OTLP
# self-telemetry to give the quickstart a full-stack observability
# picture without any external scraper:
#
#   prometheus/self    -> collector's own /metrics endpoint (otelcol_*)
#   hostmetrics        -> /proc + /sys based CPU / mem / disk / net /
#                         fs / load / paging / processes scrapers
#   sqlquery/clickhouse -> system.metrics / system.events /
#                         system.asynchronous_metrics rows pulled from
#                         the ClickHouse server every 15 s
#
# And one log receiver closes the gap where the stack ingested CH
# *metrics* but not CH *logs*:
#
#   sqlquery/clickhouse-logs -> ClickHouse's own system.query_log tailed
#                         incrementally into OTLP logs (one structured
#                         record per server-side query: duration, rows,
#                         memory, exception), tagged service.name=
#                         clickhouse so the Loki head surfaces it as
#                         `{service_name="clickhouse"}`.
#
# Every metric flows through the same OTLP -> clickhouseexporter path
# so cerberus's PromQL head can query them back through Grafana —
# nothing bypasses cerberus. The transform/metric_names processor
# rewrites OTel-style dotted names (system.cpu.time) to underscored
# PromQL-friendly ones (system_cpu_time) before write so dashboard
# PromQL doesn't need UTF-8 escaping.
extensions:
  # health_check exposes :13133/ on the cerberus-dev network. The
  # compose stack itself doesn't bind a `healthcheck:` against it
  # (the upstream contrib image is FROM scratch — no wget/curl/nc to
  # call out from inside the container), but the endpoint is left
  # enabled so an operator can curl it from a sidecar / from the host
  # via `docker compose exec -T otel-collector` (where applicable) to
  # confirm the pipelines are live.
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape the collector's own /metrics endpoint exposed by
  # service.telemetry.metrics below. Every `otelcol_*` metric — receiver
  # accepted / refused, processor batch send sizes, exporter sent /
  # failed, queue size / capacity, process uptime, runtime go memstats
  # — lands in otel_metrics_sum / _gauge via the same OTLP path the
  # rest of the stack uses. job=otelcol-self so PromQL can pivot.
  prometheus/self:
    config:
      scrape_configs:
        - job_name: otelcol-self
          scrape_interval: 15s
          static_configs:
            - targets: ['0.0.0.0:8888']

  # Linux host metrics — every supported scraper turned on. From inside
  # the otel-collector container the scrapers read from /proc + /sys,
  # which by default would reflect the container's PID/cgroup namespace.
  # docker-compose.yml bind-mounts the host's /proc, /sys, and root
  # filesystem under /hostfs (ro,rslave) and exports
  #     HOST_PROC=/hostfs/proc
  #     HOST_SYS=/hostfs/sys
  #     HOST_ETC=/hostfs/etc
  # so the cpu / memory / network / paging / processes scrapers read
  # real host data. `root_path: /hostfs` below extends the same
  # redirection to the filesystem + disk scrapers, which walk the full
  # tree rather than consulting a single /proc-style file. Together
  # those knobs are the upstream-documented contract for running
  # hostmetricsreceiver in a container.
  host_metrics:
    collection_interval: 15s
    # Re-root every filesystem-walking scraper at /hostfs (where
    # docker-compose.yml mounts the host's /). cpu / memory / paging /
    # network / processes additionally honour HOST_PROC + HOST_SYS +
    # HOST_ETC from the env block in docker-compose.yml. The pair gives
    # the receiver a complete view of the host without the container
    # ever seeing a writable mount.
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          system.cpu.frequency:
            enabled: true
          system.cpu.logical.count:
            enabled: true
          system.cpu.physical.count:
            enabled: true
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.linux.memory.available:
            enabled: true
          system.memory.utilization:
            enabled: true
      disk: {}
      network:
        metrics:
          system.network.conntrack.count:
            enabled: true
          system.network.conntrack.max:
            enabled: true
      filesystem:
        metrics:
          system.filesystem.utilization:
            enabled: true
      load: {}
      paging:
        metrics:
          system.paging.utilization:
            enabled: true
      processes: {}

  # ClickHouse self-monitoring via SQL. Stock CH ships `system.metrics`
  # (current gauges), `system.events` (cumulative counters), and
  # `system.asynchronous_metrics` (server-side derived gauges); together
  # they cover query rate, memory pool, parts / merges, replication,
  # network, cache, thread pools, etc. We turn each row into a labelled
  # OTel metric series so PromQL can pivot by metric/event/asyncmetric
  # name without enumerating every one of the ~400 names up front.
  sqlquery/clickhouse:
    driver: clickhouse
    datasource: clickhouse://cerberus:cerberus@clickhouse:9000/otel?dial_timeout=5s
    collection_interval: 15s
    queries:
      - sql: "SELECT metric AS name, value FROM system.metrics"
        metrics:
          - metric_name: clickhouse_metric
            value_column: value
            attribute_columns: [name]
            data_type: gauge
            value_type: double
      - sql: "SELECT event AS name, toFloat64(value) AS value FROM system.events"
        metrics:
          - metric_name: clickhouse_event
            value_column: value
            attribute_columns: [name]
            data_type: sum
            value_type: double
            monotonic: true
      - sql: "SELECT metric AS name, value FROM system.asynchronous_metrics"
        metrics:
          - metric_name: clickhouse_async_metric
            value_column: value
            attribute_columns: [name]
            data_type: gauge
            value_type: double
      - sql: |-
          SELECT
            count() AS active_parts,
            sum(bytes_on_disk) AS bytes_on_disk,
            sum(rows) AS rows
          FROM system.parts
          WHERE active
        metrics:
          - metric_name: clickhouse_parts_active
            value_column: active_parts
            data_type: gauge
            value_type: int
          - metric_name: clickhouse_parts_bytes_on_disk
            value_column: bytes_on_disk
            data_type: gauge
            value_type: int
          - metric_name: clickhouse_parts_rows
            value_column: rows
            data_type: gauge
            value_type: int

  # ClickHouse's own query log -> OTLP logs. Every server-side query
  # (duration, rows read, memory, exception) becomes a structured log
  # record, so the demo can inspect slow / failing ClickHouse queries
  # through cerberus's Loki head in Grafana (`{service_name="clickhouse"}`)
  # rather than only via `clickhouse-client`. This closes the gap where
  # the stack ingested CH *metrics* (above) but not CH *logs*.
  #
  # Incremental tailing: `tracking_column: event_time_microseconds` keeps a
  # high-water mark so each 15s poll only pulls rows newer than the last,
  # never re-ingesting the whole table. The `query NOT LIKE %query_log%`
  # guard drops the receiver's own polling SELECTs so it can't feed on its
  # own output. `type != 'QueryStart'` keeps one record per query (the
  # terminal QueryFinish / Exception row) instead of a start+finish pair.
  sqlquery/clickhouse-logs:
    driver: clickhouse
    datasource: clickhouse://cerberus:cerberus@clickhouse:9000/otel?dial_timeout=5s
    collection_interval: 15s
    queries:
      - sql: |-
          SELECT
            toUnixTimestamp64Micro(event_time_microseconds) AS event_us,
            query_id,
            type,
            query_kind,
            user,
            toString(query_duration_ms) AS query_duration_ms,
            toString(read_rows)         AS read_rows,
            toString(read_bytes)        AS read_bytes,
            toString(result_rows)       AS result_rows,
            toString(memory_usage)      AS memory_usage,
            exception,
            query
          FROM system.query_log
          WHERE toUnixTimestamp64Micro(event_time_microseconds) > ?
            AND type != 'QueryStart'
            AND query NOT LIKE '%system.query_log%'
            AND NOT (query_kind = 'Insert' AND query LIKE '%otel_logs%')
          ORDER BY event_us ASC
        # Track an integer microsecond epoch, not the DateTime64 column:
        # the sqlquery receiver round-trips the high-water mark as an
        # RFC3339 string (…T…Z), which ClickHouse will not coerce back to
        # DateTime64(6). A UInt64 microsecond cursor sidesteps the format
        # mismatch entirely.
        tracking_start_value: "0"
        tracking_column: event_us
        logs:
          - body_column: query
            attribute_columns:
              - query_id
              - type
              - query_kind
              - user
              - query_duration_ms
              - read_rows
              - read_bytes
              - result_rows
              - memory_usage
              - exception

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    # 1s timeout keeps the compose quickstart's time-to-visibility
    # tight: the cerberus SDK ships metric points every 10s
    # (CERBERUS_OTLP_EXPORT_INTERVAL default), so the collector should
    # forward them onward at roughly the same cadence instead of
    # holding a 5s buffer of its own on top. send_batch_size stays at
    # 1024 — sparse self-telemetry never hits that ceiling first, the
    # 1s timeout is what fires.
    send_batch_size: 1024
    timeout: 1s
  # Ensure every record carries a service.name even when the sender
  # forgot to set one. Mirrors the k3s gateway's defaults.
  resource:
    attributes:
      - key: service.name
        value: cerberus-otel-collector
        action: insert
      - key: deployment.environment
        value: compose
        action: upsert
  # Stamp a service.name per scraper output so PromQL filters can
  # pivot by source (clickhouse / host / otelcol-self) without a
  # MetricName prefix scan.
  resource/clickhouse:
    attributes:
      - key: service.name
        value: clickhouse
        action: upsert
  resource/host:
    attributes:
      - key: service.name
        value: host
        action: upsert
  resource/otelcol_self:
    attributes:
      - key: service.name
        value: otelcol
        action: upsert
  # Rewrite OTel-dotted metric names to underscored PromQL-friendly
  # ones (system.cpu.time -> system_cpu_time). Without this, querying
  # the metric by `__name__` requires UTF-8 escaping that not every
  # Grafana version supports. Identical rewrite the
  # prometheusremotewriteexporter applies by default, applied here so
  # the cerberus PromQL head sees pre-sanitised names.
  transform/metric_names:
    metric_statements:
      - context: metric
        statements:
          - replace_pattern(name, "\\.", "_")

connectors:
  # The servicegraph connector reads spans off the `traces` pipeline,
  # derives caller -> callee edges from SpanKind=Client + peer.service
  # (stamped by internal/chclient/client.go on every CH round-trip),
  # and emits Prometheus-shape metrics
  # (traces_service_graph_request_total / _duration_seconds /
  # _failed_total) into a `metrics/servicegraph` pipeline that ships
  # them back through the clickhouseexporter. Grafana's Tempo
  # datasource Service Graph tab then renders edges by querying
  # cerberus's own Prom head for those metrics — closing the
  # observability dogfood loop: cerberus's traces become the
  # service-graph metrics cerberus's Prom API serves back.
  #
  # Buckets are the OTel-Collector default for HTTP/RPC traffic; ttl
  # is intentionally short (the store is purely a cross-span join
  # cache for matching client / server pairs, and CH-call spans don't
  # have a server-side sibling — every edge resolves on the client
  # span alone via peer.service).
  service_graph:
    latency_histogram_buckets: [100ms, 250ms, 1s, 5s, 10s]
    store:
      ttl: 2s
    metrics_flush_interval: 15s

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: otel
    username: cerberus
    password: cerberus
    ttl: 0
    create_schema: true
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    # 5s per-request timeout pairs with the 1s batch timeout above:
    # the collector flushes ~once a second, so a 10s exporter timeout
    # is more than the whole pipeline needs end-to-end. Dropping it
    # surfaces a stuck ClickHouse insert faster than the previous 10s
    # ceiling let it.
    timeout: 5s
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
    # Expose collector self-metrics on :8888/metrics so prometheus/self
    # above can scrape them back into the OTLP pipeline. The default
    # bind is 127.0.0.1, which is unreachable from the receiver inside
    # the same container's network namespace — explicit 0.0.0.0:8888
    # makes the endpoint reachable by both the in-process receiver and
    # any out-of-process debugger from the cerberus-dev network.
    #
    # The legacy `address` shorthand was removed in 0.123+; the
    # readers/pull/prometheus form below is the supported syntax for
    # 0.152.x. without_type_suffix + without_units keeps the metric
    # names close to the upstream `otelcol_*` convention so the
    # otelcol dashboard's PromQL matchers stay stable.
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
                without_type_suffix: true
                without_units: true
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, transform/metric_names, batch]
      exporters: [clickhouse]
    metrics/clickhouse:
      receivers: [sqlquery/clickhouse]
      processors: [memory_limiter, resource/clickhouse, transform/metric_names, batch]
      exporters: [clickhouse]
    metrics/host:
      receivers: [host_metrics]
      processors: [memory_limiter, resource/host, transform/metric_names, batch]
      exporters: [clickhouse]
    metrics/otelcol_self:
      receivers: [prometheus/self]
      processors: [memory_limiter, resource/otelcol_self, transform/metric_names, batch]
      exporters: [clickhouse]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [clickhouse]
    # ClickHouse query log -> CH (tagged service.name=clickhouse so the
    # Loki head surfaces it as `{service_name="clickhouse"}`).
    logs/clickhouse:
      receivers: [sqlquery/clickhouse-logs]
      processors: [memory_limiter, resource/clickhouse, batch]
      exporters: [clickhouse]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      # `servicegraph` is wired as an additional exporter on the
      # traces pipeline because, in connector wiring, a connector
      # plays the role of an exporter on the source pipeline-type
      # and a receiver on the destination pipeline-type. Spans
      # still flow to clickhouseexporter as before — the connector
      # is a tap, not a swap.
      exporters: [clickhouse, service_graph]
    # metrics/servicegraph receives the connector's derived
    # `traces_service_graph_*` series and ships them through the
    # same clickhouseexporter the normal metrics pipeline uses.
    # Cerberus's Prom head then queries them back out of CH so
    # Grafana's Tempo Service Graph tab can render edges.
    metrics/servicegraph:
      receivers: [service_graph]
      processors: [memory_limiter, batch]
      exporters: [clickhouse]
