# OpenTelemetry Collector config for the repo-root docker-compose quickstart.
#
# This is the compose-flavoured cousin of test/e2e/k3s/otel-collector.yaml,
# stripped of every k8s-specific receiver (k8s_cluster, k8s_events,
# kubeletstats, filelog) and the agent/gateway split that only makes
# sense in a cluster. Compose has a single collector instance:
#
#   cerberus -> otel-collector (OTLP/gRPC :4317) -> clickhouseexporter -> CH
#
# Cerberus reaches the collector over the cerberus-dev docker network at
# `otel-collector:4317`. The collector then writes to the same
# `clickhouse` service the cerberus query path reads from, so the
# dogfood loop closes: cerberus emits self-telemetry, the collector
# persists it in CH, and cerberus's own Prom/Loki/Tempo APIs can query
# it back through Grafana.
#
# The clickhouseexporter rides the upstream sqltemplates package — the
# same set internal/schema/ddl uses — so the table shapes
# (otel_logs / otel_metrics_* / otel_traces) cannot drift from what
# cerberus expects to query.
extensions:
  # health_check exposes :13133/ on the cerberus-dev network. The
  # compose stack itself doesn't bind a `healthcheck:` against it
  # (the upstream contrib image is FROM scratch — no wget/curl/nc to
  # call out from inside the container), but the endpoint is left
  # enabled so an operator can curl it from a sidecar / from the host
  # via `docker compose exec -T otel-collector` (where applicable) to
  # confirm the pipelines are live.
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    # 1s timeout keeps the compose quickstart's time-to-visibility
    # tight: the cerberus SDK ships metric points every 10s
    # (CERBERUS_OTLP_EXPORT_INTERVAL default), so the collector should
    # forward them onward at roughly the same cadence instead of
    # holding a 5s buffer of its own on top. send_batch_size stays at
    # 1024 — sparse self-telemetry never hits that ceiling first, the
    # 1s timeout is what fires.
    send_batch_size: 1024
    timeout: 1s
  # Ensure every record carries a service.name even when the sender
  # forgot to set one. Mirrors the k3s gateway's defaults.
  resource:
    attributes:
      - key: service.name
        value: cerberus-otel-collector
        action: insert
      - key: deployment.environment
        value: compose
        action: upsert
  # Strip exemplars from the service-graph metrics before they reach
  # the clickhouseexporter. The servicegraph connector emits
  # exemplars whose pcommon.Value pointers the v0.116.0 contrib
  # clickhouseexporter dereferences without a nil check in its
  # sum_metrics insert path
  # (`exporter/clickhouseexporter/internal/sum_metrics.go:129`),
  # crashing the whole collector on the first metrics_flush_interval
  # tick. The fix is upstream-bound; until the bump lands here we
  # drop exemplars on the servicegraph branch — exemplars are a
  # nice-to-have for service-graph metrics (the connector emits
  # representative TraceIDs), but the edge series themselves still
  # flow through.
  transform/servicegraph_drop_exemplars:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          # Clear exemplars on every datapoint flowing through this
          # branch. The connector populates them with representative
          # trace IDs whose nested pcommon.Value pointers the
          # v0.116.0 contrib clickhouseexporter dereferences blindly.
          # Empty slice = no exemplar attribute loop runs at all.
          - set(exemplars, []) where true

connectors:
  # The servicegraph connector reads spans off the `traces` pipeline,
  # derives caller -> callee edges from SpanKind=Client + peer.service
  # (stamped by internal/chclient/client.go on every CH round-trip),
  # and emits Prometheus-shape metrics
  # (traces_service_graph_request_total / _duration_seconds /
  # _failed_total) into a `metrics/servicegraph` pipeline that ships
  # them back through the clickhouseexporter. Grafana's Tempo
  # datasource Service Graph tab then renders edges by querying
  # cerberus's own Prom head for those metrics — closing the
  # observability dogfood loop: cerberus's traces become the
  # service-graph metrics cerberus's Prom API serves back.
  #
  # Buckets are the OTel-Collector default for HTTP/RPC traffic; ttl
  # is intentionally short (the store is purely a cross-span join
  # cache for matching client / server pairs, and CH-call spans don't
  # have a server-side sibling — every edge resolves on the client
  # span alone via peer.service).
  servicegraph:
    latency_histogram_buckets: [100ms, 250ms, 1s, 5s, 10s]
    store:
      ttl: 2s
    metrics_flush_interval: 15s

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: otel
    username: cerberus
    password: cerberus
    ttl: 0
    create_schema: true
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    # 5s per-request timeout pairs with the 1s batch timeout above:
    # the collector flushes ~once a second, so a 10s exporter timeout
    # is more than the whole pipeline needs end-to-end. Dropping it
    # surfaces a stuck ClickHouse insert faster than the previous 10s
    # ceiling let it.
    timeout: 5s
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [clickhouse]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [clickhouse]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      # `servicegraph` is wired as an additional exporter on the
      # traces pipeline because, in connector wiring, a connector
      # plays the role of an exporter on the source pipeline-type
      # and a receiver on the destination pipeline-type. Spans
      # still flow to clickhouseexporter as before — the connector
      # is a tap, not a swap.
      exporters: [clickhouse, servicegraph]
    # metrics/servicegraph receives the connector's derived
    # `traces_service_graph_*` series and ships them through the
    # same clickhouseexporter the normal metrics pipeline uses.
    # Cerberus's Prom head then queries them back out of CH so
    # Grafana's Tempo Service Graph tab can render edges.
    metrics/servicegraph:
      receivers: [servicegraph]
      processors:
        - memory_limiter
        - transform/servicegraph_drop_exemplars
        - batch
      exporters: [clickhouse]
