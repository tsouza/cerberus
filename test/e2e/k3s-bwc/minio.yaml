# MinIO — the object-store backend for the bundled-ClickHouse ("bwc") e2e lane.
#
# This stands in for S3/GCS/Azure in-cluster so the lane proves the chart's
# `clickhouse.bundled.objectStorage.backend: s3` path end-to-end against a real
# object store, with path-style addressing + static credentials — exactly the
# MinIO/non-AWS shape operators run. localstack is deliberately NOT used: its
# `:latest` is gated behind a paywall, so it can't be a dependable pull in an
# informational CI lane.
#
# Throwaway by design: data lives on an emptyDir, the credentials are the MinIO
# defaults (minioadmin/minioadmin), and the whole namespace is torn down with
# the cluster. NONE of this is a production pattern — it is a test substrate.
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: cerberus
  labels:
    app: minio
spec:
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app: minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: cerberus
  labels:
    app: minio
spec:
  replicas: 1
  # Recreate, not RollingUpdate: a single emptyDir-backed pod that the bundled
  # ClickHouse disk writes to — never run two at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      volumes:
        - name: data
          emptyDir: {}
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z
          # IfNotPresent: the image is pre-pulled on the host and imported into
          # k3d by `just e2e-bwc-up` (same air-gap-safe pattern as the other
          # e2e images), so the kubelet never needs to reach a registry.
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              value: minioadmin
            - name: MINIO_ROOT_PASSWORD
              value: minioadmin
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
