---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: cerberus
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Cerberus-Prometheus
        uid: cerberus-prometheus
        type: prometheus
        access: proxy
        url: http://cerberus:8080
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
      - name: Cerberus-Loki
        uid: cerberus-loki
        type: loki
        access: proxy
        url: http://cerberus:8080
        editable: false
      - name: Cerberus-Tempo
        uid: cerberus-tempo
        type: tempo
        access: proxy
        url: http://cerberus:8080
        editable: false
        jsonData:
          # serviceMap.datasourceUid tells Grafana's Tempo datasource
          # which Prom backend to query for the
          # `traces_service_graph_request_total{client, server}` series
          # the OTel-Collector servicegraph connector emits. With this
          # field set, the "Service Graph" tab in Explore renders edges
          # by issuing PromQL `sum by (client, server)
          # (rate(traces_service_graph_request_total[$__range]))`
          # against cerberus's Prom head — same dogfood loop as the
          # rest of the stack.
          serviceMap:
            datasourceUid: cerberus-prometheus
      # Aliases for Grafana's built-in drilldown apps. Each app's
      # factory defaults reference Grafana Cloud's canonical
      # `grafanacloud-{metrics,logs,traces}` UIDs; without those
      # entries the apps log "Datasource grafanacloud-* was not
      # found" on every page load. Routing the aliases to the same
      # cerberus backend turns the drilldown UIs into usable
      # surfaces against this stack. Mirror of
      # test/e2e/grafana/compose/datasources/cerberus.yaml.
      - name: grafanacloud-metrics
        uid: grafanacloud-metrics
        type: prometheus
        access: proxy
        url: http://cerberus:8080
        editable: false
        jsonData:
          timeInterval: 15s
      - name: grafanacloud-logs
        uid: grafanacloud-logs
        type: loki
        access: proxy
        url: http://cerberus:8080
        editable: false
      - name: grafanacloud-traces
        uid: grafanacloud-traces
        type: tempo
        access: proxy
        url: http://cerberus:8080
        editable: false
        jsonData:
          serviceMap:
            datasourceUid: cerberus-prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: cerberus
  labels:
    app: grafana
spec:
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30030
  selector:
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: cerberus
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:12.2.9
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            # Admin, matching the compose stack: Grafana 12's Metrics
            # Drilldown app denies the Viewer role outright ("Access
            # denied — You do not have permission to see this page",
            # run 27276109296), which hard-failed the drilldown sweep
            # in k3d while compose (anonymous Admin) passed the same
            # spec. This is an ephemeral throwaway test cluster — the
            # same justification compose documents for its Admin
            # anonymous session.
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_USERS_DEFAULT_THEME
              value: dark
            # Deliberately NO GF_INSTALL_PLUGINS for the drilldown
            # apps: on Grafana 12.x grafana-lokiexplore-app,
            # grafana-exploretraces-app, and
            # grafana-metricsdrilldown-app are first-party preinstalled
            # (hardcoded in Grafana's pkg/setting/setting_plugins.go
            # preinstall list), so installing them again via
            # GF_INSTALL_PLUGINS would only race the built-in flow.
            # Note: the preinstall is an ASYNC boot-time download from
            # grafana.com that starts after /api/health goes green —
            # the pod needs egress to grafana.com, and
            # /api/plugins/<id>/settings can briefly 404 right after
            # boot (see grafana/grafana#106871). The drilldown
            # catalogue (test/e2e/playwright/helpers/drilldown.ts)
            # bounds that race with waitForAppInstalled.
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-cerberus
