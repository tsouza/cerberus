---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: cerberus
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Cerberus-Prometheus
        uid: cerberus-prometheus
        type: prometheus
        access: proxy
        url: http://cerberus:8080
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
      - name: Cerberus-Loki
        uid: cerberus-loki
        type: loki
        access: proxy
        url: http://cerberus:8080
        editable: false
      - name: Cerberus-Tempo
        uid: cerberus-tempo
        type: tempo
        access: proxy
        url: http://cerberus:8080
        editable: false
      # Aliases for Grafana 11.x built-in drilldown apps. Each app's
      # factory defaults reference Grafana Cloud's canonical
      # `grafanacloud-{metrics,logs,traces}` UIDs; without those
      # entries the apps log "Datasource grafanacloud-* was not
      # found" on every page load. Routing the aliases to the same
      # cerberus backend turns the drilldown UIs into usable
      # surfaces against this stack. Mirror of
      # test/e2e/grafana/compose/datasources/cerberus.yaml.
      - name: grafanacloud-metrics
        uid: grafanacloud-metrics
        type: prometheus
        access: proxy
        url: http://cerberus:8080
        editable: false
        jsonData:
          timeInterval: 15s
      - name: grafanacloud-logs
        uid: grafanacloud-logs
        type: loki
        access: proxy
        url: http://cerberus:8080
        editable: false
      - name: grafanacloud-traces
        uid: grafanacloud-traces
        type: tempo
        access: proxy
        url: http://cerberus:8080
        editable: false
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: cerberus
  labels:
    app: grafana
spec:
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30030
  selector:
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: cerberus
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_USERS_DEFAULT_THEME
              value: dark
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: traceqlSearch
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-cerberus-self
