---
# RBAC for the OTel collector — the kubeletstats and k8s_cluster receivers
# need read access to the kubelet stats API and a fair chunk of core/apps
# k8s API resources. Scoping kept to read-only verbs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: cerberus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cerberus-otel-collector
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/stats
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
      - namespaces
      - resourcequotas
      - replicationcontrollers
      - replicationcontrollers/status
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources:
      - events
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cerberus-otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cerberus-otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: cerberus
---
# Gateway collector config:
# - receives cluster-wide signals (k8s_cluster, k8s_events)
# - accepts OTLP from the agent DaemonSet and from the sample-app
# - writes everything to ClickHouse via the clickhouseexporter, which
#   issues the same OTel-CH DDL as internal/schema/ddl.Apply (both ride
#   the upstream sqltemplates). Schema cannot drift.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-gateway-config
  namespace: cerberus
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      k8s_cluster:
        auth_type: serviceAccount
        collection_interval: 30s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
        allocatable_types_to_report: [cpu, memory, ephemeral-storage, storage]
      k8s_events:
        auth_type: serviceAccount
      # ClickHouse's own query log -> OTLP logs, mirroring the compose stack
      # (test/e2e/otel-collector/compose-config.yaml). Every server-side query
      # (duration, rows read, memory, exception) becomes a structured log
      # record tagged service.name=clickhouse, so cerberus's Loki head surfaces
      # it as `{service_name="clickhouse"}`. Without this the k3d dashboard
      # lane has no clickhouse query_log stream and loki_explore_columns.spec.ts
      # (the #908 Logs-Drilldown column gate) finds zero results.
      #
      # Incremental tailing: `tracking_column: event_us` keeps a high-water
      # mark so each poll only pulls rows newer than the last. The
      # `query NOT LIKE %query_log%` guard drops the receiver's own polling
      # SELECTs; `type != 'QueryStart'` keeps one terminal record per query.
      sqlquery/clickhouse-logs:
        driver: clickhouse
        datasource: clickhouse://cerberus:cerberus@clickhouse:9000/otel?dial_timeout=5s
        collection_interval: 15s
        queries:
          - sql: |-
              SELECT
                toUnixTimestamp64Micro(event_time_microseconds) AS event_us,
                query_id,
                type,
                query_kind,
                user,
                multiIf(
                  type LIKE 'Exception%' OR exception != '', 'error',
                  'info'
                )                           AS severity_text,
                concat(toString(query_duration_ms), 'ms') AS duration,
                toString(read_bytes)        AS bytes,
                toString(query_duration_ms) AS query_duration_ms,
                toString(read_rows)         AS read_rows,
                toString(read_bytes)        AS read_bytes,
                toString(result_rows)       AS result_rows,
                toString(memory_usage)      AS memory_usage,
                exception,
                query
              FROM system.query_log
              WHERE toUnixTimestamp64Micro(event_time_microseconds) > ?
                AND type != 'QueryStart'
                AND query NOT LIKE '%system.query_log%'
                AND NOT (query_kind = 'Insert' AND query LIKE '%otel_logs%')
              ORDER BY event_us ASC
            tracking_start_value: "0"
            tracking_column: event_us
            logs:
              - body_column: query
                attribute_columns:
                  - severity_text
                  - query_id
                  - type
                  - query_kind
                  - user
                  - duration
                  - bytes
                  - query_duration_ms
                  - read_rows
                  - read_bytes
                  - result_rows
                  - memory_usage
                  - exception

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        send_batch_size: 1024
        timeout: 5s
      # Ensure every record carries a service.name. Cluster receivers don't
      # set one; default to the collector's own identity so the OTel-CH
      # ServiceName column is never empty.
      resource:
        attributes:
          - key: service.name
            value: cerberus-otel-collector
            action: insert
          - key: deployment.environment
            value: e2e
            action: upsert
          - key: k8s.cluster.name
            value: cerberus-e2e
            action: upsert
          # rc.5 — static k8s-shaped ResourceAttributes so the dashboard /
          # crawl lanes exercise resource-attribute -> Prometheus-label
          # projection (k8s_namespace_name / deployment_environment_name).
          # Static (not k8sattributes-derived) keeps the gate deterministic;
          # the cerberus Prom head promotes them via CERBERUS_PROM_RESOURCE_LABELS.
          - key: k8s.namespace.name
            value: cerberus
            action: upsert
          - key: deployment.environment.name
            value: e2e
            action: upsert
      # Stamp service.name=clickhouse on the sqlquery/clickhouse-logs output so
      # cerberus's Loki head surfaces it as `{service_name="clickhouse"}`,
      # matching the compose stack's resource/clickhouse processor.
      resource/clickhouse:
        attributes:
          - key: service.name
            value: clickhouse
            action: upsert
    connectors:
      # The service_graph connector reads spans off the `traces` pipeline,
      # derives caller -> callee edges from SpanKind=Client + peer.service
      # (stamped by internal/chclient/client.go on every CH round-trip),
      # and emits Prometheus-shape metrics
      # (traces_service_graph_request_total / _duration_seconds /
      # _failed_total) into a `metrics/servicegraph` pipeline that ships
      # them back through the clickhouseexporter. Grafana's Tempo
      # datasource Service Graph tab then renders edges by querying
      # cerberus's own Prom head for those metrics — closing the
      # observability dogfood loop on the k3d cluster the same way the
      # compose stack does (see test/e2e/otel-collector/compose-config.yaml).
      #
      # 0.152.x renamed the connector key from `servicegraph` to
      # `service_graph`; the deprecation alias is still accepted but
      # cerberus pins the canonical form to mirror the compose stack
      # and stay forward-compatible.
      #
      # Buckets are the OTel-Collector default for HTTP/RPC traffic; ttl
      # is intentionally short (the store is purely a cross-span join
      # cache for matching client / server pairs, and CH-call spans don't
      # have a server-side sibling — every edge resolves on the client
      # span alone via peer.service).
      service_graph:
        latency_histogram_buckets: [100ms, 250ms, 1s, 5s, 10s]
        store:
          ttl: 2s
        metrics_flush_interval: 15s

    exporters:
      clickhouse:
        endpoint: tcp://clickhouse:9000?dial_timeout=10s
        database: otel
        username: cerberus
        password: cerberus
        ttl: 0
        create_schema: true
        logs_table_name: otel_logs
        traces_table_name: otel_traces
        metrics_table_name: otel_metrics
        timeout: 10s
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 5m
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000

    service:
      telemetry:
        logs:
          level: info
      pipelines:
        metrics:
          receivers: [otlp, k8s_cluster]
          processors: [memory_limiter, resource, batch]
          exporters: [clickhouse]
        logs:
          receivers: [otlp, k8s_events]
          processors: [memory_limiter, resource, batch]
          exporters: [clickhouse]
        # ClickHouse query log -> CH (tagged service.name=clickhouse so the
        # Loki head surfaces it as `{service_name="clickhouse"}`). Mirrors the
        # compose stack's logs/clickhouse pipeline; feeds the #908
        # loki_explore_columns Logs-Drilldown column gate on the k3d lane.
        logs/clickhouse:
          receivers: [sqlquery/clickhouse-logs]
          processors: [memory_limiter, resource/clickhouse, batch]
          exporters: [clickhouse]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          # `service_graph` is wired as an additional exporter on the
          # traces pipeline because, in connector wiring, a connector
          # plays the role of an exporter on the source pipeline-type
          # and a receiver on the destination pipeline-type. Spans
          # still flow to clickhouseexporter as before — the connector
          # is a tap, not a swap.
          exporters: [clickhouse, service_graph]
        # metrics/servicegraph receives the connector's derived
        # `traces_service_graph_*` series and ships them through the
        # same clickhouseexporter the normal metrics pipeline uses.
        # Cerberus's Prom head then queries them back out of CH so
        # Grafana's Tempo Service Graph tab can render edges.
        metrics/servicegraph:
          receivers: [service_graph]
          processors: [memory_limiter, batch]
          exporters: [clickhouse]
---
# Agent collector config (per-node DaemonSet):
# - kubeletstats scrape (node + pod + container metrics from the local
#   kubelet's /stats/summary endpoint)
# - filelog tails /var/log/pods/**/*.log (container stdout/stderr captured
#   by the kubelet's CRI log-rotation)
# - forwards everything to the gateway via OTLP/gRPC. The agent itself
#   does not talk to ClickHouse — the gateway is the single writer.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-agent-config
  namespace: cerberus
data:
  config.yaml: |
    receivers:
      kubeletstats:
        collection_interval: 20s
        auth_type: serviceAccount
        endpoint: ${env:K8S_NODE_NAME}:10250
        insecure_skip_verify: true
        metric_groups: [node, pod, container]
        extra_metadata_labels: [container.id, k8s.volume.type]
      filelog:
        include: [/var/log/pods/*/*/*.log]
        exclude: [/var/log/pods/cerberus_otel-collector*_*/*/*.log]
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # Parse the kubelet's CRI log line: "<ts> stdout F <body>".
          - type: regex_parser
            regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]+) ?(?P<log>.*)$'
            timestamp:
              parse_from: attributes.time
              layout_type: gotime
              layout: '2006-01-02T15:04:05.999999999Z07:00'
          # Pull pod/namespace/container out of the file path:
          # /var/log/pods/<namespace>_<pod>_<uid>/<container>/<n>.log
          - type: regex_parser
            parse_from: attributes["log.file.path"]
            regex: '^/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_(?P<uid>[^/]+)/(?P<container>[^/]+)/'
          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]
          - type: move
            from: attributes.pod
            to: resource["k8s.pod.name"]
          - type: move
            from: attributes.container
            to: resource["k8s.container.name"]
          - type: move
            from: attributes.uid
            to: resource["k8s.pod.uid"]
          # Promote the CRI `log` capture group to the record Body and
          # drop the CRI transport artifacts. Without the move, Body
          # keeps the RAW kubelet line ("<ts> stdout F <line>") and the
          # actual log line rides as the `log` record attribute — which
          # the OTel-CH exporter lands in LogAttributes, where Loki-side
          # tooling (Logs Drilldown's fields tab via /detected_fields)
          # surfaces it as a bogus structured-metadata field named
          # `log`. That field's breakdown queries can never match
          # (crawl run 27327766381: fields/log + field/log panels
          # rendered "No data" on the cerberus-otel-agent service).
          # The standard k8s collector shape (the contrib `container`
          # parser / helm chart preset) puts the line in Body and
          # carries no `log` attribute — mirror that. `stream` and
          # `logtag` are likewise CRI framing, not log content; drop
          # them (and the already-consumed file-path attribute) so the
          # tailed records carry no incidental structured metadata.
          - type: move
            from: attributes.log
            to: body
          - type: remove
            field: attributes.stream
          - type: remove
            field: attributes.logtag
          - type: remove
            field: attributes["log.file.path"]

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        send_batch_size: 1024
        timeout: 5s
      resource:
        attributes:
          - key: k8s.node.name
            value: ${env:K8S_NODE_NAME}
            action: upsert
          - key: service.name
            value: cerberus-otel-agent
            action: insert
          - key: deployment.environment
            value: e2e
            action: upsert

    exporters:
      otlp:
        endpoint: otel-collector-gateway:4317
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 5m
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000

    service:
      telemetry:
        logs:
          level: info
      pipelines:
        metrics:
          receivers: [kubeletstats]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp]
        logs:
          receivers: [filelog]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp]
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-gateway
  namespace: cerberus
  labels:
    app: otel-collector
    role: gateway
spec:
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
  selector:
    app: otel-collector
    role: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-gateway
  namespace: cerberus
  labels:
    app: otel-collector
    role: gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: otel-collector
      role: gateway
  template:
    metadata:
      labels:
        app: otel-collector
        role: gateway
    spec:
      serviceAccountName: otel-collector
      initContainers:
        # The clickhouseexporter runs `create database` at Start() and the
        # collector exits 1 if ClickHouse can't serve a query then — a boot-order
        # race that BackOff-loops the gateway and cascades the sample-apps into
        # FATAL (#82: "telemetrygen FATALs if otel-collector-gateway not ready").
        # Block until ClickHouse can EXECUTE AN AUTHENTICATED QUERY, not merely
        # accept a TCP connection: CH opens native 9000 early in boot, before
        # the query engine is ready. The probe MUST authenticate as the
        # configured cerberus user (CLICKHOUSE_USER/PASSWORD) the same way the
        # exporter does — an unauthenticated check is rejected and the init
        # loops forever (the default user is locked down when CLICKHOUSE_USER is
        # set). Use clickhouse-client over the native protocol — the exact path
        # the exporter's `create database` takes — so a green probe proves the
        # exporter's first Start() will succeed.
        - name: wait-for-clickhouse
          image: clickhouse/clickhouse-server:25.8-alpine
          command:
            - sh
            - -c
            - |
              until clickhouse-client --host clickhouse --port 9000 \
                  --user cerberus --password cerberus --query 'SELECT 1' >/dev/null 2>&1; do
                echo "waiting for clickhouse query engine (native SELECT 1) ..."
                sleep 2
              done
      containers:
        - name: collector
          # 0.152.1 mirrors the compose stack (docker-compose.yml). The
          # earlier 0.120.0 pin was the smallest bump past the v0.116.1
          # clickhouseexporter nil-deref on the servicegraph connector's
          # exemplar payload (sum_metrics.go:129); the underlying issue
          # is fixed in 0.152.1, which is why the previous
          # transform/servicegraph_drop_exemplars workaround was dropped
          # together with this bump.
          image: otel/opentelemetry-collector-contrib:0.152.1
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          env:
            - name: GOMEMLIMIT
              value: "400MiB"
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: otlp-grpc
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: otlp-grpc
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: otel-collector-gateway-config
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector-agent
  namespace: cerberus
  labels:
    app: otel-collector
    role: agent
spec:
  selector:
    matchLabels:
      app: otel-collector
      role: agent
  template:
    metadata:
      labels:
        app: otel-collector
        role: agent
    spec:
      serviceAccountName: otel-collector
      hostNetwork: false
      containers:
        - name: collector
          # Pinned to the same 0.152.1 tag as the gateway above to keep
          # the agent / gateway pair on a matching contrib release.
          image: otel/opentelemetry-collector-contrib:0.152.1
          args: ["--config=/etc/otel/config.yaml"]
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GOMEMLIMIT
              value: "200MiB"
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-agent-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: Directory
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
