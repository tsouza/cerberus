---
# Dashboard provider config — points Grafana at /var/lib/grafana/dashboards
# so any JSON dropped in that mount is loaded as a provisioned dashboard.
# Folder "Cerberus" groups the self-observability dashboard (and any future
# cerberus-shipped dashboards) under one top-level entry.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: cerberus
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: cerberus
        orgId: 1
        folder: Cerberus
        type: file
        disableDeletion: true
        editable: false
        updateIntervalSeconds: 30
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
# The dashboard JSON itself — sourced from
# test/e2e/grafana/dashboards/cerberus-self.json. Keep the two in sync; the
# repo file is the editable copy, the ConfigMap is the deployed copy.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cerberus-self
  namespace: cerberus
data:
  cerberus-self.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Cerberus self-observability. All panels query cerberus's own dogfood loop: cerberus -> OTLP -> Collector -> ClickHouse -> cerberus -> Grafana. Until the OTel collector service lands in the quickstart compose, the metric / log / trace panels here will render 'no data' rather than error out.",
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "cerberus-prometheus"
          },
          "description": "Per-second query rate seen by cerberus, broken down by upstream query language (PromQL / LogQL / TraceQL). Backed by the cerberus_queries_total counter.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "opacity",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "calcs": ["mean", "lastNotNull"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "cerberus-prometheus"
              },
              "editorMode": "code",
              "expr": "sum by (cerberus_ql) (rate(cerberus_queries_total[5m]))",
              "legendFormat": "{{cerberus_ql}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Query rate by language",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "cerberus-prometheus"
          },
          "description": "P95 query latency per head (PromQL / LogQL / TraceQL), computed from cerberus_queries_duration_seconds_bucket with histogram_quantile.",
