          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "cerberus-prometheus"
              },
              "editorMode": "code",
              "expr": "sum by (cerberus_ql, reason) (rate(cerberus_admit_rejected_total[5m]))",
