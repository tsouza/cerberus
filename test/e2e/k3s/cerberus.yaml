---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cerberus-config
  namespace: cerberus
data:
  CERBERUS_HTTP_ADDR: ":8080"
  CERBERUS_CH_ADDR: "clickhouse:9000"
  CERBERUS_CH_DATABASE: "otel"
  CERBERUS_CH_USERNAME: "cerberus"
  CERBERUS_CH_PASSWORD: "cerberus"
  CERBERUS_CH_DIAL_TIMEOUT: "10s"
  # Self-observability OTLP export — cerberus pushes its own metrics +
  # traces + logs to the in-cluster gateway, which forwards them to
  # ClickHouse via the clickhouseexporter. Reading those rows back
  # through cerberus closes the dogfood loop (see the "Cerberus self-
  # observability" Grafana dashboard in test/e2e/grafana/).
  #
  # Env var names MUST match internal/config.otlpFromEnv (`CERBERUS_OTLP_*`).
  # Earlier `CERBERUS_OTEL_*` spellings here were dead config — the binary
  # read empty values and silently fell back to the noop providers, so
  # `cerberus_queries_total` / `cerberus_queries_duration_seconds_*` never
  # reached CH and the cerberus dashboard panels collapsed to either
  # a single anonymous bucket or empty series (#214 / #215 N2 / N5 e2e
  # partition + histogram-completeness regression class).
  #
  # Empty CERBERUS_OTLP_ENDPOINT disables OTLP export entirely
  # (zero-collector binary).
  CERBERUS_OTLP_ENDPOINT: "otel-collector-gateway.cerberus.svc:4317"
  CERBERUS_OTLP_INSECURE: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: cerberus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  # replicas is intentionally omitted — the HorizontalPodAutoscaler in
  # cerberus-hpa.yaml owns this field. Setting it here would cause the
  # Deployment controller and the HPA to fight over the replica count
  # on every reconcile. The HPA's minReplicas (2) defines the floor.
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: cerberus
  template:
    metadata:
      labels:
        app: cerberus
    spec:
      containers:
        - name: cerberus
          # Image is built locally and imported into k3d via `just e2e-up`.
          # See Justfile's e2e-up recipe.
          image: cerberus:e2e
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cerberus-config
          env:
            # Go's GC doesn't see cgroup limits — GOMEMLIMIT keeps heap
            # pressure below the 512Mi ceiling so allocation bursts from
            # the heavy auto-discovered Playwright specs trigger GC
            # instead of the OOM killer; evidence run 27263112345
            # (cerberus pods OOMKilled exit 137 at the old 256Mi limit).
            - name: GOMEMLIMIT
              value: 400MiB
          resources:
            requests:
              # 250m so the scheduler weights cerberus fairly against
              # CH + the collector + the Playwright suite on a 4-vCPU
              # CI node. No CPU limit — bursting is fine; it's the
              # probe kills under starvation that hurt (see below).
              cpu: 250m
              memory: 128Mi
            limits:
              # 512Mi (was 256Mi): the Playwright dashboard sweep's
              # matrix specs buffer full query_range matrices per
              # request; run 27263112345 OOMKilled cerberus (exit 137)
              # at 256Mi while compose-side peak for light specs is
              # only ~73MiB. Paired with GOMEMLIMIT=400MiB above so the
              # Go heap backs off well before this ceiling.
              memory: 512Mi
          # /readyz pings ClickHouse (with a small TTL cache so this
          # probe doesn't hammer CH) and reports the auto-create-schema
          # invariant. A failure removes the pod from the Service
          # endpoints without restarting it — backpressure, not crash.
          #
          # Probe budgets are sized for a saturated CI node, not a
          # quiet cluster: /readyz pings a SHARED dependency, so when
          # the e2e suite drives CH hard every replica's probe slows
          # at once and a tight budget evicts ALL endpoints together —
          # Grafana then surfaces "dial tcp …:8080: connect:
          # connection refused" mid-sweep (nightly 27253909069 went
          # green only because Playwright retried past that window).
          # timeout 5s + 5 failures ≈ 15-21s of sustained CH
          # saturation before eviction; recovery stays fast via the
          # 3s period.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 5
            failureThreshold: 5
          # /healthz is intentionally dependency-free: a failure here
          # means the process is wedged and k8s should restart the pod.
          #
          # timeoutSeconds was previously unset — the k8s default is
          # 1s, a hair-trigger on a contended CI node: a CPU-starved
          # but healthy process missing three 1s probes got KILLED,
          # racking up restart counts / CrashLoopBackOff exactly while
          # the suite was load-bursting (the compose stack never saw
          # this — Docker doesn't kill on unhealthy). 5s × 6 failures
          # still restarts a genuinely wedged process within ~60s.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
