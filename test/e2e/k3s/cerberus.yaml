---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cerberus-config
  namespace: cerberus
data:
  CERBERUS_HTTP_ADDR: ":8080"
  CERBERUS_CH_ADDR: "clickhouse:9000"
  CERBERUS_CH_DATABASE: "otel"
  CERBERUS_CH_USERNAME: "cerberus"
  CERBERUS_CH_PASSWORD: "cerberus"
  CERBERUS_CH_DIAL_TIMEOUT: "10s"
  # Provision the OTel-CH schema at boot. The otel-collector's
  # clickhouseexporter (create_schema: true) also owns schema creation as
  # telemetry first flows, but that's gated on telemetry actually arriving —
  # a cold cluster has a window where the tables don't exist yet. Letting
  # cerberus apply the same idempotent DDL (CREATE TABLE IF NOT EXISTS) at
  # startup makes it ready promptly instead of waiting on the collector's
  # first export. The boot-time requirements check's absent-schema branch is
  # the real safety net (cerberus boots NOT READY and re-probes rather than
  # crash-looping when the schema is still missing — see internal/preflight);
  # auto-create here just shortens the not-ready window so the dashboard's
  # readiness wait doesn't ride the collector's timing.
  CERBERUS_AUTO_CREATE_SCHEMA: "true"
  # Self-observability OTLP export — cerberus pushes its own metrics +
  # traces + logs to the in-cluster gateway, which forwards them to
  # ClickHouse via the clickhouseexporter. Reading those rows back
  # through cerberus closes the dogfood loop (see the "Cerberus self-
  # observability" Grafana dashboard in test/e2e/grafana/).
  #
  # Env var names MUST match internal/config.otlpFromEnv (`CERBERUS_OTLP_*`).
  # Earlier `CERBERUS_OTEL_*` spellings here were dead config — the binary
  # read empty values and silently fell back to the noop providers, so
  # `cerberus_queries_total` / `cerberus_queries_duration_seconds_*` never
  # reached CH and the cerberus dashboard panels collapsed to either
  # a single anonymous bucket or empty series (#214 / #215 N2 / N5 e2e
  # partition + histogram-completeness regression class).
  #
  # Empty CERBERUS_OTLP_ENDPOINT disables OTLP export entirely
  # (zero-collector binary).
  CERBERUS_OTLP_ENDPOINT: "otel-collector-gateway.cerberus.svc:4317"
  CERBERUS_OTLP_INSECURE: "true"
  # Per-query sample budget (Prometheus --query.max-samples parity).
  # 5M samples × the cursor's interned per-row overhead sits
  # comfortably inside the 1Gi pod limit below; the binary default
  # (50M) mirrors Prometheus but assumes Prom's ~16-byte in-memory
  # samples, which cerberus rows (label-map-carrying) are not. A
  # query that crosses the budget gets the upstream-parity 422
  # errorType=execution rejection instead of OOMKilling the pod —
  # the query-of-death loop from run 27269987620.
  CERBERUS_QUERY_MAX_SAMPLES: "5000000"
  # Per-query ClickHouse memory cap (the `max_memory_usage` setting
  # chclient stamps on every data-plane query). The sample budget
  # above bounds cerberus-process memory; this bounds CLICKHOUSE-
  # process memory for a single query. Run 27277793810: the
  # iterate-time-ranges 24h/15s matrix tuple demanded 2.12 GiB inside
  # ClickHouse and tripped the server-total cap (1.80 GiB) mid-stream,
  # surfacing as a 502 errorType=internal. With the explicit 1 GiB
  # per-query cap the same tuple gets the deterministic 422
  # errorType=execution resource-exhausted rejection instead (the
  # pinned contract in iterate-time-ranges.spec.ts). Matches the
  # binary default — set explicitly for parity with docker-compose.yml
  # and so the cap survives a default change.
  CERBERUS_CH_QUERY_MAX_MEMORY: "1073741824"
  # Enable the gated net/http/pprof debug endpoints (/debug/pprof/*) on the
  # cerberus HTTP listener for the e2e lane ONLY. Off by default in every
  # production manifest; on here so the "Dump cluster state on failure" step
  # in .github/workflows/e2e.yml can `wget /debug/pprof/heap` from the
  # running cerberus container before teardown when a restart is detected —
  # the missing diagnostic that made the rc.5 OOM (run on the
  # ResourceAttributes-as-Prom-labels commit) opaque. A `--previous`
  # container log dump is empty for an OOMKill, so the live heap profile is
  # the only artifact that pinpoints which query shape blew the budget.
  CERBERUS_DEBUG_PPROF: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: cerberus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  # replicas is intentionally omitted — the HorizontalPodAutoscaler in
  # cerberus-hpa.yaml owns this field. Setting it here would cause the
  # Deployment controller and the HPA to fight over the replica count
  # on every reconcile. The HPA's minReplicas (2) defines the floor.
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: cerberus
  template:
    metadata:
      labels:
        app: cerberus
    spec:
      containers:
        - name: cerberus
          # Image is built locally and imported into k3d via `just e2e-up`.
          # See Justfile's e2e-up recipe.
          image: cerberus:e2e
          # Never, not IfNotPresent: this image exists ONLY via the k3d
          # import — there is no registry to fall back to. IfNotPresent
          # masked a silent import failure as a nonsense remote pull
          # ("pull access denied for docker.io/library/cerberus:e2e",
          # run 27274975563) and the pod sat in ImagePullBackOff. With
          # Never the failure is immediate and names the real problem:
          # the image is missing from the node.
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cerberus-config
          env:
            # Go's GC doesn't see cgroup limits — GOMEMLIMIT keeps heap
            # pressure below the cgroup ceiling so allocation bursts from
            # the heavy auto-discovered Playwright specs trigger GC
            # instead of the OOM killer. Evidence: run 27263112345
            # (OOMKilled exit 137 at 256Mi), then run 27269987620
            # superseding it — STILL OOMKilled at 512Mi/400MiB within
            # ~30s of start during the iterate-time-ranges (range,
            # step) matrix sweep, and again immediately on retry (a
            # query-of-death loop). The real demand is bounded by the
            # cursor's label-map interning + the CERBERUS_QUERY_MAX_
            # SAMPLES budget in the ConfigMap above.
            #
            # rc.5 bump (800MiB → 1228MiB, paired with the 1Gi → 1536Mi
            # limit below): the ResourceAttributes-as-Prom-labels feature
            # promotes OTel resource keys (k8s_namespace_name, k8s_pod_name,
            # k8s_node_name, service_instance_id, cloud_region, …) into every
            # series' label map. A chDB-backed handler benchmark
            # (BenchmarkResourceAttr_Range*, internal/api/prom) measured
            # ~+65% per-query heap with the merge ON vs OFF on a 7-resource-
            # key dataset — a GENUINE, GC-recoverable per-query cost that
            # scales with (scanned rows × resource-key count), not a leak.
            # The matrix-pivot memoisation in this PR claws back ~55% of the
            # transient label-map garbage (BenchmarkMatrixFromCursor_Memoised
            # vs _PerRow: 7.98MB → 3.59MB per pivot), but the larger retained
            # maps remain a real cost, so GOMEMLIMIT rises proportionally to
            # keep the GC reclaiming before the cgroup OOMs.
            - name: GOMEMLIMIT
              value: 1228MiB
          resources:
            requests:
              # 250m so the scheduler weights cerberus fairly against
              # CH + the collector + the Playwright suite on a 4-vCPU
              # CI node. No CPU limit — bursting is fine; it's the
              # probe kills under starvation that hurt (see below).
              cpu: 250m
              memory: 128Mi
            limits:
              # 1536Mi (was 1Gi, was 512Mi, was 256Mi): the Playwright
              # dashboard sweep's matrix specs buffer full query_range
              # matrices per request. Run 27263112345 OOMKilled cerberus
              # (exit 137) at 256Mi; run 27269987620 (superseding) OOMKilled
              # again at 512Mi + GOMEMLIMIT=400MiB during the
              # iterate-time-ranges sweep. The fix is two-sided: the
              # chclient cursor interns per-series label maps and enforces
              # CERBERUS_QUERY_MAX_SAMPLES (ConfigMap above), and this limit
              # right-sizes the pod for the bounded demand.
              #
              # The rc.5 ResourceAttributes-as-Prom-labels feature
              # OOMKilled the pod again (2 restarts) on the nightly run for
              # commit 44c2630f: promoting OTel resource keys into every
              # series' label map raised per-query heap ~65% (measured —
              # see GOMEMLIMIT above), a real bounded cost. 1536Mi gives the
              # heavier bounded workload honest headroom; GOMEMLIMIT=1228MiB
              # (~80%) above keeps the Go heap backing off before this
              # ceiling. Operators promoting many high-cardinality resource
              # keys should size memory accordingly or trim the set via
              # CERBERUS_PROM_RESOURCE_LABELS (see docs/operations.md).
              memory: 1536Mi
          # /readyz pings ClickHouse (with a small TTL cache so this
          # probe doesn't hammer CH) and reports the auto-create-schema
          # invariant. A failure removes the pod from the Service
          # endpoints without restarting it — backpressure, not crash.
          #
          # Probe budgets are sized for a saturated CI node, not a
          # quiet cluster: /readyz pings a SHARED dependency, so when
          # the e2e suite drives CH hard every replica's probe slows
          # at once and a tight budget evicts ALL endpoints together —
          # Grafana then surfaces "dial tcp …:8080: connect:
          # connection refused" mid-sweep (nightly 27253909069 went
          # green only because Playwright retried past that window).
          # timeout 5s + 5 failures ≈ 15-21s of sustained CH
          # saturation before eviction; recovery stays fast via the
          # 3s period.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 5
            failureThreshold: 5
          # /healthz is intentionally dependency-free: a failure here
          # means the process is wedged and k8s should restart the pod.
          #
          # timeoutSeconds was previously unset — the k8s default is
          # 1s, a hair-trigger on a contended CI node: a CPU-starved
          # but healthy process missing three 1s probes got KILLED,
          # racking up restart counts / CrashLoopBackOff exactly while
          # the suite was load-bursting (the compose stack never saw
          # this — Docker doesn't kill on unhealthy). 5s × 6 failures
          # still restarts a genuinely wedged process within ~60s.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
