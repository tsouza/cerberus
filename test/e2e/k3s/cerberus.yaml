---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cerberus-config
  namespace: cerberus
data:
  CERBERUS_HTTP_ADDR: ":8080"
  CERBERUS_CH_ADDR: "clickhouse:9000"
  CERBERUS_CH_DATABASE: "otel"
  CERBERUS_CH_USERNAME: "cerberus"
  CERBERUS_CH_PASSWORD: "cerberus"
  CERBERUS_CH_DIAL_TIMEOUT: "10s"
  # Self-observability OTLP export — cerberus pushes its own metrics +
  # traces + logs to the in-cluster gateway, which forwards them to
  # ClickHouse via the clickhouseexporter. Reading those rows back
  # through cerberus closes the dogfood loop (see the "Cerberus self-
  # observability" Grafana dashboard in test/e2e/grafana/).
  #
  # Env var names MUST match internal/config.otlpFromEnv (`CERBERUS_OTLP_*`).
  # Earlier `CERBERUS_OTEL_*` spellings here were dead config — the binary
  # read empty values and silently fell back to the noop providers, so
  # `cerberus_queries_total` / `cerberus_queries_duration_seconds_*` never
  # reached CH and the cerberus dashboard panels collapsed to either
  # a single anonymous bucket or empty series (#214 / #215 N2 / N5 e2e
  # partition + histogram-completeness regression class).
  #
  # Empty CERBERUS_OTLP_ENDPOINT disables OTLP export entirely
  # (zero-collector binary).
  CERBERUS_OTLP_ENDPOINT: "otel-collector-gateway.cerberus.svc:4317"
  CERBERUS_OTLP_INSECURE: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: cerberus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerberus
  namespace: cerberus
  labels:
    app: cerberus
spec:
  # replicas is intentionally omitted — the HorizontalPodAutoscaler in
  # cerberus-hpa.yaml owns this field. Setting it here would cause the
  # Deployment controller and the HPA to fight over the replica count
  # on every reconcile. The HPA's minReplicas (2) defines the floor.
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: cerberus
  template:
    metadata:
      labels:
        app: cerberus
    spec:
      containers:
        - name: cerberus
          # Image is built locally and imported into k3d via `just e2e-up`.
          # See Justfile's e2e-up recipe.
          image: cerberus:e2e
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: cerberus-config
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
          # /readyz pings ClickHouse (with a small TTL cache so this
          # probe doesn't hammer CH) and reports the auto-create-schema
          # invariant. A failure removes the pod from the Service
          # endpoints without restarting it — backpressure, not crash.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            timeoutSeconds: 2
          # /healthz is intentionally dependency-free: a failure here
          # means the process is wedged and k8s should restart the pod.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
