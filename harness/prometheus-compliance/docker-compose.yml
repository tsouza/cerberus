# Docker Compose stack for the PromQL compatibility harness.
#
# Services:
#   clickhouse    OTel-schema CH instance (auth: cerberus/cerberus, db: otel)
#   prometheus    reference Prom, listens on :29090 (matches test-cerberus.yml)
#   cerberus      cerberus under test, listens on :29091 (matches
#                 test-cerberus.yml)
#
# Seeding is no longer a compose service — the fixture is loaded by
# `go run ./harness/prometheus-compliance/cmd/seed/` invoked from
# scripts/run-compatibility.sh. The seeder reuses internal/schema/ddl so
# the harness schema can't drift from cerberus's own DDL.
#
# Usage:
#   ./scripts/run-compatibility.sh
# or:
#   docker compose up --wait
#   go run ./harness/prometheus-compliance/cmd/seed/
#   ../upstream/promql/cmd/promql-compliance-tester ...
#   docker compose down -v

name: cerberus-compatibility

services:
  clickhouse:
    # Use the Ubuntu-base image, NOT -alpine. Per PR #245's finding,
    # `clickhouse/clickhouse-server:24.8-alpine` on GH Actions runners
    # stalls in the entrypoint script for 5+ min (never starts the
    # server, never binds 8123). The Ubuntu-base variant boots in
    # ~10-20s on the same runners. A future maintainer: do not
    # innocently switch back to -alpine here without re-validating
    # against the GH-runner musl/scheduling regression.
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: cerberus
      CLICKHOUSE_PASSWORD: cerberus
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      # `clickhouse-client --query 'SELECT 1'` is more reliable than
      # `wget /ping`: the HTTP listener (:8123) binds slightly before
      # the SQL engine is ready to answer queries. Talking SQL over the
      # local unix socket as the default user proves end-to-end
      # readiness (matches the pattern PR #245 used for startup-bench).
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 36
      start_period: 30s
    ports:
      - "29000:9000"
      - "28123:8123"

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --web.listen-address=:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "29090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 2s
      timeout: 2s
      retries: 30

  cerberus:
    image: cerberus:compatibility
    build:
      context: ../..
      dockerfile: Dockerfile.local
    environment:
      CERBERUS_HTTP_ADDR: ":29091"
      CERBERUS_CH_ADDR: "clickhouse:9000"
      CERBERUS_CH_DATABASE: "otel"
      CERBERUS_CH_USERNAME: "cerberus"
      CERBERUS_CH_PASSWORD: "cerberus"
      CERBERUS_CH_DIAL_TIMEOUT: "10s"
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "29091:29091"
    healthcheck:
      test: ["CMD", "/usr/local/bin/cerberus", "--version"]
      interval: 2s
      timeout: 2s
      retries: 30

