# Cerberus overlay for the vendored grafana/loki:pkg/logql/bench corpus.
#
# This file lives OUTSIDE harness/loki-compatibility/upstream/loki-bench/ so
# cerberus-side curation doesn't leak into the AGPL-3.0 vendor subtree.
#
# Schema (mirrors prometheus/compliance's test-queries.yml posture):
#
#   should_skip:
#     - source: "<suite>/<file>.yaml#<description>"
#       reason: "free-form English; cite roadmap milestone or upstream issue"
#       since:  "<YYYY-MM-DD>"  # when the skip was added; for drift audits
#       jira:   "<roadmap-ref>" # optional, e.g. "RC2 R2.x" or "#<PR>"
#
#   should_fail:
#     # Same shape; for queries we EXPECT to round-trip but want to track
#     # as known-broken. Initially unused.
#
# Suites covered by `<suite>/` (per docs/loki-compliance-plan.md PR 6):
#
#   - fast/        — vendored verbatim in PR 2; selector-vocabulary skips
#                    documented since 2026-05-15 pending a future seed
#                    expansion.
#   - regression/  — vendored in PR 6 (this file). Every entry uses
#                    features cerberus has not yet shipped
#                    (`| unwrap`,
#                    `sum_over_time` / `avg_over_time` /
#                    `min_over_time` / `max_over_time` /
#                    `quantile_over_time` / `stddev_over_time`,
#                    range-aggregation `by`/`without` grouping,
#                    numeric label filters, `detected_level` structured
#                    metadata filtering). `| logfmt`, `| json`, and
#                    `| regexp` parser stages are all supported now;
#                    skipped entries that mention them cite the *other*
#                    blocker in the same pipeline.
#                    All are listed below.
#   - exhaustive/  — vendored in PR 6 (this file). Same posture: every
#                    entry leans on a feature still in flight.
#
# Maintenance:
#
#   - Reviewers add an entry when a vendored query exercises a LogQL
#     feature cerberus hasn't shipped, OR when the runner surfaces a
#     persistent diff vs the reference Loki on a feature roadmap.md
#     deferred.
#   - Empty should_skip / should_fail are fine. The runner consumes
#     this overlay via `--overlay harness/loki-compatibility/cerberus-test-queries.yml`
#     (wired in PR 5's cerberus-owned compliance tester). Each matched
#     entry suppresses the case before it hits the wire and records the
#     reason in the result row's `skipReason` field.
#   - When a query's status changes (e.g. cerberus implements the
#     feature), drop the entry and let CI verify the diff is clean.
#   - On every Loki tag bump (see ../README.md "Bump procedure"),
#     re-validate the `source:` paths point at queries that still exist.

# Why parts of the corpus remain skipped:
#
#   The fast/ basic-selector and simple-metrics (count_over_time, count
#   with line filter) entries were unskipped after the seed expansion added
#   multi-label streams, structured metadata, and multi-format log lines.
#   The remaining fast/ entries require the `detected_level` structured-
#   metadata label filter, which cerberus has not yet shipped.
#   The regression/ + exhaustive/ slices exercise LogQL features
#   cerberus has not yet shipped:
#
#     - `| unpack` / `| pattern` — post-fetch (cerberus supports parse-only)
#     - `| line_format` / `| label_format` — landed via #128/#130
#     - `| decolorize` — landed
#     - `| logfmt` / `| json` / `| regexp` (bare + typed) — landed
#       parser stages; entries mentioning them below are blocked by
#       *other* features in the same pipeline.
#     - `| drop` / `| keep` — landed as post-fetch label projection
#     - numeric / duration / bytes label filters — open (parser-extracted typed values)
#     - `unwrap` based range aggregations
#       (sum_over_time, avg_over_time, max_over_time, min_over_time,
#       stddev_over_time, stdvar_over_time, quantile_over_time, first_over_time,
#       last_over_time) — open
#     - `by`/`without` grouping on range aggregations — open
#     - `detected_level` structured-metadata label filter — open
#
# Resolution path:
#
#   - PR 6 vendors the regression/ + exhaustive/ subdirs verbatim and
#     enrolls every entry into should_skip below, citing the specific
#     blocker. As cerberus ships each LogQL feature, entries get dropped
#     (or rewritten with a tighter rationale if a residual gap remains).
#   - The seed expansion (PR 7+) now writes multi-label streams with
#     JSON/logfmt/unstructured lines, structured metadata (detected_level),
#     and error keywords (failed/refused). Entries that only needed
#     matching selectors have been unskipped.

