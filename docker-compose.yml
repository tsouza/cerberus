# One-command local dev stack for cerberus.
#
#   docker compose up --wait
#   open http://localhost:3000   # Grafana (admin/admin)
#
# Services:
#   clickhouse      single-node CH server, OTel-aware (db=otel,
#                   user/pass=cerberus). Named volume `clickhouse-data`
#                   survives `docker compose down` so cerberus's
#                   accumulated self-telemetry survives restarts. Use
#                   `down -v` to wipe.
#   otel-collector  OpenTelemetry Collector configured for the compose
#                   stack (OTLP gRPC :4317 in, clickhouseexporter out).
#                   Closes the dogfood loop: cerberus emits self-telemetry
#                   over OTLP -> collector writes to ClickHouse -> cerberus
#                   queries it back through its own Prom/Loki/Tempo APIs.
#                   Config: test/e2e/otel-collector/compose-config.yaml.
#   cerberus        built from the repo-root `Dockerfile.local` (same image
#                   the k3d E2E uses). Auto-creates the OTel-CH schema on
#                   startup via CERBERUS_AUTO_CREATE_SCHEMA=true, so no
#                   separate init job. Exports OTLP to `otel-collector:4317`.
#                   Cerberus's own self-telemetry (metrics + logs + traces)
#                   is the sole data source for the quickstart: it flows
#                   cerberus -> otel-collector -> ClickHouse -> back into
#                   cerberus via its own Prom/Loki/Tempo heads, populating
#                   the provisioned dashboard within a minute of stack start.
#   grafana         pre-provisioned with cerberus as three datasources
#                   (Prometheus / Loki / Tempo) and the `cerberus`
#                   dashboard (self-obs; set as home dashboard) under the
#                   "Cerberus" folder. Provisioning files live under
#                   `test/e2e/grafana/compose/`.
#
# Default host port map:
#   3000  -> grafana
#   8080  -> cerberus (Prom + Loki + Tempo HTTP APIs)
#   8123  -> clickhouse HTTP
#   9000  -> clickhouse native protocol
#   (otel-collector's OTLP port :4317 stays on the cerberus-dev network;
#   no host port mapping needed since only the cerberus container talks
#   to it.)

name: cerberus

networks:
  cerberus-dev:
    driver: bridge

volumes:
  clickhouse-data:

services:
  clickhouse:
    # Use the Ubuntu-base image, NOT -alpine. Per PR #245's finding on
    # the startup-bench job and PR #297's fix for the compatibility
    # harnesses, `clickhouse/clickhouse-server:24.8-alpine` stalls in the
    # entrypoint script for 5+ min (create-user → restart sequence never
    # completes, port 8123 never binds). The Ubuntu-base variant boots in
    # ~10-20s on the same hosts. A future maintainer: do NOT innocently
    # switch back to -alpine without re-validating against the musl /
    # scheduling regression that bit #245.
    image: clickhouse/clickhouse-server:24.8
    networks: [cerberus-dev]
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: cerberus
      CLICKHOUSE_PASSWORD: cerberus
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      # `clickhouse-client --query 'SELECT 1'` is more reliable than
      # `wget /ping`: the HTTP listener (:8123) binds slightly before
      # the SQL engine is ready to answer queries. Talking SQL over the
      # local unix socket as the default user proves end-to-end
      # readiness (mirrors compatibility/{prometheus,loki,tempo} after
      # PR #297). start_period + retries cover the entrypoint's
      # create-user → restart sequence on first boot.
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 36
      start_period: 30s

  otel-collector:
    # Pinned to the same upstream-contrib release the k3d E2E uses
    # (test/e2e/k3s/otel-collector.yaml). Bump both together.
    #
    # No `healthcheck:` block: the contrib image is FROM scratch — no
    # shell, no wget, no curl, no nc — so the standard HTTP/TCP probe
    # commands are not callable. Cerberus's OTLP exporter retries in
    # the background, so a slow-starting collector won't fail
    # cerberus's own startup. `condition: service_started` on the
    # cerberus dependency below is sufficient; the OTel demo's compose
    # stack uses the same pattern.
    image: otel/opentelemetry-collector-contrib:0.152.1
    networks: [cerberus-dev]
    command: ["--config=/etc/otel/config.yaml"]
    # The hostmetricsreceiver inside compose-config.yaml reads /proc + /sys
    # to derive system_cpu_* / system_memory_* / system_disk_* / etc. From
    # inside the container those paths reflect the container's PID/cgroup
    # namespace — that's not the picture the quickstart promises. Bind the
    # host's /proc, /sys, and root filesystem under /hostfs (ro,rslave so
    # mount propagation changes on the host are picked up but the collector
    # can never write back), and point the receiver at them via HOST_PROC /
    # HOST_SYS / HOST_ETC + the `root_path: /hostfs` knob in
    # test/e2e/otel-collector/compose-config.yaml. Same mount-shape the
    # upstream contrib docs prescribe for hostmetrics in docker-compose.
    volumes:
      - ./test/e2e/otel-collector/compose-config.yaml:/etc/otel/config.yaml:ro
      - /proc:/hostfs/proc:ro,rslave
      - /sys:/hostfs/sys:ro,rslave
      - /:/hostfs:ro,rslave
    environment:
      # Mirror the k3d gateway's memory cap so a misbehaving exporter
      # backlog can't push the collector OOMKill in the dev stack.
      GOMEMLIMIT: "400MiB"
      # Redirect hostmetricsreceiver's /proc + /sys + root reads to the
      # bind-mounted host filesystem above. Paired with `root_path:
      # /hostfs` in compose-config.yaml — the receiver honours both the
      # per-scraper HOST_PROC / HOST_SYS / HOST_ETC env vars (process,
      # cpu, memory, paging scrapers) and the root_path knob (filesystem
      # + disk scrapers that walk the full tree).
      HOST_PROC: /hostfs/proc
      HOST_SYS: /hostfs/sys
      HOST_ETC: /hostfs/etc
    depends_on:
      clickhouse:
        condition: service_healthy

  seed:
    # Deterministic fixture seeder — the same test/e2e/seed program the
    # k3d E2E runs via `just e2e-seed`, in rolling re-seed mode (30 s
    # ticks). The dogfood self-telemetry loop populates the ops-family
    # dashboards, but the showcase-* dashboards need data SHAPES the
    # self-telemetry can't guarantee deterministically: counter resets
    # (`resets()`), flapping gauges (`changes()`), multi-key label sets
    # (`label_join` / `count_values`), and exponential histograms
    # (native `histogram_quantile`). The seeder's ddl.Apply is the same
    # CREATE IF NOT EXISTS set cerberus's CERBERUS_AUTO_CREATE_SCHEMA
    # applies, so the startup race between the two is idempotent.
    image: cerberus-seed:dev
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.local
      target: seed
    networks: [cerberus-dev]
    environment:
      CH_ADDR: "clickhouse:9000"
      CH_DATABASE: "otel"
      CH_USERNAME: "cerberus"
      CH_PASSWORD: "cerberus"
    command: ["--re-seed-interval=30s"]
    depends_on:
      clickhouse:
        condition: service_healthy

  cerberus:
    image: cerberus:dev
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.local
    networks: [cerberus-dev]
    environment:
      # CERBERUS_HTTP_ADDR    HTTP listen addr for Prom/Loki/Tempo APIs.
      CERBERUS_HTTP_ADDR: ":8080"
      # CERBERUS_CH_*         ClickHouse connection inputs.
      CERBERUS_CH_ADDR: "clickhouse:9000"
      CERBERUS_CH_DATABASE: "otel"
      CERBERUS_CH_USERNAME: "cerberus"
      CERBERUS_CH_PASSWORD: "cerberus"
      CERBERUS_CH_DIAL_TIMEOUT: "10s"
      # CERBERUS_AUTO_CREATE_SCHEMA   apply the OTel-CH DDL on startup so a
      # fresh CH volume is queryable without a separate migration step.
      CERBERUS_AUTO_CREATE_SCHEMA: "true"
      # CERBERUS_OTLP_*       export self-telemetry (metrics + logs +
      # traces) to the in-stack OTel Collector over OTLP/gRPC. Closes
      # the dogfood loop: cerberus emits -> collector writes to CH ->
      # cerberus queries it back through its own APIs. Insecure is
      # safe inside the cerberus-dev docker network.
      CERBERUS_OTLP_ENDPOINT: "otel-collector:4317"
      CERBERUS_OTLP_INSECURE: "true"
      # CERBERUS_CH_QUERY_MAX_MEMORY   per-query ClickHouse memory cap
      # (`max_memory_usage` on every data-plane query). 1 GiB, matching
      # the binary default and the k3d stack
      # (test/e2e/k3s/cerberus.yaml) — set explicitly for stack parity.
      # A query over the cap gets a deterministic resource-exhausted
      # rejection (prom 422 / loki 400 / tempo 422) instead of racing
      # ClickHouse's server-total cap into a mid-stream 502 (k3d run
      # 27277793810).
      CERBERUS_CH_QUERY_MAX_MEMORY: "1073741824"
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector:
        # service_started — the contrib image is FROM scratch with no
        # probe binaries, so a real healthcheck isn't expressible.
        # Cerberus's OTLP gRPC exporter retries in the background, so
        # racing the collector start at boot is safe.
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      # Distroless image has no shell or wget. Use the cerberus binary's
      # own `--version` flag as a liveness signal until /readyz lands and
      # we can shell out to a probe sidecar.
      test: ["CMD", "/usr/local/bin/cerberus", "--version"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 5s

  grafana:
    image: grafana/grafana:12.2.9
    networks: [cerberus-dev]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Anonymous-Admin + disabled login form means the user opens
      # http://localhost:3000 and lands directly on the home dashboard
      # with full edit rights — no admin/admin prompt to navigate.
      # Basic auth is also disabled because Grafana 11+ still emits a
      # `WWW-Authenticate: Basic` challenge header on some routes when
      # basic auth is enabled (even with the form disabled) — browsers
      # then pop their native credentials modal. Killing basic auth
      # removes that prompt entirely. API automation in this stack
      # uses Grafana service accounts / API keys, not basic auth, so
      # nothing else depends on it. The signout menu is hidden so the
      # in-browser session can't accidentally drop to a "logged out"
      # state with no way back in.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "true"
      GF_USERS_DEFAULT_THEME: dark
      # Land directly on the cerberus dashboard instead of an empty
      # home page. Path is the in-container mount location of the JSON,
      # not a Grafana URL or UID.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/cerberus/cerberus.json
    volumes:
      - ./test/e2e/grafana/compose/datasources:/etc/grafana/provisioning/datasources:ro
      # Dashboard provider config tells Grafana to scan the `cerberus`
      # subdir for JSON dashboards; the dashboards themselves live one
      # level down so the provider's `path:` matches the mount point.
      - ./test/e2e/grafana/compose/dashboards-provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml:ro
      - ./test/e2e/grafana/compose/dashboards:/etc/grafana/provisioning/dashboards/cerberus:ro
    ports:
      - "3000:3000"
    depends_on:
      cerberus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 12

