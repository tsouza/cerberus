# versions.yaml - the single source of truth for the ClickHouse versions
# cerberus's deployment surface depends on. These values are otherwise
# scattered across the docker-compose quickstart, the compatibility / e2e
# lanes, the preflight floor, and the chDB test substrate; pinning them here
# keeps them from drifting apart.
#
# PER-FEATURE VERSION FLOORS LIVE ELSEWHERE. The minimum ClickHouse version
# each optimization needs (aggregation_in_order 24.8, condition_cache 25.3,
# ts_grid_range / ts_grid_resample 25.9, columnar_result_decode none) is owned
# by internal/chopt/registry.go and MUST NOT be duplicated here - that registry
# stays the source of truth for feature floors. The version-consistency check
# (.github/scripts/clickhouse-version-sync.mjs) DERIVES the highest enabled
# floor from that registry and asserts the quickstart is new enough; it does
# not re-pin the floors.
#
# THE RULE: when a new optimization's floor exceeds quickstart_clickhouse, bump
# quickstart_clickhouse (and the docker-compose / compatibility image tags it
# pins) to a version that supports it, and update this file. See
# docs/optimization-rules.md (Rule 1, step 4). The check below gates this.
#
# Versions are major.minor only (ClickHouse feature availability lands at
# minor-version granularity; patch / build suffixes are dropped everywhere).

# min_clickhouse - the supported / CI-tested ClickHouse floor: the lowest
# version the SQL cerberus emits is correct on. MUST equal internal/preflight
# minCHBase (the boot-time requirements check rejects anything older).
min_clickhouse: "24.8"

# min_native_rate - the floor the native timeSeries*ToGrid family was
# introduced at. Only applies when an experimental native-rate feature is
# enabled, which raises the effective preflight floor to max(min_clickhouse,
# min_native_rate). MUST equal internal/preflight minCHNativeRate. Informational
# here; the registry (ts_grid_range / ts_grid_resample = 25.9) is its SoT for
# the per-feature gate.
min_native_rate: "25.9"

# quickstart_clickhouse - the ClickHouse image tag the root docker-compose.yml
# quickstart ships. It MUST be new enough to actually demo every optimization
# the quickstart enables via CERBERUS_CH_OPTIMIZATIONS (today:
# aggregation_in_order, condition_cache, ts_grid_range -> highest floor 25.9).
# The check asserts quickstart_clickhouse >= that derived highest floor.
quickstart_clickhouse: "26.6"

# chdb_substrate - the ClickHouse version of the test substrate: the in-process
# chDB engine (libchdb / chdb-go) the parity + perf suites run on, and the tag
# the compatibility (prometheus / loki / tempo) and e2e ClickHouse services
# pin. The differential harnesses are the source of truth for all three heads,
# so this is the version the validated SQL is actually exercised on.
chdb_substrate: "26.5"
