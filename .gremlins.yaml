silent: false
mutants:
  arithmetic-base:
    enabled: true
  conditionals-boundary:
    enabled: true
  conditionals-negation:
    enabled: true
  increment-decrement:
    enabled: true
  invert-assignments:
    enabled: true
  invert-bitwise:
    enabled: true
  invert-bitwise-assignments:
    enabled: true
  invert-logical:
    enabled: true
  invert-loop-ctrl:
    enabled: true
  invert-negatives:
    enabled: true
  remove-self-assignments:
    enabled: true
test:
  timeout-coefficient: 4
excluded-files:
  - "**/*_test.go"
  - "internal/api/**"
  - "cmd/**"
  - "**/doc.go"

# Phased mutation-testing rollout. Each phase scopes gremlins to one
# package with its own `--threshold-efficacy` bar enforced in
# `.github/workflows/mutation.yml`. Bars are set roughly 4-15
# percentage points below the observed nightly kill rate, so the bar
# is a meaningful gate (a real test-quality regression breaks the
# build) without flapping on legitimate run-to-run variance.
#
#   Phase 1: internal/chplan       @ 90% — was 80% (nightly: ~95%)
#   Phase 2: internal/chsql        @ 85% — was 75% (nightly: ~88%)
#   Phase 3: internal/optimizer    @ 85% — was 70% (nightly: ~91%)
#   Phase 4: internal/promql       @ 85% — was 65% (nightly: ~94%)
#            internal/logql        @ 85% — was 65% (nightly: ~94%)
#            internal/traceql      @ 85% — was 65% (nightly: 100%)
#   Phase 5: internal/qlcommon     @ 75% — new (label_replace template)
#
# See `docs/test-strategy.md` § "Gremlins phased rollout" for the
# rationale + the actual-vs-bar table.
#
# Promotion to a required CI gate happens after all phases stay
# stable for a week.
#
# The thresholds below are GLOBAL (gremlins v0.6.0 does not support
# per-package thresholds — see `gremlins unleash --help`). The
# per-phase bar is enforced in `.github/workflows/mutation.yml` via a
# matrix that runs `gremlins unleash --threshold-efficacy <bar>
# ./internal/<pkg>/...` once per phase, scoped to a single package
# at a time so the slower packages don't drag the bar down. The
# values below are the floor for the unscoped whole-repo
# `just mutate` invocation; the per-phase matrix entries are
# informational until all phases stay green for a week.
threshold-efficacy: 85
threshold-mcover: 50
