silent: false
mutants:
  arithmetic-base:
    enabled: true
  conditionals-boundary:
    enabled: true
  conditionals-negation:
    enabled: true
  increment-decrement:
    enabled: true
  invert-assignments:
    enabled: true
  invert-bitwise:
    enabled: true
  invert-bitwise-assignments:
    enabled: true
  invert-logical:
    enabled: true
  invert-loop-ctrl:
    enabled: true
  invert-negatives:
    enabled: true
  remove-self-assignments:
    enabled: true
  remove-statement:
    enabled: true
test:
  timeout-coefficient: 4
excluded-files:
  - "**/*_test.go"
  - "internal/api/**"
  - "cmd/**"
  - "**/doc.go"

# Phased mutation-testing rollout. Layer 3 (PR #247) added ~125
# invariant tests across internal/chplan, so chplan was the first
# package dense enough to meet an 80% efficacy bar. The other
# kill-zone packages onboard once their coverage catches up:
#
#   Phase 1 (PR #260):      internal/chplan       @ 80% efficacy — ROLLED OUT
#   Phase 2 (PR #268):      internal/chsql        @ 75% efficacy — ROLLED OUT
#   Phase 3 (PR #273):      internal/optimizer    @ 70% efficacy — ROLLED OUT
#                           (Layer 4 chDB property tests landed via #266)
#   Phase 4 (PR #273):      QL parsers + lower    @ 65% efficacy — ROLLED OUT
#                           (Layer 2b lowering coverage landed)
#
# Promotion to a required CI gate happens after all four phases stay
# stable for a week.
#
# The thresholds below are GLOBAL (gremlins v0.6.0 does not support
# per-package thresholds — see `gremlins unleash --help`). The
# per-phase bar is enforced in `.github/workflows/mutation.yml` via a
# matrix that runs `gremlins unleash --threshold-efficacy <bar>
# ./internal/<pkg>/...` once per phase, scoped to a single package
# at a time so the slower packages don't drag the bar down. The
# values below are the floor for the unscoped whole-repo
# `just mutate` invocation; the per-phase matrix entries are
# informational until all four phases stay green for a week.
threshold-efficacy: 80
threshold-mcover: 50
