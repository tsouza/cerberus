silent: false
mutants:
  arithmetic-base:
    enabled: true
  conditionals-boundary:
    enabled: true
  conditionals-negation:
    enabled: true
  increment-decrement:
    enabled: true
  invert-assignments:
    enabled: true
  invert-bitwise:
    enabled: true
  invert-bwassign:
    enabled: true
  invert-logical:
    enabled: true
  invert-loopctrl:
    enabled: true
  invert-negatives:
    enabled: true
  remove-self-assignments:
    enabled: true
test:
  timeout-coefficient: 4
excluded-files:
  - "**/*_test.go"
  - "internal/api/**"
  - "cmd/**"
  - "**/doc.go"
  # `internal/logql/dotted_labels.go` is structurally un-mutatable on
  # the ubuntu-latest runner (~7 GB RAM). Rounds 4-9 of PR #664 walked
  # the runner-budget knobs all the way down: workers=1, single-file
  # `--exclude-files` slice (the file is only ~7 KB but the OTel
  # dotted-label walker is the densest mutable surface in the
  # package — ~40 mutants). Even the standalone single-file slice
  # `phase4-logql-other-c` still received SIGTERM at ~3 min, having
  # processed ~40 mutants of the file with every emitted mutant
  # KILLED (0 LIVED). The bottleneck is cumulative gremlins-driver
  # RSS plus each mutant's full `go test ./internal/logql` cycle
  # dragging the loki + prometheus + dskit + memberlist parser dep
  # graph through the linker — not the file itself. Until either
  # (a) gremlins exposes an incremental-test-binary mode that
  # skips re-linking per mutant, or (b) the lane moves to a larger
  # runner class, dotted_labels.go is excluded from gremlins runs.
  # The file is still covered by Layer-2 TXTAR fixtures and the
  # standalone unit tests in `dotted_labels_test.go`.
  - "internal/logql/dotted_labels.go"

# Phased mutation-testing rollout. Each phase scopes gremlins to one
# package with its own `--threshold-efficacy` bar enforced in
# `.github/workflows/mutation.yml`. All bars are set to 95% — the
# nightly runs have been clearing every phase for an extended period,
# so the floor is raised uniformly to the same target that gates
# every package, regardless of historical kill-rate variance.
#
#   Phase 1: internal/chplan       @ 95%
#   Phase 2: internal/chsql        @ 95%
#   Phase 3: internal/optimizer    @ 95%
#   Phase 4: internal/promql       @ 95%
#            internal/logql        @ 95%
#            internal/traceql      @ 95%
#   Phase 5: internal/qlcommon     @ 95%
#
# Note: the yaml keys `invert-bwassign` and `invert-loopctrl` above
# match gremlins v0.6.0's `MutantTypeEnabledKey` derivation (lowercase
# `mt.String()` with `_` → `-`). Earlier revisions of this file used
# `invert-bitwise-assignments` / `invert-loop-ctrl`, which gremlins
# silently ignored — those two mutators were defaults-off and thus
# never ran. Both are now enabled, surfacing extra mutants for
# `<<= |= &= ^=` and `break / continue` constructs.
#
# See `docs/test-strategy.md` § "Gremlins phased rollout" for the
# rationale + the actual-vs-bar table.
#
# Promotion to a required CI gate happens after all phases stay
# stable for a week.
#
# The thresholds below are GLOBAL (gremlins v0.6.0 does not support
# per-package thresholds — see `gremlins unleash --help`). The
# per-phase bar is enforced in `.github/workflows/mutation.yml` via a
# matrix that runs `gremlins unleash --threshold-efficacy <bar>
# ./internal/<pkg>/...` once per phase, scoped to a single package
# at a time so the slower packages don't drag the bar down. The
# values below are the floor for the unscoped whole-repo
# `just mutate` invocation; the per-phase matrix entries are
# informational until all phases stay green for a week.
threshold-efficacy: 95
threshold-mcover: 50
