# Lefthook config. Two stages:
#
#   pre-commit — fast formatters on staged files only (sub-second).
#   pre-push   — heavier static checks (golangci-lint, markdown verify,
#                forbid-skip discipline grep) that mirror what the
#                `check` + `lint` + `forbid-skip` CI gates would run.
#                Lives on push, not commit, so the inner-loop stays
#                fast — one ~70s wait per push instead of per commit.
#
# Install: `just hooks-install` (one-shot; installs the lefthook
# binary via `go install` and activates the git hooks). See also
# CLAUDE.md § "No local validation; lefthook + CI own it."
#
# Escape hatch for WIP pushes: `LEFTHOOK=0 git push` skips all hooks.

pre-commit:
  parallel: true
  commands:
    gofumpt:
      glob: "*.go"
      stage_fixed: true
      run: |
        gofumpt -w {staged_files}
    goimports:
      glob: "*.go"
      stage_fixed: true
      run: |
        goimports -w {staged_files}
    md-table-align:
      # MD060 (table-column-style: aligned) has no auto-fixer in
      # markdownlint-cli2 — pad cell widths before --fix sees the file.
      glob: "*.md"
      # The chart README is generated by helm-docs (unpadded) and
      # drift-checked byte-for-byte by chart-ci; padding it here would
      # make the committed file diverge from helm-docs' output. Leave it
      # to helm-docs (it carries an inline markdownlint-disable for MD060).
      exclude:
        - "deploy/helm/**/README.md"
      stage_fixed: true
      run: |
        python3 scripts/align-md-tables.py {staged_files}
    markdownlint:
      glob: "*.md"
      stage_fixed: true
      run: |
        markdownlint-cli2 --fix {staged_files}

# pre-push runs once per `git push`. The three commands mirror the
# CI gates (check / lint / forbid-skip) so a push that would have
# failed CI fails locally first instead of round-tripping through
# the runner. Set `LEFTHOOK=0` to bypass for WIP pushes.
pre-push:
  parallel: true
  commands:
    golangci-lint:
      tags: lint
      run: |
        golangci-lint run ./...
    # Workflow-file validation. GitHub rejects invalid workflow files
    # SERVER-side as zero-job "invalid workflow file" failure runs,
    # which silently prevents required pull_request checks from ever
    # being scheduled (the #749 secrets-in-step-if incident left a PR
    # BLOCKED on four required contexts that could never report).
    # actionlint catches expression-context violations, bad action
    # inputs, and shellchecks run blocks before the push leaves the
    # machine. Install via `just install-tools`.
    actionlint:
      tags: lint
      run: |
        just lint-actions
    markdownlint:
      tags: lint
      glob: "*.md"
      run: |
        markdownlint-cli2 {all_files}
    forbid-skip-t-skip:
      tags: discipline
      run: |
        if git ls-files -z -- \
            '*_test.go' \
            ':!:compatibility/*/upstream/**' \
            | xargs -0 grep -nE 't\.Skip[fN]?\(' --; then
          echo "lefthook: t.Skip / t.Skipf / t.SkipNow in test files — fix the bug, do not skip"
          exit 1
        fi
    forbid-not-implemented-prod:
      tags: discipline
      run: |
        if git ls-files -z -- \
            'internal/**/*.go' \
            ':!:internal/**/*_test.go' \
            | xargs -0 grep -niEH 'not implemented' --; then
          echo "lefthook: \"not implemented\" in production code — implement the feature or rewrite to a factual verb (rejected / unsupported / falls back)"
          exit 1
        fi
    # Backstop for the `commit-msg` hook: that hook validates each
    # commit at creation time, but `git commit --no-verify` bypasses
    # it. This range-check mirrors the CI `lint` job's npx commitlint
    # step (which reads the same
    # `.commitlintrc.json`) so a push with a non-Conventional subject
    # — or any other rule violation — fails locally before CI runs.
    commitlint-range:
      tags: lint
      run: |
        base=$(git merge-base HEAD origin/main 2>/dev/null || echo origin/main)
        npx --no -- commitlint --from "$base" --to HEAD
    # Mirrors the `Self-test forbid-skip regex set` CI step. Runs the
    # canonical match / no-match assertions documented in
    # docs/forbid-skip.md against the regex set shared with the CI gate.
    forbid-skip-self-test:
      tags: discipline
      run: |
        scripts/test-forbid-skip.sh
    forbid-soft-assert:
      tags: discipline
      run: |
        fail=0
        if git ls-files -z -- \
            '*_test.go' \
            ':!:compatibility/*/upstream/**' \
            | xargs -0 grep -nEH 'assert\.Contains\(([^,]+,\s*){0,1}[^,]+,\s*""\s*\)|assert\.ElementsMatch\(([^,]+,\s*){0,1}[^,]+,\s*\[\][^)]*\{\s*\}\s*\)' --; then
          fail=1
        fi
        # Multi-line silent-recover scan — mirrors the CI `forbid-skip`
        # gate so the inner loop catches both single-line and
        # multi-line `defer func() { _ = recover() }()` blocks.
        matches=$(git ls-files -z -- '*_test.go' ':!:compatibility/*/upstream/**' \
          | xargs -0 perl -0777 -ne '
              while (/defer\s+recover\s*\(\s*\)|defer\s+func\s*\(\s*\)\s*\{[^{}]*_\s*=\s*recover\s*\(\s*\)/g) {
                my $pre = substr($_, 0, $-[0]);
                my $line = ($pre =~ tr/\n//) + 1;
                print "$ARGV:$line: silent-recover pattern\n";
              }
            ')
        if [ -n "$matches" ]; then
          printf '%s\n' "$matches"
          fail=1
        fi
        if [ "$fail" -ne 0 ]; then
          echo "lefthook: soft-assertion or silent-recover pattern — assert specific content / use assert.Panics"
          exit 1
        fi
    # Mirrors the CI `forbid-skip` gate's test-escape-hatch rejection
    # so the inner loop catches the same patterns. Every assertion
    # must fail loud; never mask a failure with an allow-list /
    # tolerance / soft-assert.
    forbid-escape-hatch:
      tags: discipline
      run: |
        if git ls-files -z -- \
            '*.ts' '*.tsx' '*.go' \
            ':!:compatibility/*/upstream/**' \
            ':!:**/node_modules/**' \
            ':!:vendor/**' \
            ':!:.claude/**' \
            | xargs -0 grep -nEH 'EXPECTED_EMPTY|EXPECTED_TOLERATED|isKnownTolerated|tolerated404|expect\.soft|should_tolerate|skipReason|SkipReason|APP_NOT_INSTALLED_BANNER_PATTERNS|DRILLDOWN_UPSTREAM_GRAFANA_CONSOLE_NOISE' --; then
          echo "lefthook: test escape-hatch pattern — fix the bug at the source, never mask the failure"
          exit 1
        fi
        matches=$(git ls-files -z -- \
            'compatibility/**/*.yml' \
            'compatibility/**/*.yaml' \
            ':!:compatibility/*/upstream/**' \
          | xargs -0 perl -0777 -ne '
              while (/^[ \t]*should_skip:[ \t]*\n(?:[ \t]*\#[^\n]*\n|[ \t]*\n)*[ \t]+-/mg) {
                my $pre = substr($_, 0, $-[0]);
                my $line = ($pre =~ tr/\n//) + 1;
                print "$ARGV:$line: non-empty should_skip block\n";
              }
            ')
        if [ -n "$matches" ]; then
          printf '%s\n' "$matches"
          echo "lefthook: non-empty should_skip overlay entry — consumer code was removed; fix the underlying bug"
          exit 1
        fi

commit-msg:
  commands:
    commitlint:
      run: |
        npx --no -- commitlint --edit {1}

# Intentionally NOT in any hook:
# - go test / just test / go build — these need full module state and
#   are CI-only. The pre-push gate above runs golangci-lint, which
#   covers ~95% of the failures that would land in `check` without
#   the full-test cost.
